body:
  text: 節孝集卷十五宋徐積撰律詩二十六首弔屈平并序漢文帝時賈生親弔屈平于湘江其後揚子復弔之其書謂之反離騷自岷山而投諸江客有松滋令朱明府至幾赴官故因其行附而弔之以是詩也洞庭湖口君須過為我回頭弔屈平楚國誰曽憐直道湘江依舊寄寃聲反騷義命賢揚子作賦譏傷陋賈生若是獨醒無不可荷蓑猶可釣而耕重陽日訪馬存秀才席上寄崔公太守區區拖損一紬袍行到郊居力巳勞有命自知誰畏禍無災可避謾登髙黃金菊滿花情薄白玉樽深酒興豪盡日使君人不至淵明吟醉也陶陶哭彥規七首并序徐氏居鄉與蔡氏最舊鄰屋對宅凡巳數世矣故余知蔡氏為詳於彥規又詳也然以斯人足以知我以我亦足以知斯人不必鄉鄰之舊也初彥規為兒時與兒曹羣行余在簾箔間望見覺其氣貌異於羣兒意甚念之後一日忽來刺謝然後知為彥規矣取其所為文讀之巳與時輩不類蓋其辭皆所自出又能自立意理不蹈不襲凛凛可畏矣才固出於性也然後至於充積盛大也如此宜其文名冠其東南之秀而賢士大夫所以親慕者不獨在乎文而巳也余外氏在關中自祖父母而下凡八九喪積數十年未葬彥規却有關中官即與之買地又為之謀葬其棺衾器皿一切所須自首服而下裳衣舄履無一物不具葬有月日而彥規病矣即以成事付其孫王正行其所未了者獨未為埋銘一事不見其棺就窆耳蓋彥規平生用心其義大率類此而世俗必待見而後知之也彥規卒官京兆其守吕公哭之甚哀應襄事所須盡出吕公也而至於謀及家事如鄭元於孟氏也於是諸公遣使相屬有二主簿者唐君劉君也亦忠於其事近乎孟氏之有樊子也孟氏無兒女二季俱在江南東野以六十四嵗赴興元之辟道病卒於閿鄉其妻買棺用二人舁歸洛陽此亦不足為窮也唯其不幸無子耳彥規兒女六人以四人自隨自寢疾至屬纊常在骨肉眼中同官問訊朝夕在門食飲藥物不問可知其得所也易衣而後斂擇木而後具棺不知凡用若干人舁歸兒女護喪道中早晚饋食其伯兄與二季率內外親屬迎喪於洪澤葬于先塋既葬而虞設几筵饋食如平生時嗚呼神乎其安之乎子可無憂矣孤兒女有所依不失所也諸蔡以骨肉之恩同謀婚嫁在數年間耳二子使從師學凡我鄉里之人必有忠於教誨者焉子雖不幸矣將亦以此自慰也古之人或死於亂死於讒嫉誣罔幽憂怨懟不平之忿或死於浮死於驕死於毒害少恩死於不及巳甚而最甚者姦諛佞邪情狀暴露羞辱氣沮以至於死也彥規官為主簿隨所居官以行其義也面無邪色口無邪言身無邪行所以事上官也生於平世何所戚耶君子謂彥規生為有義死為正命故謂之有終也嗟乎彥規生平不幸動輒有礙所欲者不得為所為者不如所欲唯葬王氏一事臨死時適無礙耳使之平生無不幸盡其所欲所為及於物者何如也古之人既貴用事矣而不如意者十常七八何况匹夫賤士乎此君子所以常恕而不恕者常巳甚也凡吾言所以及此者非以示後也將以慰彥規於九泉耳喪至之日余扶疾往哭其棺巳下將掩壙也因感范巨卿事意有所愧既見於詩即夜夢彥規見豫於僧廊握手號哭嗟乎彥規雖死猶能相恕且不忘我豈顧不能為張元伯者乎我自不及巨卿也巳矣哀哉死有終青衫就木未為窮義如有枉榮斯辱事苟無邪蹇勝通力致全喪關右帥泣尋孤櫬郭西翁精神入夢非生及使我低顔愧古風初余視子髮垂肩及至成童便聳然憂患纒來成白頷聲名隨去入黃泉孤甥見恤情非淺暴骨收藏義可傳多少文章零落盡朝廷何處訪遺編與君相得久忘言晚更傾腸共豁然剗盡丘陵平作路決開溝澮合為川古人刎頸終相殺世俗操心愛脅肩六十老翁能有幾却尋舊友向黃泉有時半日兩敲門語罷南窗坐北軒意外得文哀絶筆理中論事酷能言須知是物非無本若論斯人自有源不蹈不襲真所性洪河自古出崑崙青衫伴我情彌重白首期君事忽乖天下若教俱好義道傍安得有遺骸且將綿蓋孤兒寢誰折荆為稚女叉吟至此篇還索酒更持薑桂坐寒齊我誦千濤噴雪詩急提筆去寫僧扉碧蘆隂處評文坐黃菊花時載酒隨老丈為兒親送藥衰翁賴子少呼醫最是秦中葬枯骨不須銘墓只鐫肌道傍有無車馬通朝復莫兮秋且冬草頭半折木巳空鳥啄噤兮霜與風白鷗肚上殘日紅一丘莽蒼黃昏中亦有松陵怨詩否此詩誰訪談𤣥翁贈胡大夫好讀竒書好運籌橫刀常賦玉關秋銅符正選千兵守金印猶虛萬户侯鷁趂潮來家易到龍投池上劍難求應須讀盡平蠻䇿二廣封疆近吉州寄吕帥五首北邉控扼重瀛州虎視鷹揚屬壯猷盡道敵人新斷臂安知漢將欲舂喉為文法度堆青簡奉使勳勞半白頭六路全秦與全魏不須野戰覔封侯師屯十萬建牙旗大纛森森重使威燕頷將軍宜繡帽龍驤戰士愛犀衣銀鎗作隊行春去蠟炬成林校獵歸更看鈴齊憑几處文如布陳翰如飛北人勇悍真勍敵漢將威名重太山隱若金城當一面橫如鐵陳控三關防秋甲士屯田去牧馬氊裘避塞還儒帥著書閒暇否兩淮人物太平間帥臣所統在燕南事事如窺指掌間仗鉞精神堪破敵扼吭形勢正當關十州部分連滄海一道軍聲過黑山文武非徒尹吉甫前時方叔已平蠻事皆術內宜謀帥竒在胸中合運籌戰士常騎突陳馬將軍須養犒師牛雅歌坐燕春歸塞緩帶行吟月上樓且勸主人宜飲酒邉城六月巳如秋贈劉懋功并序縣令劉懋功赴官貴池見積於南郭出詩一章乃淝上李次翁所贈并出其簡見索繼和因次其韻以為贈言詩未及録又得一詩於枕上併酬次翁纍詩見寄江南早春到官時候梅花正開如驛使來并附此詩次翁得詩不一覽而止也即須依依引首東北也白鬚老栁俱在目前其日之夕携酒賦詩夢逰南郭矣李令歸來嵗月深池人得子貴其情定知縣事依前簡還見官曹復舊清如問以思謀所貴能嚴而恕罰斯輕芙蓉水上人相憶因寄梅花附此聲贈汪判官庾即醞藉本仙材適自王家池上回楊栁風前紅蠟炬芙蓉香畔白髯腮便搖健筆揮詩藁仍替衰翁倒酒罍說與泗州倪發勾夢隨淮水向東來贈劉閣使犖犖雄名駭世間堂堂誰敢舉頭看髙談豹略今無敵誰汚龍泉血未乾蠻貢急趨金殿肅胡蹤深入鐵山閒關中自號詩書將肯愧齊王在將壇寄路倅此中可恨恨無山猶勝紛紛富貴間緑野盡充公好尚朱門安得水回環對雲披住雲邉浪踏月空行月下灣好戴宫紗著宫錦時時吟去復吟還和范君錫觀梅二首君看梅艷似何人不畫蛾眉色自真冷寄北風淮上雪暖思南國嶺頭春莫嗔俗眼偏相棄若比夭桃太不勻我共參軍同所好折來酣笑插烏巾月庭有影終難辨雪徑無香不易分江上肌膚新出浴嶺頭環珮忽藏雲少他幾幅青羅袂解與何人繡假裙我愛此花真一色將詩急報范參軍和吕祕校觀梅二首若論君顔色瓊瑶未足珍花中誰作偶物外獨先春有艷皆歸朴無妖可媚人江南看已厭洛浦種還新日晚巫山雨墻低宋玉鄰施朱其巳僞傅粉亦非真堪把歌詩贈何辭唱和頻君篇為第一便可獻楓宸又寒梅雖淡薄乃是物之珍天與離羣性花前獨步春江臯多冒雪山路不逢人根本蟠雖久花趺長自新妖姿雖共處正色願相鄰縱使紅為飾何如素是真北人殊未識南國見何頻須假東風力春香到紫宸寄顧瀛州本朝謀帥得雄剛氣語無邪面目方掌握事嚴持斧鉞咽喉地緊扼豺狼鐵林猛士新翻陳幕府竒書舊滿囊可減邉兵三十萬胸奴走入黑山藏送倪敦復三首手持報簡人歸後足步回廊角住聲但恐舟行隨早晚此時秋色半隂晴明朝路向雲邉望今夜詩須枕上成四壁無燈窗有月直無老夢到三更連朝送客經三日每夜忘眠約數更枕上尋船無夢去窗間望月有詩成莫愁病叟添愁思為恐行人趂曉晴急送村醪追後乘要教飲處憶南城各自逄人且寄音仍須南北夢相尋巳成鳬鴈分飛勢更值淮湖連日隂每論事時於義切重來别後此情深山東定飲登髙酒剩折黃花望我吟節孝集卷十五
