body:
  text: 節孝集卷二宋徐積撰古詩十四首瓊花歌春皇自厭花多紅欲得花顔如玉容春皇青女深相得先教斂與秋霜色乃有雪月供光星榆獻白斗量銀漢琉璃濕人間美玉搗作灰荆山崑山鬼神泣天上有人名玉女投壺之外能為素姑射神人解種花先須此物為根芽天罅地竅掬精粹蟾身驪頷偷光華其時正是天地交二氣上下隂陽調此花孕育得其正其間邪氣無纎毫所以其色為正色出乎其類拔乎萃一如君子有諸內粹然其色見於外三月將盡四月前百花開盡春蕭然揚州日暖花開未春香不動花房閉仙掌秋髙玉露濃鮫人泣下珠璣碎黃鸝本是花中客啼盡好聲求不得春皇費盡養花心春風使盡開花力春歸鶯去花始開誰人放出深閨來唐家天子太平時太真浴罷華清池紅裳繡袂厭君眼更作地仙披羽衣麻姑睡起蓬萊島風吹玉面秋天曉洛川女子能長生水中肌骨成瑶瓊褒姒不見諸侯兵盡日不笑如無情宋玉移家安在哉東鄰不畫燕脂腮卓文君去成都速錦衣金翠慵裝束吹簫容貌果何如見説其人名弄玉若比此花俱不足淫妖怪艷文之纍一如婦人有賢德不為邪色辭正色孀居之女能自持終身唯著大練衣又如正色立朝者不以柔媚為姦欺以此論之乃可重人之不正將胡為論德乃是花之傑論色乃是花之絶洛陽花名古云好看花須向揚州道君不見去年花下吹黑風霹靂閃電搜玉龍此時半夜花光中不覺屈曲蟠長虹又不聞天上琳琅樹種在煙霞最深處白雲枝葉白玉英此花莫是琳琅精此花愛圓不愛缺一樹花開似明月襄王半夜指為雲謝女黃昏吟作雪杏花俗艷梨花粗栁花細碎梅花疏桃花不正其容冶牡丹不謹其體舒如此之類無足竒此花之外更有誰世非紅紫不入眼此花何用求人知詩人自與花相期長告年年乞一枝姚黃并序紫霄漫翁李道源見約分吟姚黃余畏其才不敢措筆不得已而後塞命因為之序曰天下牡丹九十餘種而姚黃居第一其名雖千葉而實不可數或纍計萬有餘英不然不足髙一尺也花肉既重其梢下屈如一器欹側之狀此亦花之巨美而精傑者乎是宜見於詩而不可泯然使寂寂也黃河南畔伊川北姚家宅是真花窟古來多少豪奢兒埋却千鶯萬鶯骨中央精粹得之多西方秀氣來相和天與明光常借日水宫暗脈正通河春風如酒半酣時誰教穀雨報花期司馬坂前嬌半啓洛陽城內人俱知姚家門巷車馬填墻頭墻下人差肩花上紅綃都蔽日花傍翠幕恰如煙玉面兒來爭供帳錦袍郎去鬭拋錢無人不説姚花好費却春功亦不少日長風暖緑梢低坐上金仙困將倒麴塵餅劑和香檀何以貯之承露槃爛錦脫來嫌太艷鮮衣染就欲驂鸞君看此花肌肉豐一尺餘髙千萬重粧面深藏青步障寶冠斜墮碧霞叢步搖好稱叉鳯凰玉鐶犀珮珠鳴璫帝女何緣心好道阿嬌安用金為房紺窠纍棲舒鴈雛沉煙噴出狻猊爐一種養成餘意態千花瘦盡春肌膚峨峨一器欹且傾覆杯難辨鍾與觥染以鮫綃求正色叩之玉挺希宫聲魏家紅共牛家碧迭霸花中聳髙格如今俯首甘下風九十種中為第一此花莫似武昭儀出得宫來不畫眉情貌欲為狐媚態衣裳却是比丘尼楊妃本是傾國身脫却紅襦號太真河水欲濡頭上髻馬嵬猶著舊時裙物色一定猶可疑人心多變宜難知容易莫評真與欺貌或如是心或非君不見老莊有深意萬物之中最防偽大松東海有物天下雄萬靈戮力生竒松天精地粹萃其下滄溟百道來相通一根直去穿九泉一根斜插鯨魚淵逺者壓折巨鼇背近者倒纒山根偏小枝可就千鈞弓大枝可挂萬斛鍾唯有老幹苦難狀吕光營外堆玄龍身披北帝雄犀甲虎賁連臂圍不匝無計都將大地遮有心盡把浮雲刷樛枝入地旋復上怪怪竒竒非一狀谷陵相變任古今土木兩行專王相列幟空遺渭川壘犒師留得楊隋帳玄駒來撼亭亭蓋渌魚飛入蒼蒼浪最是半霄風雨聲山妖走盡川魅驚十萬爭揮鐵槊騎百千齊闞黑旗兵有時海面波濤小一部仙韶下蓬島殘聲逐水散鳴琴遺響穿雲聚啼鳥混沌死來凡幾朝清氣濁氣痕未消獨葉聳來新蓋鳯雙柯合處舊藏蛟其本既異其事殊德若有容材有餘大鵬斥鷃皆可居相忘有似江湖魚美哉此木真不凡能以智免斧斤間過盡工師無所用莊周應作不材看大松大松如此竒方輿圓蓋不可知隂陽山海氣合離不然神物相護持芰荷歌并序荷之初生如孔雀團花如鈿如錢如海上渌魚之膽其方卷者如瓦斜卷者如箋卷而舒者如杯舒之大者如槃其花如處女婦人其翛然而出乎其上者如墻頭冶容其偃然而隱乎其下者如閨房之秀靜而正者也其鷗鷺之屬往來嬉戲毛色鮮明者白紵即也於是賦之者窮物之形而寓意故有焉其亦庶乎如有所補姑不至於苟作者也孔雀團花翡翠鈿青皇拋盡買花錢渌魚飛膽大如拳琉璃瓦墜紫微天湘妃曲譜誰可傳彩毫不動斜卷箋我家食客常三千杯槃一樣青瑶圓麻姑下來尋水仙不見波瀾只見煙昨夜秋風吹洞房起來先著碧霞裳半含笑面齊鬭粧家家院落紺為墻不道採花人在傍貪看飛來白紵郎亦有美人貞且良獨在碧綃幃下藏雙樹海棠二首并序雙株海棠者余秦中時見也其髙皆數十尺翛然在衆花之上與夫江淮所産絶不類矣或説荆南官舍亦有兩株其姿艷柔婉豐富之美前篇所序者皆其略也而此篇雖多亦未有以為工者然後知李杜無詩其所以為真能詩者乎雖然是亦可惜恨也使李杜輩俱在方春盛時花艷正開風溫日舒置酒于兩花之間半酣而賦之不亦美乎二三子能者姑為我歌之如何獨樹已難有雙株豈易培東風三月後濃艷一時開種是鴛鴦骨根非玳瑁胎英英萬千數滴滴四三枚恐淡添猩血矜香棄麝煤鮫綃翡翠眼寶鈿珊瑚杯絳節朝真去丹砂駐貌回童粧兩株色花格一仙材自得驂鸞侣何煩跨鳯臺明珠留漢水碧洞寄天台對舉霓裳步髙鋪繡被堆超如御煙霧勢欲擺塵埃冶艷皆泥滓卑枝亦草萊好臨湘水照莫近宋家栽漢殿昭陽寵唐家學士才浴終蘭液濺帖就茜羅裁惜粉輕勻面偷霞試點腮急窺鸞鑑了齊報玉人來不是沾紅雪仍非汙落梅啼痕才髣佛佇立各徘徊真態有如此深情安在哉歌闌都不語舞困可堪推淡若疑相犯烘然笑自媒畫眉即忽誤挾彈客應猜灑絳誰先戲揮朱亦共陪差肩奉青帝聨袂踏蒼苔好被金錢擲宜兼玉箸催羅巾如可拭瑶枕謾為灰供帳朝還暮買春瓊與瑰一枝懷舊物百醮費新醅目斷秦山逺心分荆渚隈柔姿誰是偶溫德汝為魁綽綽閨房秀匆匆風雨摧離歌連理曲送酒合歡杯墜臉殷金谷寃情怨馬嵬煙波水東去岐路日西頽遺恨傳芳草餘隂伴緑槐香魂如未散相弔復相哀又此花出在海州東千濤萬浪圍山峯不知誰是栽花翁花根屈曲蟠雙虹英英鬭繁葩葩豐晨霞夕霞滴不供歘有神物射蛟龍團團血濺搖春風超然花格非凡容吳姬半嚲叉頭紅誰人移下海中山神仙姊妹來人間人間無玉可消斑歌姬舞態都且間當時血淚亂瑶關金槃洗面痕猶殷吹簫郎去先騎鸞粧未成時情巳闌漢臯臺下嬌蹣跚曽解明珠瑶珮環無媒不嫁矜殊顔自共美人香往還霓衣同步紺雲車麻姑面上藏丹砂緑鬢巳墜金叉斜酒紅不著羅衫遮且教半笑含春華但恐分飛成亂霞宜哉天下為名花連根都種名卿家溫溫容態孰可加有如女德貞無邪共君醉倒插烏紗從他羣兒笑啞啞玉女花二首并序部使者林公作玉蘂二詩并序其事同使趙公屬而和之亦以見命因吟之為玉女焉蓋序詩者以楚花為楊花别本也則玉女者其亦庶乎可以為之别名也楊花可與名玉妃楚花可與名玉女天上瑶臺是本居人在月宫合同處一點難容赤水霞平生冷笑巫山雨此女持身色太嚴玉璧如槃求不許國艷雖殊情太少蛾眉不畫雙瞳瞭新就明河洗面來更佩明珠踏瑶草不用朱鸞與紫霞玉麒麟駕白雲車君看面上都無邪更看身上都無瑕越王國女金可邀卓王孫女琴可招更有秦王家弄玉嫁人只被愛吹簫和李道源清風謡漫翁説盡清風好猶能顧我邀吟藁吟時欲倚白雲飛到時恐在紅塵表有如列子御風行百骸齊奮雙瞳瞭借問清風何處來玉水之心玉山杪曽經崑閬拂瑶花亦度瀟湘過蓬島借問清風何處居深寄碧蘆藏緑篠芭蕉徑舞鳯衣寒薜荔墻翻龍甲老遺英墮籜無處尋一徑十年未曽掃但恐春深花木稀定知秋後氷霜早快心何羡楚王臺披襟適得麻姑爪中山酒客飲輒醒八斗司徒醉不倒簫聲易咽笛聲哀客思難平物容愀君看簷前避暑巢不是巖烏即沙鳥萬谷藏氷山氣來千濤噴雪江聲繞借問此間清奈何况是中宵月華皎雞鳴漏盡眠不成披衣起看氷壺曉便乘枯木飲明河仍御雙鳬入冥杳藤床角簟無所施綀布蒲葵價彌小有客俄如夢覺時竊笑夢中何擾擾中心無纍清則明蔽者常稀欲者少兒啼女笑坐可忘獸鬭禽嬉悟俱了毁譽一過遺如空富貴浮雲視彌藐古人凛凛良可思世俗紛紛何足道嘗聞外物可娛中所以詩人取萱草誰何乘興為此行坐擺塵埃出汙潦賈生可與忘悲憂楚屈猶將醒懷抱區區何用作離騷弄琴聼我清風操望淮篇示門人間花落盡春無有腳踏青紅望淮走到淮適值晚潮來滿淮鼓吹風波吼傳聲急喚釣魚船船未到時洗雙手買得船中雙白魚便訪村前五青栁旋烹野茗問村醪五栁隂中坐良久此行大略類陶潛但乏黃花白衣酒操舟人去一點鷗帆入雲開何處收孤鷗浴處依淺灘修竿放餌投深流豈無野婦荷而汲亦有老翁行且謳君看此景直幾錢此時正是夕陽天便教金印大如斗何似魚庵共釣船有人問君莫要説懷中取出吟翁篇太華怪怪不可狀誰云仞五千直侵黃道窟髙傍白榆偏秀氣環秦甸濃嵐滴渭川掌髙長托日漢狹半含巔夜響金丹杵秋香玉井蓮排虛摧徑翮橫鋭決浮煙隱豹文章異孤松節操堅渴虹粗飲澗飢虎瘦吞泉磴道竒花合杉株古蔓纒羣材皆挺特餘壤可陶甄義獸期臻萃妖狐困墜顛二關資控扼萬里暢垓埏直勢南衝斗雄姿北闞燕波濤清大海風雨到窮邉鎮壓地常靜磨礱天更圓他山皆俯視何物可齊肩管春風我是蓬萊山上客為管春風歸不得今年更是春來遲江南未寄梅花枝探春童子青霞衣時時去上青雲梯春風消息苦不逺瑶臺瑶水氷霜淺蟠桃花在海東邉此花不煩春一點東風日夜來人間到時先催草根軟大都紅紫心先動小桃先覺枝頭重更有纎纎楊栁枝路傍先得行人弄詩翁自愛蟠桃花鸞鶴不在無雲車城南夜半無酒家和氷和雪吞月華有客笑中携劒去偷得銀瓶與肥羜詩公兩眼看浮雲為管春風不回顧髙樓春山陽有客似相如身著儒衣當酒壚塵埃市井不到處煙霞往往生衣裾一竿橫挂數幅帛題云酒味如醍醐三月髙樓滿春色椒漿瓊液盈金壺盤羅江笋烹淮魚櫻實赤玉梅紺膚彈絲敲金半空裡醉揮玉爵撞珊瑚憑闌直下是煙火坐上清風凌太虛夜深正然紅蠟燭羅幕遮風留客宿是人俱愛何家樓自是何君德如玉淮之水示門人馬存君不見淮之水春風吹春面洗青薰衣緑染指漁不來鷗不起瀲瀲灔灔天盡頭只見孤帆不見舟斜陽欲落未落處盡是人間今古愁今古愁兮將奈何莫使騷人聞棹歌我曹自是浩歌客笑聲酒面春風和節孝集卷二
