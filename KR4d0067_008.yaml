body:
  text: 節孝集巻八宋徐積撰古詩九首贈慎伯筠掘盡崑崙山美璞纔一雙何人横大陣未戰敵巳降秋風吹老檜明月沉空江禮天者大事其器不可尨送秦漕并序部刺史秦公罷淮南奉使河北其行有日即學官而告之曰我且去矣子何以教我學官曰美哉使乎其有意扵古人而及此之問也蓋西漢時暴勝之為直指使者聞雋不疑之賢使人召之不疑既以身見又不待其問遂進其所言是未可言而言之也公則不然盖未嘗召士也廼至於就而問之矣是其可以言者也夫可以言而弗言君子非之其可以弗言乎於是敬而言之遂言而為詩也維古之人厥修有道使臣之美於詩可攷其馬維良曰騏曰駒六轡賁如如沃如濡而况其身潔不可汙身不可汙其可辱乎載驅載馳載馳載驅雖則馳驅咨詢咨諏以來厥修聚其所聞使於四方如圭如璋赫赫煌煌為國之光其美無疆後人不忘維時不忘而有斯人斯人維何維古人是思古人是思是思是為如璋如圭如圭如璋維徳之輝如醖如藉維徳之儀維徳在躬維日不足是問是辯善也彌篤美哉是乎誠自中出誠隠而顯成已成物維誠則然亦在所勉勉而弗巳終之不倦所往所居老生腐儒窮商賤賈野人山夫彼所知者出於精專情偽利害窮根到源其可遺乎可使之言寄太康知縣周宣徳冬之季月月及上弦太康書來慰此皤然并其成法别為一書敏而有術使我嗟吁考其大指官之楷模官守其約事總其要何弊不除何隠弗照如升髙䑓俯視四旁不持度量是物可量挈裘之領提網之綱維簡維能維能維精維精維思維思維誠既誠既明既信既行日有餘力民亦閒暇不肯頑惡孰為欺詐不出一符不遺一力或將爾車或負爾穡四境之内如雲坌集一嵗之事先期以辦私無所擾公無所患至扵盜賊無處伏藏情既暴露脫身奔亡吏案可空刑書可閣俾爾室家既安且樂豈唯太康世䝉其業凡百有司皆來取法勿毁其成在彼後人勿有所嫉勿摇勿傾如川斯流勿窒其行美哉太康不負厥官到官之日坐席未安所成者大所及者逺何以加之加扵所勉又何加焉不倦扵終遺之無窮智者之功送張漕正并序傳曰必也正名乎即正言是也視其官攷其名不問可知為正諫之臣也居其官顧其名不待勸賞與夫督責之令弗正則弗言必其正而後言者也此吾太宗所以建官之本意也今上即位之十年總攬萬幾赫赫明明一新天下之耳目可因者循可革者去革而當民斯隨之循而當民斯宜之此其所以憂勤側席求下情而防壅塞必有待於耳目之官也扵是開闢言路搜擇賢雋内臣即拜外臣特召而左右正言其選彌重此欲治之主所以命官不負太宗之本意也而淮南轉運副使張公實充其選除書既下扵是論議者各以所見而名之曰公之所性篤實曰所性坦夷曰真而不苟夫坦夷者不詭不激真者直之所自出以直居官主之以篤實而不詭不激其有涉乎弗正者乎其有負扵明主之所用心者乎其有負扵生民之望者乎張公優為之矣扵是述焉而為詩也以正名官居官以正豈唯朝廷生民之幸名官以正居官以直豈惟生民宗廟社稷積者為慶流者為澤逺者無疆乆者無極此奚有他一言之力維時我后智勇兼有揭日當天操杓運斗隨手如意不勞而治明明赫赫有因有革所因者冝所革者當維當維冝生民之望維正維言民之望之維言維正何以尚之越有諍臣義不顧身白刃可蹈赤心可傾既曰真矣弗變弗移既曰直矣弗阿弗隨何事可沮何利可囘不可則止其可則為往司厥官往成厥功廻天論事有祖之風送趙漕儞并序淮南趙公大夫罷轉運副使召為户部郎中除書既下去且有日公移席在泮燕扵公堂自始入門至扵即席皆以客禮自將勞問慰誨手自書之如諸葛武侯之待杜微也蓋公之禮義待人有終其用心篤厚皆如此類酒既數行論及世務遂及乎大河賑饑之類二者天下之大事方今之急務也大河利害形勢曲折在公掌中蓋其身至目覧心所自得洞無所蔽人或泥扵九河故迹公則不然以為九河故迹不必求也求所以為九河之意庶乎得禹之法也其指在乎順水之性因地之勢省役簡費應變者也同使林公直而不苟愛公論議數以相告也乃今日親受之扵公矣既講大河遂及賑饑且問曰已成書否蓋其所用心者凡皆為民故也夫賑饑方畧公所自有至扵逆為之備莫如義倉義倉者天下之命也其法始扵楊隋而弊扵李唐以其移為他用也每畆出二升是亦履畆而稅之也常稅之外又生一稅取扵民者已甚矣則扵立法本意亦未為得其卒又移為他用矣蓋古今之法未甞無弊變而通之可也故以此意述而為詩因公之行答公之問唯公所以復教也人之古貌心未必醇心醇貌古或非通人我視趙公其貌甚古心徳俱醇通達明悟我曹山野豈足盡知但據所見以類可推大河之說何其通達精簡平允明辨昭晳蓋其心得身至自閱坐而可言起而可設又云九河勿守故迹但求禹意然後為得此說尤竒漢儒不及我自黒頭盡心河渠逢人輙問三十年餘得公此說庶㡬成書既講大河遂及賑饑如此方畧所繫甚大鄉官胥徒實為巨害使領雖賢吏不可乏必得官吏斯為善法可為利澤可制姦猾如其備預莫若義倉勿取軍民勿法隋唐裒多益寡斯謀乃臧損上益下民悅無疆可自王公下至選人每月之俸百取一分凢千錢者其出錢十斛取一升縑取一疋各從本所貯其本色主者不勞但視其籍不移一符不煩一力月知所增嵗知所積出者不勞如無所出其所損者毫毛涓滴一倉之内諸所畜聚盡是官俸凡皆為民不得移用即移用者法不可縱不以去官不以赦原設法如此其誰敢干古人所貴講辨之學應而弗精詢謀諏度惟是陋生不足待問問而不應應而不精君子不為非人之情惟是弗精靣目靦然在乎復教庶無後愆送趙守并序元祐五年髙宻趙公自徐州通判移守山陽客有告者曰我識趙公是其特立獨行以節義名扵布衣者也民且受賜矣公既視事拊循慰勞其設而行之者皆其胸中舊藴而出乎其義惟恐一物之失所也故無所擾故無妨民故自市井閭巷至扵野人之類無失其職其聽訟決獄用心之詳既明且慎故無非辜古之所謂温良慈恵之師正如是也是以民安之惟恐太守之去也明年之夏未及滿嵗罷山陽守奉使圻内州人父老與其子弟各以其黨相告至扵吁吁而歎息也扵是作詩者因民之欲述民之意以其民之所欲言而不可得也齊有髙宻有沂有沐旁有泰山莒魯郊關粤有人焉氣清神聳立節以髙處義而重維節維義肇自布衣根本淵源所飬可知以義為文洪暢精微以義持守隠如堅城以義作為動如精兵面有正色口無䛕聲赤心可割肝膽可傾以義接物不矜不驕以義臨民實庇汝曹實康實濟實愷實悌民實宜之實受其惠方今天下雖曰治安正在所恤民有饑寒公所徃居豈肯草草戒吏侵漁欲民温飽言者為準行者為表維恕維平除煩去擾狼摧其牙虎縮其爪父子室家足以相保作此詩者豈徒然乎庶使其民傳告懽呼謝玉師河沙亦可數海水亦有畔師恩及吾母其多卒無算逺者窮無邊深者入黄泉黄泉兒莫到慈母忽有告冥冥長夜中如行白日道兒一别母容可想不可逢慿師無量恩恍惚如相通師恩若何為真誠與髙義幽明雖有殊母子各有慰欲報將奈何肉鐫骨可磨泣盡感恩淚慷慨成悲歌送雲鶴山人星非甘公卦非焦贛善言五部枝幹迭用所據甚精所發必中輔之以教其益彌衆以剛止邪以柔止訟躁者使静義者使動仁使之修虐戒之縱險者使平浮者使重如此庶乎殆可折𠂻行矣勉之斯言可誦送李守孝博四言并序山陽太守李公以治行髙第即拜廣東提㸃刑獄其去有日作四言詩送諸御者凡四境之内設而行之者既述其畧矣至扵好謀而問亦附扵篇外官之重其惟使乎使者之重兵政刑誅持挈綱領設施楷模以實去偽以清革汙善本須飬惡根必鉏非嚴不肅非寛不舒非威不行非信不孚諸如此類一不可無而况百粤嶺陽海隅其俗彍悍戒吏侵漁緩之則懐擾之則吁又况其徼谿洞蠻居慮要先定戒須早圖使臣之重不其然歟命使維何曰山陽守維山陽守其質忠厚既明而恕惟所自有以嚴以威以左以右維恕維平維詳維精所濟維敏所孚維誠刑無必用事皆原情或虛其獄或空其庭稱者盈巷傳者盈城四境之内盡為懽聲其體則莊面無浮氣其目則瞭心無所蔽不激不詭不遷不泥亦不自務亦不自恃好謀好詢使臣所貴維詢維謀何以酬之維時武備為國修之我聞畨禺熈寧之前弓手之外槍手三千總計一路何啻萬數因而循之不煩招募可增其籍可當土兵不費斗粟不用尺繒其便如此何憚弗興付之善吏以成其能訓之練之按閲有程可如漢制選擇驍銳號為奔命無所不備豈唯廣東自廣而西聞命即赴勢張力齊如聲如響如鷙如飛如決大水從山赴谿蓋神速者用兵之竒仍堅其城仍濬其池雖有交趾正如狐狸伏藏窟穴其何能為節孝集卷八
