body:
  text: 節孝集卷一宋徐積撰古詩十首忠烈詩并序皇祐四年山陽趙公以贊善大夫守晉康未逾厥月儂智髙起於廣源遂及雍州賊乘其鋭勢如飄風突至晉康乘城而鬭公率羸師數百身為扞蔽手殺數十人又射其一驍帥應弦俱倒賊勢雖沮而其徒大至盡鋭攻之於是軍吏輩請公避賊公曰全家喫著是國家底於是三百羸師人人爭奮血戰而後死卒無一人亡者其赤心義烈貫通白日遂令此曹舍生取義此君子所以為公泣也蓋厯代之禍姦臣賊子所以得遂其惡者以肉食焉者避其難也如令不避其難何姦之不可除何亂之不可平耶如此則王莽之徒不得篡其國王儉之徒不得賣其君安有世為其臣世食其祿并其國而賣之者乎至如禇彥回輩是肉食而避其難者也聞公之言其亦自訕於地下矣問者曰公之死節其義則然然而何益於敗答曰守義死節不論成敗計成敗而後為之者是庸衆人之事也且智髙本謀出人不意而攻其所不備也如使兵無留行直指畨禺則其城危矣畨禺所以得紓少日以修備禦者以康州力戰與賊相持故也則廣州不陷者康州之力也何謂無益問者又曰假使曠日持久能為睢陽之事乎答曰凡全城者所以全人也使人相食魚肉其民此康州之所不為也然則為之奈何曰必不得巳北面再拜以謝朝廷伏劍自殺以謝百姓此康州之所能為之矣嗟乎使康州而無死何義之不立何忠烈之不可為耶故為忠烈詩云在昔皇祐蠻黨交構聚為伏梟起為攫獸出人不意其鋒甚鋭州無敵州城無守備所在奔亡賊勢益張橫身扞蔽爰有晋康羸兵數百摧堅沮敵殊死血戰氣吞逆賊按劒一呼眥裂吻拆凶焰方熾公方虎視人方憂死飽食鼾睡勇如項籍哀歌惻惻為虞姬泣康州不然忘其妻息猛如敖曹强梁粗豪伏藏于橋康州不然坐叱凶妖李陵壯夫終降胸奴老母何辜顔魯雖賢所守不堅大節不全竒哉康州其勇絶類以義配勇其本在內不動如山不傾如地何物可搖何兵可制如令不死社稷所恃如令復生可備宿衛佩刀驂乘執㦸殿陛用之朝廷朝廷之綱使當一面勝於金湯無疆無界人迹鬼方知有斯人中國之光若斯人者决不狥利肝膽可瀝頭璧可碎生乎由是死乎由是生亦可貴死亦可貴死而有子時方三嵗死中得活此乃天意使世其家世為忠義子子孫孫永不失墜我為此詩激勵萬世和楊掾月蝕篇並序楊子常掾為月蝕篇示豫辭義甚偉某不敢虛辱其貺乃吟哦而和之詩曰彼月而食則維其常春秋月食不書其非大變也可知矣形而為詩歌若無不可者遂卒賦之云爾元豐之元嵗戊午斗柄斜指西南維月行赤道日南陸營丘分野星虛危昨夕既望復今夕盛若不損盈不虧安知變起在頃刻突如有物侵其肌其始色變甚蒼黃須㬰赤黑相合離良久烟焰極薰燎一團白玉燒為灰黃琮蒼璧不可辨枯株死兔將安歸孰烏其吻吞巨皿孰丹其汗流墨池如食非食始為薄有物無物不可知蝦蟇何物敢張口麒麟何故敢爭鬭是何星曜敢侵犯自是其形不可久君不見對月數眉毛須臾引臂不見手嗟吁天上之神物乃有如此事所蔽至甚不可解凶而家室亡而身不然借使幸而免後世譏笑遭惡名君不見漢朝賈生文有餘其心大勇其才踈當時如必用其術紛紛不免危其軀鼂錯堂堂蔽於刻公孫規規蔽於諛谷永之才蔽權勢有若鷹犬供指呼霍光雖賢亦有蔽何不早去顯與馮子都劉歆致位為國師豈若揚雄久以為大夫蔽於太髙李膺輩蔽於巳甚陳蕃徒竇武不斷蔽可痛柬之不忍蔽可吁王允所蔽在無權荀彧所蔽不早圖張禹之蔽入於佞王衍之蔽失之虛牛李雖竒蔽朋黨機雲雖俊蔽附趨王導蔽怨殺周顗遂良蔽誣殺劉洎崔浩蔽强殺其身所蔽若此甚可畏我愛安世真朴忠匿名逺世歸至公有私見求堅不許以私求謝絶不通諸葛武侯為將相心迹皎然無所枉有罪至親而必誅有功雖讎而必賞謝安知壻王國寶不以身蔽能辨早人心自是悅而服不顧四肢與肝腦苻堅之師號百萬一戰而北若摧槁我吟此篇不足録却憶唐衢忠義哭古人今人何擇焉大抵人心蔽多欲月之所蔽惟須臾須臾蔽去明如初人之所蔽何太甚至於終身不悟不可除月乎月乎明哉明哉善去其蔽何速之如君子法之所以改過賢者法之所以知非勇决之徒所以奮發感慨之徒所以噓欷我雖老且病齪齪無所為猶能對月吟歌詩安得慷慨之士如桓伊把笛為豫吹大河上天章公顧子敦萬物皆有性順其性為大順之則無變反之則有害禹之治河也浚川而掘地水行乎地中其性安而遂因地為之防猶恐不足制故附之山足使循山而行山不可必得或原阜丘陵水行乎兩間既固而既寧及將近下流山逺而地平渠裂為二道河分為九形雖暴不得怒雖盛不得盈所以順而制歸之於滄溟後代䝉其業歷世六七十凡千有餘年而無所决溢國君與世主豈皆盡有德蓋繇河未徙一皆循禹迹河道既一徙下涉乎戰國水行平地上乃堤防堙塞其時兩堤間實容五十里水既有游息堤無所嚙毁後世迫而壞河役始煩促伐盡魏國薪下盡淇園竹羣官皆負薪天子自臨督其牲用白馬其璧用白玉歌辭劇辛酸姑不至號哭瓠子口雖塞宣房宫雖築其後復北决分為屯氏河遂不復堤塞塞亦無如何兩河既分流害少而利多久之屯氏絶遂獨任一渠凡再决再塞用延世之徒有天時人事可圖不可圖有幸與不幸數說不可誣其後復大决大壞其田廬灌三十一縣言事者紛如將欲塞之耶凡役百萬夫費纍百巨萬亦未知何如如此是重困是重民嘆吁言事者不巳亦不復塞諸李尋解光輩其言不至迂遂任水所之渠道自割除當時募水工無一人應書學雖有專攻術亦有窮歟諸所說河者桓談實主之但聚而為書實無以處之班孟堅作志亦無所出取事有甚難者雖知無所補今之為河堤與漢無甚殊逺者無數里近無百步餘兩堤束其勢如縳吞舟魚適足激其怒使之逃囚拘又水性隱伏有容而必居浸淫而灌注日往而月俱掃材有腐敗土壤有浮虛水進而不止正如人病軀病巳在骨髓醫方治皮膚下不漏足脛上􅊳為背疽或水如雷聲或掃如人喘或决如山傾或去如席卷如蛟龍引陳如虎豹逃圈如地户開闢如誰何生變如神物主之不可得而辨嗟乎有如此堤防豈能禁蓋緣平地上失水之本性而又無二渠分九河所任以九合為一所以如此甚今之為邑居多在古堤內以諸掃凖之髙於屋數倍以水面凖之亦髙數尺外諸掃正如城而土有輕脆民正如魚鱉處破湟畎澮被溺者常事不溺者幸大又河水重濁澱淤日以積又夏秋霖雨諸水凑以入故有必决勢不决者蓋鮮或决彼决此或决近决逺或决不可塞或塞而復决或决於旦暮或决於嵗月或新掃苟完或舊掃潰裂譬如千萬鈞用一繩持挈必有時而敗必有處而絶而自决大吳凡害幾郡縣河既北浸邉諸塘皆受患強敵與逸馬孰為之隔限今雖甚盛時亦防不虞變所以議論者復故道為便故道雖已髙可復亦可為但恐既復後其變不可知我兵學雖陋公兵學雖竒我說兵之難公亦莫我違河事異於兵其難堪歔欷智有不可及力有不可施汲黯非不偉所塞輒復隳王遵無奈何誓死而執圭若與唐衢說號哭垂涕洟未說穿故道未說治故堤且說塞河口所費不可推諸所調發者委積與山齊卷掃者如雲進掃者如飛下掃名入川其勢憂流移上掃名爭髙少動即勢危萬人梯急赴兩大鼓急椎作號聲號令用轉光指麾其救護危急爭須臾毫釐又聞被災郡數路方荐饑官私無畜聚民力俱困疲朝廷謀已勞兩宮食不怡生民仰首望使者忘寢饑為之奈何乎勿計速與遲事雖有堅定議論在所持如一身數疾必以先後醫假如移所費用以業貧民償其所亡失救其所苦辛或貸其田租或享其終身獨孤有常餼使同室相親露尸與暴骸收斂歸諸墳精選强明吏處之使平均鄉官與胥徒欺者以重論如此庶幾乎可無愁怨人下酬更生望上慰再造仁然而論議者至今猶紛紛或復其故道或因其自然公如决於一勿使衆議牽在已者有義在命者以天而况行職分而况本誠忱聖朝無不察知子之赤心嗟余何為者草莽且賤微與公本無素一見即弗遺以伯兄處我以古人相期小設猶致說大事寧無辭年且六十一未作溝中尸常恐公禮義如投諸汙泥豈欲為迂闊不得已為詩瀝吾之肝膽但恐同兒嬉又恐誤公事公千萬慎思如將從近功即深圖便宜如必謀久利唯古人是希是詢而是度是訪而是咨或博物君子或宿儒老師或濵河野叟或市井年耆或愚直夫婦所言無蔽欺或老胥退兵耳聞而目窺或世為水學可與講是非或博募水工按地形髙卑從便道穿渠稍引河勢披海既為大壑汴既分一支如關竅疏通臟腑病可治此說如何哉但恐出於狂如何完障塞如何復諸塘觀變而待時亦恐謀不臧為復有說者且須嚴邉防如魏尚守邉見稱於馮唐如祭同久任使胸奴伏藏以車制衝突如衛青武剛多置强弩手如李廣大黃選募如馬隆練卒如髙王如漢置奔命使我軍勢張短兵斫馬脛衝車亂其行賞不以首級所以嚴部分大陷刀如牆可以堅吾陳羊叔子以德郭子儀以信光弼戰河陽揮旗令直進其時諸軍勢如决水千仞楊素不用車可汗下馬拜僅以其身免號哭而大敗將帥在方略勝却百萬兵安邉在良將勝却築長城願子治水功有以酬明時便領鐵林兵盡衣犀牛皮連營環繡帽大纛隨牙旗分金賜勇敢藏書付偏禆先聲義信逺下令霜風馳出塞有豐草近關無馬蹄穹廬大漢外别部黑山西伐謀為上䇿何用長纓羈本朝正明盛以德服四陲使來不受獻南越回山梯西閉玉門關東却髙句麗四方無一事各安巢穴棲名將更無功優詔勒鼎彛師旋作鼓吹軍容除虎貔銀鐺致郊勞翰林嚴鎖扉除書紙用麻省吏身著緋公方有所念山足江之湄無心入黃閣有表辭赤墀乞得老來身浩歌還㑹稽白雲與緑波無所不可之春風桃花塢秋色黃菊籬茶籃與酒榼壺矢兼琴碁烹雞炊黍飰可倩龎公妻豈無㑹稽老雪夜同泛溪亦有二三子棹歌相追隨散盡槖中金留得身上衣有宅是官借無田可扶犂閒吟題寺觀長嘯入雲霓公得我詩後一夢須先歸李太白雜言噫嘻欷竒哉自開闢以來不知幾千萬餘年至於開元間忽生李詩仙是時五星中一星不在天不知何物為形容何物為心胸何物為五臟何物為喉嚨開口動舌生雲風當時大醉騎逰龍開口向天吞玉虹玉虹不死蟠胸中然後吐出光焰萬丈凌虛空蓋自有詩人以來我未嘗見大澤深山雪霜氷霰晨霞夕霏萬化千變雷轟電掣花葩玉潔青天白雲秋江曉月有如此之人有如此之詩屈生何悴宋玉何悲賈生何戚相如何疲人生胡用自縲紲當須犖犖不可羈乃知公是真英物萬疊秋山聳清骨當時杜甫亦能詩恰如老驥追霜鶻戴烏紗著宫錦不是髙歌即酣飲飲時獨對月明中醉來還抱清風寢嗟君逸氣何飄飄枉教謫下青雲霄大抵人生有用有不用豈可戚戚反效兒女曹採蟠桃於海上尋紫芝於山腰吞漢武之金莖沆瀣吹弄玉之秦樓鳯簫送程守并序山陽太守程公始至之日其民切切相告謂其不生事也至於逾月其民稍稍安之又至逾年然後其心信服而日益以安也夫不生事者固足以安民矣於是各以其所見稱之稱其性者曰質直真厚稱其德者曰如其所性稱其政者曰寬曰恕曰處煩劇約而詳曰事歸乎平允總而稱之得民之和也夫為政而至於得民和足矣然民之所識者淺又其見聞各有所止故其所稱之者止於如此其不可得而稱者太守之量必待見其所見聞其所聞然後可得而知也即弗見弗聞雖良士大夫蓋有不可得而知者矣雖知之豈盡知之乎太守之量性所自有而所養者大也有是量故有是政故善處煩劇至於日力有餘而其心裕然也夫人不可以無量無量則居之不安如是則於外物難與言命矣夫難與言命者求之為政人不可得也為乎其人則蔽於所持難與言義矣如此則將有受患之民避色之士也聞程侯之風者亦可以少自警矣此皆縉紳先生間並所談二三子羣居共講鄉人父老之所聞者也故因程侯之行發而為詩其亦庶乎有益於後世者也蜀之有眉有山有江江大而浚山形甚厖是生程公為國重器可處大任可决大事凡有措置凡有施設堅不可搖牢不可拔所以蜀人號為鐵塔維公有子為山陽守所性所養質直真厚維其質直不浮不苟不生巧心不為利口維其真厚不矯不激體無邪氣面無邪色視其氣貌察其動靜可知所養可知所性可知其德可知其政質直真厚故不生事不為小數不任小智以恕輔法因法行恕不煩不苛不暴不怒遂使斯民如行大路無險可虞無傷可慮肌膚以完手足可措姦凶以衰盜賊亦沮父母妻子邑居田廬各安其故各保其居為政如此民是以和是以可慕是以可歌不能歌者太守之量可歌可傳可法可尚可以容衆可以任重無適不可惟上所用送李端叔有人頗似長沙傅得官亦望長沙去去時好賦楚江謠還使風騷滿江路便須酌酒弔三閭正是忠魂寃憤處縣令如今未去時蘭亭故事猶可為莫惜千筒萬筒往諸君方壯我已疲登科學究文章豪數竒老將詩能髙長沙縣令號才吏方將睥睨謝與曹凉風即是八九月紅萸黃菊花將發正是詩家得意時莫學古人悲暮節東南美者有吳姬紅襦繡袂無所施把酒一巵輕皓腕得詩一句勝蛾眉山夫野叟只如此諸君逹者應相嗤有酒且慢飲有歌且慢謳共君說懷抱未語先搔頭良久欲說說不得胸中有物如山丘君不聞東家女子花見羞十六未嫁便悲憂牆頭樓上到日晚馬驟車奔如水流西家亦有閨中女月璧龍珠求未許有心自比蟠桃花無言竊笑陽臺雨謝鯤便是妾家鄰敗唇折齒猶相語何况五陵輕俠兒拋金擲玉教人非一夫奔處千夫馳不論榮辱與刺譏羶中之蟻醯中雞攫金逐獸兩眼迷主人下馬客巳齊拜起俯仰容正卑有如六月賣蒲葵唯恐不售霜風凄言至於此良可悲所以慷慨見於詩誰能起舞誰能歌甕中有物如秋波古來多少無奈何要須一醉都銷磨茫茫人間岐路多不如海水通天河上趙少師并序自宋之楚千里之逺也趙公少師致政之六年年且八十乃眷然東顧束裝載舟順流而下浩然而來所以照臨山陽也山陽公布衣時所居也自薦紳大夫諸生官府之吏下至幅巾閭巷之人識與不識皆喜而相告也邑人徐某實辱公義方公之來宜其率先衆人馳省于首一拂几杖而操之從諸孫之後視飲食起居之節何如與夫鄉人父老日呼子弟灑掃朝夕以伺公出入肩輿安車唯公所御角巾鳩杖唯公所之新阡廢圃唯公所問深林大木唯公所識臺池園榭城閣燕遊之觀唯公所指故居旁舍對廬同巷之人皓首黃髮其存為誰唯公所訪念故追昔感之為嗟歎娛之為笑樂童子在左冠者在右二三父老奉巵酒進湖魚淮蟹洞庭之橘雜以脆甘盡東南之美唯公所欲然後取公之德述而為樂章使琴工奏之公憑几而聼之可也坐則公侍行則公隨此公之遊故鄉人修子弟之職義當然也乃不幸而有疾不獲少如所願者切自恨憫顧無可為因言而為詩為公一笑之娛也義髙德厚賢在躬進榮退美光初終越有神明相元功疾憂之外康寧中乃眷乃顧爰徂東徒御雖寡人望雄其髙可仰厚可宗兹行允美江淮風父老相呼告兒童三朝無事繄厥忠公謀公惠世所䝉肆安於賈田安農溫衣蔽體食飽胸小攘大竊消姦凶州牢縣獄囚多空歡心和氣成年豐汝曹雖騃念所從汝心汝貌加愛恭薪蒸勿采米勿舂亟歌屢舞馳省公有人昔與公車逢汝隂潁尾洛與嵩山有迹兮水有蹤水之鶴兮山之松一朝賜號逍遙翁馬資僕費官與供汝曹努力吾老癃公若再來勤築宫俊老行送林次中赴都司并序客有張文潛與之夜坐論事良久及林公之義於是兩人者名公為俊老因公之去作俊老行送諸御者為公一笑也熙寧察院一開口誰人膽落御史手其時面堅黑髭鬚力欲回天氣衝斗一從蹭蹬作外官所居不苟心迹安剛不可回堅不變頭如霜雪心如丹所以論者恱而服所養有義其質端東西南北二十載一朝有敕却召還皂囊封上曉班肅繡衣步入秋霜寒義有所徇乞得身白日降下天上人黃金龍節青囊印赤帷熊乘朱斑輪以其餘才修職分以其餘力娛精神望淮樓上對秋色玉女花前泣晚春時時共帳過南郭來就陶潛漉酒巾與人論事不必合直無所苟氣色真持此以往無不可古人所以為正臣淮南一路事如草嘉苖惡莠俱分了中心皎皎如斯乎外計區區何足道兩宫日月方齊明羣公戮力營太平公議急須招俊老清風先已過南京魯恭王祠并序山陽太守蔡公祈雪於東海恭王廟實得所祈守乃為詩以答神貺又謂某曰子亦為王歌之乃為東海恭王祠詩曰帝子非無賢孰有恭王者脫身辭漢儲一芥視天下勇故不失義智故不失幾身既脫諸險德亦潛其輝羣姦非無目渾渾無罅窺隂謀不得奮佞舌不得施以此終其身萬世不可非初王受漢封奉詔實都魯如何千載後廟貌在東楚豈非王之賜生嘗及兹土所以淮上人世世作神宇然而鬼神道不可接形聲所感唯以德所通唯以誠去年冬不雪江淮非一城人心誰無戚蔡守最不寧守乃欵王祠俯伏祈於廷其日臘且盡其夕大雪零前驅方入郭後乘猶在坰田者歡於野途者歡於行如饑哺斯食如疾醫斯平驕陽遁無迹和氣來有形因知王之心雖殁不變更好誠而樂義凛凜如平生一禱輒已應為賜良不輕侯拜神之貺民歌侯之明莫飲吳江水寄陳瑩中莫飲吳江水胸中恐有波濤起莫食湘江魚令人寃憤成悲呼湘江之竹可為箭吳江之水好淬劒箭射讒夫心劒斫讒夫面讒夫心雖破胸中膽猶大讒夫面雖破口中舌猶在生能為人患死能為鬼害患兮害兮將奈何兩巵薄酒一長歌灑向風煙付水波遣弔胥山共汨羅節孝集卷一
