body:
  text: 節孝集卷六宋徐積撰古詩二十三首呈路倅三十年居官而無一椽屋隨身清風髙所至義行足今兹盡室來何可久船宿奴僮已暴露勿使乏饘粥也須謀外物種取栁與菊記取節節髙愛我茅簷竹其時花盡落手把麥黃緑公酌我須釂公吟我須續慷慨見懷抱靜介無所欲最是謁祠堂老淚澘可掬邇來六七嵗病叟頭已秃萬事置浮雲壯氣自滿腹感激論忠義猶愛唐衢哭更思桓野王把笛吹一曲奉呈河中教授不息之謂誠誠所以入德無微而弗大何往不可適惟其能言者自求其所得惟其自得之久而能弗失奉酬守道教官昨自江南來但有清風無塵埃曽遇芙蓉池上客仍過方家舊釣臺贈蔡長官子去年冬至第一日省墓人回船過急不知兩眼血乾無使我時時為君泣謝董元逹鄱陽董元逹七叩樵夫門新葅乏三韭濁酒缺一樽名言有餘理老懷思共論今日復一來刮我兩眼昏謝石運幹仲謀奉議清而溫義心無所遺已看巔髮白更與吟清詩更與吟詩清奈何樵翁一夜為吟哦吟到四更月出後床頭看月忽成歌寄陳伯模臘月初四日有人叩吾廬言從江上來手把鄱陽書發書見康强細字盈數紙仍說九雛中兩雛正飛起送李光道憶昔見子時我在西關住顧我已衰朽愛子特明悟其後十數年於此數見之氣貌日益好胸中即可知貌者德之表精神氣所為氣無所不適其本在養頤所養得其正其美充四肢子是名公孫家法能自持子學有舊業尤富禮與詩重之以所養何適而弗宜古人有大路行者皆坦夷夫以子之明豈惑於多岐修鞭與長轡逸駕無停時古人亦何人勿問皆可追昨見子筆札老人為子喜其言遜而恭賁然有文理願子更勉之莫忘老人語所居求正人正人德之輔卜居一篇二章别望之并序寶文中大吕公治弋陽之行其去有日使其子永奉君實來告行乃云疾不可以身見公遂作野人之辭一篇二章所以送諸御者為公一笑卜居何所尚靜軒栽此君萬事付流水一心遊白雲亦有靈夀杖可登浮光山聖朝須舊德玉筍虛清班西山髙寄崔刑部西山髙胡為髙上有摩天之巨勢下有黃河不測之險甚於蜀道之難西山髙長安之路如雲霄乘無逸駕兮飛無徑翮我欲往兮有千艱百險之相遼西山髙長安之路如天遙夜短夢不到白日其心勞西山髙我欲往兮方窮處於蓬蒿恩之大兮報不可以速太山之重兮置之有若鴻毛西山髙無如之何兮徒引領而長謡青門路兮有時到願公之壽兮如松喬答崔伯易白雪之句北叟有竒歌調與聲俱絶此歌本難名强名為白雪一唱白雲開再唱青雲裂朝唱迎朱霞暮唱入明月聲在明月宫桂樹生秋風秋風吹明河銀浪翻長虹河漢與海通安知聲所終如此誰可知但問牽牛公如此誰可聼直須登青冥酒仙騎赤龍詩仙騎長鯨一夜到平明北叟聲且停遺響來南城猶似孤鸞鳴南公對北叟阮籍逢孫登阮籍正長嘯孫登作鳯鳴羞殺阮步兵笑殺孫先生送張宜父赴南從幕府正彥江南秋色芙蓉香滿江秋水傾銀潢泛水依花人姓張濤翻浪湧揮文章突然出者何蒼蒼巨鼇曝背來中央黿鼉仰首伏四旁登臨談笑得庾即安得霜鶻腰胯長騎上秋空追鷫鸘北望海門形勢强美哉壯觀吳封疆若將前代論興亡直談孫氏到陳梁凡為佐命可哀傷其諸姦孽如豺狼傾讒正直誣忠良以國販賣為賈商歌姬舞女金滿堂不須為盜持刀槍身雖幸免遺其殃子孫戮辱甚犬羊所以不欲讀史書鼻洟目汁沾髭鬚潤州支使相知無山陽老子如唐衢寄吳行甫并序正月十日夜枕上代書寄錢塘吳行甫初行甫顧豫於南郭舊隱自旦晝至於暮夜五日而後去去六七年間書亦至於六七余未嘗一為書行甫能亮我故不以我為簡我亦亮行甫故不自疑其簡余雖未嘗為書而日欲為書而未嘗為書者重為書也重為書故欲寓之於詩如此非一日重為書重為詩所以重之也人事無窮時白日常紛紛夜久靜不眠枕上還思君形神有合離忽過江之濆已過江之濆更隨東南雲贈荆南王秀才天爵集虛二堂求詩仍往武陵天爵名甚髙集虛名甚悟悟髙已與俗人非更望武陵花下去送李昻長官征南兵勢欲平蠻軍聲殺氣秋風寒南國此時霜霰早八月草黃楓葉丹江有渚兮山有麓君向洞庭何處宿四垂天幕亂波平九疑山送愁嵐緑日斜葉落黃陵祠月明風起清湘竹愁娥逺放峽雲來寃臣暮借江聲哭鴈號孤喙度蒼梧猿呌哀腸抱霜木君看樵塢與漁村緑橘黃柑隨柿熟此行正合風騷情縣衙仍在衡山足新嵐老翠滴吟􅣘風松雲溜生琴曲衡人側耳聼先聲報道官來不碌碌可使汝農無逃田可使汝市無寃獄汝胥可脫簿書煩汝民可免鞭笞辱日中放吏不坐㕔夜半投金不受囑回時唯載俸餘錢茶滿衡山無一掬謝江倅病叟在所收越已為髙義就而飲食之盛具煩親致讓榻行殊禮朋酒代賄幣非徒追古風兼使奉時祭謝李次翁次翁情義髙不在古人下惠我春山芽清吟為增價記得西窗無言詩遂及雅且待李張來說子到清夜答李昻長官富貴貧賤終篇之貺前日正憑几長鬚叩我門手置一筒詩義髙辭且溫三讀至終篇尤愛子所存我有不言意子已自得之余將缺不報嘉意忽如遺吾聞諸物理動靜固其性靜有不如動動有不如靜所病入於邪大率要歸正窮通存乎時死生存乎命與其以邪通孰如以正窮漢之主父偃其卒敗以凶不義而有生不如死於夭所以君子徒而惡跖壽考謂富不如貧謂貴不如賤其說豈徒爾亦各有所見貧賤與富貴亦不必去取始也以道得卒也以道處豈特區區身時乎非小補萬世賴其法天下受其祜所以古君子得之亦不拒處之不以道君子所不與景公馬千駟孔子賢夷齊曽孟藐晉楚原顔甘凍饑我愛張車騎我愛郭汾陽大業中興漢餘基再造唐天資既忠厚以義能自將德盛不敢肆功大不敢當匿迹逺權勢以身繫存亡以寬不以刻以遜不以强兹可謂之賢雖盛其何傷博陸豈不偉區區蔽孽顯當時雖已幸其後卒不免至於充謐輩何足汙齒牙機雲死好進嶽晏死佞邪下近隋唐間其輩尤可嗟甚者弊天下非唯凶而家所以富與貴有時而可惡淫夫所不從奔女所不娶色美而行非嫫母勝西施所以漢烈女深恨蔡文姬文姬文姬其奈何如姬之輩可悲歌我欲採藥山之阿亦欲把釣披漁簑茫茫人間岐路多不如海水通天河贈陳留逸人二首不知何許人忽在陳留市生來無得失物則有泰否春時看物生秋冬看物老大意寓之笛餘情付雲鳥無處不可居不問江與湖亦不問田廬今夜入城市往往呼狂夫狂夫勝獨醒以身葬江魚又有人持一管不用蘆葉卷能作隴頭聲其女操六板吹者寓其聲拍者㑹其情情聲與氣貌內外俱和平時時入酒家便插幾枝花歸來無一事醉卧日西斜人或問所得答云無憂嗟或問其所欲何物可相纍我愛斯人者富貴所不如有如此娛樂作如何稱呼呼為無憂人畫作無憂圖更畫幾枝花酒瓢與酒壺謝葉祖洽葉公有髙義常叩茅茨居不嫌杜微病更附荆州書龔遂合馳傳郭伋方駐車海人受公賜約在秋風初送沈判官四月芙蓉花未開王家客去登瑶臺瑶臺髙在白玉京麟毫玉譜書姓名名儒庾子能清悟肯學買臣與嚴助受福王明不為身澤遍生民便歸去酬傳道有客從東來乃是徐方秀言行過乎恭篇章一何富顧我白髮叟贈以青瑶枝我將投木桃桃始開花時節孝集卷六
