body:
  text: 節孝集卷九宋徐積撰古詩十五首贈武夷旅人并序客有處於山陽者以其母在逺方日夜所思所謀者及乎是時歸省其母也其母老矣日夜之心所念所禱者及乎是復見其子來歸也其閭巷之人望見而識之必將奔走以告其母也其母方驚方愕俄然果然其耳復聞其子之聲也其目復見其子之面也於是母復有子矣子復有其母矣雖鄰里同巷之人猶且為之歡笑至於持酒脯而相賀也而况於其家內外所親者乎此君子之所以喜之也君建人也與余為同姓其字得之初見余於南郭辭曰欲公之言凡八九年矣余未及有言君不以是為懟其視豫如故而情貌有加焉是其用心不迫不隘蓋與世俗異矣故於其行因其所可喜為詩二章贈而送之并以告諸遊士將行者思止已行者思歸已歸者宜乎速歸如旅人之有以慰其母心也武夷旅人而有氣節不肯瑣瑣亦不屑屑持此守身歸慰其親既慰其親亦告鄊人贈龎公司馬德操來就龎公杖履直入名姓不通坐其堂上指揮呼索催令作黍云我有客龎公妻子堂下羅列拜且聽命奔走陳設此時龎公適自外歸忽見司馬其喜可知一堂之上相從笑語其傍觀者莫分客主我讀其書愛其古風真厚如此精誠交通量如溟海義薄雲空至於妻子亦為歎者苟非其人往往見罵蓋有是夫而有是婦能佐夫義善敬夫友可警薄俗可示厥後送裴守并序維時西南述裴公之藴也夫以裴公之賢其所欲發而設施者豈一詩之所能道耶維時西南巴蜀一道強楚侵疆故蜀東徼水激以猛山迫而峭人性堅悍地形險要孰往而使孰撫而教惟帝難之乃眷東顧曰山陽守智足知務能正而和能察而恕嚴所以立寬所以輔性不狎侮躬有法度是表是儀可俾可付其往欽哉所居必裕公拜稽首馳傳以赴入境褰帷登山叱馭設施有本先後有序可者立行不可立去公曰來汝吏受約束天子聖人汝勿苛酷民心無他罪生不足窮簷荒村頽垣破屋豈可羅網更入牢獄公曰兵官當去其懦賊侮則犯賊畏則挫勉之在勤戒之在惰兵要素練慎勿安坐公曰縣尉縣無城郭姦者鼠伺狂者獸攫一邑性命弓手是恃選擇補之訓練使之即有能者有以勞之即不能者戒之告之在昔漢氏蠻多變者失信失恩擾之故也今則不然有以處汝德以服汝威以御汝恩以結汝信以固汝汝無自恃皇帝神武凡公敕戒吏皆奉行何法不恕何刑不平何兵不練何技不精一綱盡舉百為大成盜賊衰息蠻夷信服四封之內截然整肅小人有依良民受福天子嘉之馳傳以召慈母喜之載色載笑神亦祚之永錫難老送范宣德客有斯人而有美質可養而充其在不息養之以正充之以義何適不可何為弗至送李推官并序山陽幕府李從事閎中以學舍敝陋身任其事厥有成功而為可繼之法焉教官徐積述為詩章因其代去贈而送之并以自警至於二三子職事下逮諸生亦從而得其所戒焉也即如所警復如所戒所以慰從事之勞以稱厥功也物有所興因人而就其人維何所性忠厚能謀而果能明而究身任其責力成厥構既成之法可繼於後入門而東自南而北如汙斯隆如枉斯直如塞斯通如隘斯闢如翼斯張如衡斯舉如蔀斯赫如闃斯覩室有明窗墻有堅堵地無遊蟻穴無伏鼠既完既成既安既處師乎師乎豈可苟然心為道本身為義先心之所無道不可傳身之所無口不可宣唯正唯直求已以全以義以命如耕平田處心積慮貫通神明無忝鄊校勿負朝廷成人子弟慰人父兄二三職事其亦警戒欲善諸外先治諸內存誠防邪集義養氣作僞心勞作德心逸如此兩句守而勿失謹佐爾師各修其職庶乎諸生其則不逺已修加修巳善加善不率者從不類者變子弟如此父兄所願可慰鄊人可成學風可酬其勞可稱厥功送喬司法喬掾循循有如寒士面無浮氣能訓諸理可養可充曰正曰直其維思誠其在不息送賈鎮卿蕭縣大夫氣質端徑其中所養不邪而正正以輔才恕以輔明面無諛色口無諛聲若斯人者宜於王庭而况一縣為惠為澤恕所以惠威所以立猛寬得中韋抗是也誅姦殄冦有賀齊者東漢龎參作守漢陽政所以茂實繄任棠以君之正以君常德力追古人是冝是適可養一章贈别范子舟可養可充曰性曰氣以君美質斯已可貴養而充之何所弗至送山陽宰大夫三年平恕如一靜而不煩民安厥室大夫去矣何以述之我述民言民實德之贈吕公侍講我敬吕公以其德齒敬之愛之何時巳巳美哉吕公文在其中見乎外者古人之風維賢有德神相其祉何以祝公勿藥有喜送汪宫教堯親其親教官得人所性忠厚貌純氣真學為耕稼經為本根實之為行賁之為文辭令出口法度在身大學小學其誰弗循循之維何維義是適不驕不肆無邪無僻大者敬義如漢元王小者樂善如漢王蒼樂善敬義何有不臧保躬無悔受福無疆無疆之福維順維忠維忠維順維師之功代諸生送蔣守二首明明楚侯為國之光王明是選王命是將皇皇者華六轡如濡轡且如濡其德可孚其孚維何潔不可汙皇皇者華六轡沃若轡且沃若其德可度其度維何清不可濁潔也不汙清也不濁德則不渝澤則不涸民則宜之民則樂之神亦作之長淮之南楚為最劇守者為誰以才以德守既視事未逾厥月吏則胥畏民則胥恱物來必應事至立決守之動靜皆有法度不苟不簡不暴不怒處煩以敏輔嚴以恕庭無滯訟獄無寃囚民無愁歎俗有歌謳古之三府謡言奏事今豈不然兼採公議付之使節是以用之付之逺俗是以重之其俗既平其刑既清章德表功來朝兩宫兩宫聖明柱上記名送山陽太守李公維淮東南孰為州最曰李大夫實勞于外公雖老矣方壯方剛處劇而靜不煩以詳大率郡縣事如草芒而况楚州車輪中央傳繇其衝客出四旁北迎大車南亂巨航公移私訊駢檄交章大夫酬應談笑以將大夫甚健日力有餘事至立決罪無囚拘教以好語完其體膚據案而坐處之須臾吏休兩廊庭中空虛所以楚人愛公之敏揮刀截繩彎弓射隼敏所以輔其本則明窮姦破僞窺心見情譬如工師譬如良匠手無所設目無所妄物隨以就法隨以施大尋小尺方矩圓規嗟民雖愚所欲有幾曰敏曰明曰公有體曰不生事曰不悖理不阿不隨不激不詭民以是恱衆以是和何以送之其可弗歌在昔奏事實采謡言凡我鄉黨冝歌斯篇送江倅昔之别駕則有王祥其民歌之海隅稱焉今亦有人能紹厥後民之悅之稱不容口庶民所見乃其皮膚見察情僞見敏簿書見法平恕見獄空虗事見無留才見有餘已不敢肆人安厥居其所見者止於君子良士大夫謂其所性得之剛毅所以能斷所以無蔽所以敢為所以勇義決遣簿書是其餘事漢之朱博趙張龔尹撫恤大衆何獨古人王祥雖賢失在寶刀正而平者心則不搖人或贈之則弗受之借曰受之何佩有之弗佩曰正弗受曰平維平維正宜於朝廷用之一方一方之綱在我者正是謂為政送蔡守并序維淮送蔡公也蔡公罷山陽守奉使廣東故取公之行事章章在人耳目者述而為詩也維淮之南楚為劇州守土之吏孰明以周蔡公既來爰究爰乂明維照姦威維沮僞維明維威無敢恣睢侯曰可矣其治孔易乃興學校示之本原儒居儒處禮容義言乃修釋奠教民之恭有嚴其色有孚其顒乃行鄉飲躬為主人拜辱拜豆盥洗獻賓其儀孔肅其禮孔均乃召父老父老俱來幅巾短褐浩其盛哉父老升矣侯則興矣父老坐矣侯則妥矣父老未醉笑歌其聲父老既醉髮白顔頳父老去矣侯則舉矣餽之物矣告之語矣其語維何維善是示善者使修惡者使止告爾宗族告爾鄰里維時父老奉之以行維時庶民亦克用承悖傲者沮善良者興狠不敢鬬强不敢凌不義之訟莫涉吾庭行之期年幾移其風吏事用簡獄牢數空道上之物必歸其主行路之人無或敢取逋攘慝姦明其購賞傾其巢穴破其支黨侯曰未也江淮之患不備不虞乃召尉邏乃呼卒徒乃張爾弓乃操爾殳乃坐乃作乃馳乃驅勇者乃奮怯者乃舒我備既强我戎既整小剽之攘破膽縮頸侯之方略可以捍邊捍邊如何威名毅然何兵不精何城不堅人不敢犯敵不敢前侯有所祈曾不旋日雪雱雨零輿濡衣濕維其有德將之以誠神由以格物由以亨侯之為人不患不恕維恕維威維民維宜侯為使者不患不威維威維恕維感維豫侯之察獄不患不明維恕維明維平維精維時嶺表維時海隅聞侯之風既安且需寃者使伸戚者使愈吏長則進物殘則除抉其已垢刮其已汙維有其才無施不可用之本朝維良維佐用之一方一方之綱嗟今之人莫如侯者侯之所為可示天下維其可示是以可歌作歌送侯侯其鳴珂節孝集卷九
