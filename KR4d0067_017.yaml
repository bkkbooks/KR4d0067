body:
  text: 節孝集卷十七宋徐積撰律詩三十一首贈玉師失鸚鵡二首并序僧有玉師者養能言鳥一日食飽輒去作失鸚鵡二詞以遺之淮邊羇思嶺頭雲紺彩騰時電影奔一日恰如時輩事十年空負主人恩良因外貌貪馴性何况中心狎巧言他日雕籠如再養玉環金鎖鐡為門淡煙白浦月黃昏倚遍䦨干空倚門接翅定思雲外侣偷棲應望水邊村盡傳世上新詩去惟有籠中舊物存便是却來休更養不能成事只能言謝蔣頴叔二首赤帷大乘皇華使鳴玉鏘金訪教官紅斾緩搖春日晚清風先入泮宫寒一瓢鄭叟醉初醒五栁陶翁卧不安便著青衫迎謝傅更無茶果薦杯盤吟翁未去水雲間坐假虛名屈上官忽似仰山心貌竦更思言事骨毛寒繡衣自可招黃綬星辨須來對鶡冠莫怪開門迎候早今冬無雪卧袁安泣謝陳德任義重江湖叟情施墟墓間孤魂慰長夜老淚濕衰顔一奠方銘骨三年更倚山更分心兩處恍惚自收還和湯令所幸生平世甘於貧與疴被輿嗤杜簿挾勇恥荆軻已恨逢君晚無辭教我多野芹容一獻更索採樵歌召汝弼外府新讎校問君來不來春隨流水逺日被落花催煩子神仙御盡豫賢聖杯何時松徑下同坐踏蒼苔賑飢篇贈程守二首楚有循良守流民萃一方薪蒸溫病骨菽粟飫飢腸永欲充編戶無心憶故鄉恩深何以報惟有一爐香又乞得諸倉粟流民獲所依已燃薪禦凍仍用楮為衣病骨䝉新暖羸肌復舊肥故鄉雖有屋此處可忘歸送山陽宰髙奉議大夫歸斾暖搖春正好浮淮向汴津一片青山迎去棹兩堤芳草伴行人當官事業今彌劭滿槖文章老更新記取吾鄉䝉實惠吟翁亦是舊編民送吳坦求師仁清風門外客移船南郭衰翁但惘然未吐赤心無限事重尋皓首幾何年茶須飽飯吞甘溜酒便空心注玉泉醉倒淮東鄭雲叟吟哦聲調入雲煙贈頴叔一從西郭恩初重又至南庠義更深自恨杜微無所聽若忘龔遂是何心已知霜露情彌感更值淮湖氣作隂昨夜起來無月色誰知我為蔣公吟答李閎中節推王家池上芙蓉客曽把新詩贈野人不道形骸成土木却言風月長精神凡禽易識甘題鳳野獸難分誤比麟努力唱歌酬不得枉教白雪落紅塵和沈判官精神滿腹其才裕清白當官所性存國士正居王儉府野人未識李膺門詩筒便恐傳新句酒席方陪飲上樽從此定須懷賤叟他時來訪我兒孫謝蔡子驤好客重來直上㕔龎家妻女合炊粳名言一坐令誰聽老病雙瞳為子明有道長官方就祿無能司戶欲歸耕如斯出處俱平易義理難時即共評寄朱至機二首雲出無心鶴倦飛還家歡笑綵為衣雪醅為夀酒初熟玉臠供甘魚正肥侍燕每操笻杖去看花常御板輿歸故人願子無窮慶莫使淮南音信稀六十詩翁愛幅巾清江濯盡洛陽塵若無野客來同巷合有山僧去作鄰醉卧不知雲到枕吟行唯許鶴隨身眼看富貴真如夢說到窮通定笑人寄頴叔南郭茶杯菊未香西簷老栁覺踈黃家無縣令雙鳬舄夢有仙人五色羊梅信易傳來嶺北鴈書難附過衡陽定知逺俗懷公義若說威名背負芒送婁六秀才趨時之悔真良說枉已之徒信厚顔學者淵源當似海丈夫持守要如山挺然特起麟孤角鄙矣誰窺豹一斑為子臨行雙泣下白頭人倚夕陽關和楊守清容堂并序山陽太守楊公知開封縣作堂於治所名之曰清容士大夫美之以公自道也於是作詩纍成大軸公不以某為陋使得與觀焉因記東漢陳蕃之徒清而少容其蔽也隘故至於疾之已甚而遺患天下漢氏之所以敝也唐之郭子儀賢將相也考其心迹有容民畜衆之德然失在太寬故其下多不奉命失師之律其咎如此然後知清而有容足為全德以此意述而為終篇也其辭曰赤縣堂名清與容主人兼得古人風此間便是烟波上何處更尋山谷中志激懦貪無弊俗詔宣寬大有餘功若將全德評今昔應笑陳蕃郭令公書狄梁公傳李氏山河勢若終手提長劒截長虹請將唐室中興事可比汾陽再造功直道不為邪黨敗逆鱗深得諍臣風儒生若有逢時幸未必勳勞盡在公夜賞春寄敦復莫道山陽官苦辛大夫未是不閒人晝來琴上披尋曲夜入花間㸃檢春拖袂帶歸香滿袖回燈引去蝶隨身髙才自有風流格吟作吳謡事最新戲答君錫酣戰之句檄書插羽來何速鐵騎成林勢未分北壘噉聲雄似虎南營殺氣猛如雲陳前劒客投犀袂帳外歌姬曵繡裙且待揮兵酣戰罷却行三舍避將軍和崔刑部憑欄伏讀憑欄意私心輒慨然聖徒須企聖賢黨必思賢主上方髙枕民間正息肩使君當自逸治狀已光前示汝弼十載交情義有餘離羣還歎索然居一畨思我須成夢每度人來定寄書此日相從尤欵密他時何處覔迂踈回來徑哭青墩墓莫向南城問舊居和汝弼蘆葉銜來逢北鴈筠筒信斷候南風看回白馬殘陽後吟盡閒雲落月中酌水何時尋陸子寄裙前日為梁鴻孟光多謝閨房秀醉酒亡繒是我翁呈敦復朝奉清心自皎然應將外物比腥羶詩歌與性相娛樂聲色因喪永棄捐有義眷余東野舊無能留子北忩眠殷勤為釂陶家酒更送瓷杯與竹箋代書寄次翁病叟雖迂濶交情自不踈喜逢歸去客為謝寄來書入幕評文後臨川視事餘攜壺吟兩栁還夢野人居上蔣公公如鄭相憐窮士我在所知韓孟間下客心形渾是木髙賢禮義欲齊山十年用力人誰及百計酬恩事總艱投筆若從班定遠橫戈先出玉門關和路朝奉退居彼美東南雋堯時作外臣有何歸去物全得老來身一節都無變平生總是真勇於羅守退甘似庾郎貧士望今誰耦儒林舊絶倫其心醇是本以德厚為珍避盜抽園笋容奴取庫銀時情付流水外物盡浮雲久矣謀閒坐誰乎願要津書藏萬卷好詩換一筒新聚道為家法分糧恤外姻清風還楚部餘惠在江民藉草宜蘭佩穿松稱鹿巾鱠材須活鯉羮劑要香蓴日暖花村路風溫荇浦春耽吟白居士沉醉李仙人驥鳳鳴來久駒雛教已馴義終光國史名自壓朝紳顧我愚而陋煩公愛以仁深恩無報處北望正勞神送至機閉門有幸藏衰病䇿杖無因奉俊游繩縛筋骸方就枕火燒皮骨正思秋覽君健句如逢藥慰我孤懷勝憑樓見說束裝行未得夢魂先到楚江頭節孝集卷十七
