body:
  text: 節孝集卷十九宋徐積撰律詩三十三首送慎彥鄰赴舉天子詔多士喜君為此行美璞必三獻大禽終一鳴寄蔡子驤為報廬陵客逢人且寄聲不知無恙否何日到南城送管久中半開醉眼天方曉急遣詩筒去已遲别恨離愁無盡處青山緑水有窮時贈鄭毅夫致主濟民道未完白衣卿相且盤桓龍頭已是輸君早更向麒麟閣上看戲答何楚才酒肆身在塵埃氣在雲丈夫貧賤豈須論且為韓信淮隂事休著相如犢鼻褌和張文潛晚春四首留春是芳草送春宜栁花日長花正亂誰倚䦨干斜又問花開何遲問花底急飛人間惜花少閬苑等花歸又易貯千尋水難藏一㸃春也須幾杯酒還似送行人又渡水衣須扱穿林手自披經春腳力軟但恐上山遲二老寄朱廣微二首二老相思又隔年僧窗閒坐復何緣吟翁最好鹽城住時把歌詩付酒船寄聲切問朱監利對靣勤詢劉貴池或見廣東程使者為言收得寄來詩送曽子開楊子江頭風正寒行人莫歎渡頭難江頭楊栁豈常在但向江頭洗眼看送慎彥鄰只知北海鵬將化不謂丹山鳳正棲却憶吳江橋上月共君長嘯入雲霓吳舒信道淮干風起木枝搖頷下瓷甌一尺髙我是折薪扶耒手中丞且莫笑粗豪呈張敏叔子善居官事可宗淮西聲譽接淮東皆知所識明無敵兩主斯文敏有功麗賦總應輸老匠清詩恰好送秋風便乘急棹辭譙守酌酒仍吟塞上翁譙守謂蔣公也作此詩時未知蔣公所之乃今知在符離贈探花郎探花車騎似游龍未入桃園先閬風衫上十分新染翠衣間一㸃半開紅身如驥子無雙俊人報鼇山第幾宫便是醉仙何處去上林園在五雲中寄吕祕校淮上詩盟不可尋詩筒來往負初心風花雪月雖無限留待他年共子吟贈余進士江南風物清溫好關內河山氣勢雄更看蜀中山水秀一時兼取作吟翁寄王潜聖誰言急景似飛梭我把光隂欲快磨却想殘春笑君處無何有路覔君多答范君鍚有人惠我一枝花五彩粧成千萬葩蜀紙寫詩酬國艷吳瓶汲水貯香霞半酣酒色從人贈盡帶春風入我家醉倒吟翁君不見兒童偷與插烏紗上胡先生昨夜重思太古音確然獨抱一張琴因何不聽吾夫子枉被雕蟲纍到今和潘朝奉大人髙調我旁酬韻欲更時更少留待學鸞歌聲已嗄將追驥乘老而遒曉隨帆去雲連海暮望潮來月滿洲須道詩翁非世俗年家情義幾時休和吕祕校十首董子書幃正寂寥阮君何事顧吾曹兩篇有若雙瓊贈八句多於一字褒莫恨潘安頭早白須知郢客調彌髙鸞凰豈是塵埃物待看青雲振羽毛王子如今未夢刀不須感慨論官曹寢郎悟意猶為相鄠尉知名固可褒嗟爾嵗華何太速顧豫儒業若為髙四詩已有重箋意肯學區區鄭與毛東平心事本雄豪何必才名獨慕曹學比今儒醇且奧詩如古義刺而褒鄒之夫子誠堪嘆霸者將軍未足髙賢傑固當謀逺到莫論山嶽與鴻毛能建功名是俊豪區區時輩乃兒曹班超投筆寧無志樊噲橫行謝見褒兵法每羞孫臏詐將才惟愛武侯髙他年不負東平約待假偏師入不毛我謂君才似楚騷文章自可作清曹但持古道徐而待莫顧時人毁與褒水以源深流自逺竹因根老節彌髙如今且作東山卧萬事紛紛比一毛東平夫子困徒勞又著青衫詣選曹州縣頗聞輿論屈朝廷當用詔書褒囊中莫把詩編去輦下方虞紙價髙曼倩若教為近侍舍人須愧古無毛方今天子急賢時不信王通願已違梅福九江雖好遁陶公八翮亦難飛世排韓愈為文僻客顧揚生載酒稀多謝好詩來贈我曉齊歌誦暮而歸汾上儒生又續詩陽春巴調本相違聊因扣角攄深憤安得摩天逞快飛陶氏㺯琴乖俗甚井丹持刺出門稀有時入市謀甘脆懷橘擕壺即便歸太平儒者好吟詩鼓腹而歌事豈違顧我才華常患少喜君辭翰動而飛不憂陋巷簟瓢罄惟恐蘭亭唱和稀更約山翁同一醉梅花將謝燕將歸吾道窮通自有時功名豈便與心違摩天未逐溟鵬奮斂翅尚如籬鷃飛鳴鳳卜遲君莫笑玉山醉倒事何稀梅花將謝剩沽酒待向花前倒載歸贈蔡子驤二子鳳子能雙舉新從日下回日邉是雲霧却帶越書來節孝集卷十九
