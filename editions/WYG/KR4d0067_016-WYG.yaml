body:
  text: 節孝集巻十六宋徐積撰律詩四十一首寄吕海州嘉問朱輪海上新迎部玉笋朝中舊立班曽屈髙風來泮水宜將老夢到朐山霞張列炬紅彌野潮作飛霜白叩闗三四百川為第一日華先照郡樓間贈至幾五首淮東學士求新範海角仙人棄舊居不用更携揚子醖但來同噉庾即蔬赤墀待把文章獻黄綬難親議論餘泮水宫中方就講何煩留下橐中書西城塔下逄君後南郭庠中借館居正共孤甥棲暖席未如老圃灌寒蔬直生豈敢嗟年暮餓死猶慚乞祭餘六十衰翁如可敎更忙須遺所藏書僧房幾載如禪定州序今來以義居直道褐衣猶勝錦枉身牢鼎不如蔬何心敢冀漿先饋無善兼令嵗有餘最是學文方自訟只堪把筆教兒書南州本是諸儒秀上國宜從大隠居别我好留仙竹杖送君欲獻野芹蔬所慚下士文章陋未報諸公禮義餘若見汝隂前太守為言迂濶正談書誰家門外栁雙株滿屋清風是我居霜後正逄籬下菊雪前已貯甕中蔬沫流口角耽吟睡毛墜頭心久病餘努力正如初學輩老瞳昏澁夜看書復明經上欲求稽古天書下四溟儒風久湮鬰詔意乃丁寜削剥因唐氏源流自漢庭春秋披日月易象炳丹青禮樂搜潛奥詩書抉杳冥今焉拘注疏何謂復明經和蔣龍圖吟翁如共老莊㳺物外能齊樂與憂鼇背不為三島客魚竿終泛五湖舟何須大使詩來問合使幽人病為瘳陶令菊花猶有在未知肯飲一杯不送吕清叔四首人為多情乃送君余雖不送情更深破窻半夜風霜冷危坐燈前為子吟平生志在青雲霄十年不飛藏羽毛夫子乃是知我者吟詩贈子何辭勞怱怱一棹向東行抖擻空囊無一金買魚沽酒向村市典却蔡家焦尾琴深院吟哦夜半時須有鬼神聼此詩吟聲徃徃到明月淮上有風揺桂枝和蔣頴叔二首城外人傳大使來吟翁正共客銜杯赤帷便記長安道駿馬仍思御史臺義色可令姦膽破剛姿不為疾風摧公能幾日山陽住待報舟人且倒桅盛徳尊光不召賔玉環香弁自迂身北窓卧者陶元亮大使車中陸子真自道老來心愈壯若論兵後氣彌親所慚舊學非精義仰負髙風如古人送人之洛陽待到伊川濯盡塵洛陽城下且留身文才得似長沙傅試問如今有幾人寄蘇子由午日移隂後行人罷燕時路從西郭去船值北風吹夣裡猶廻首心中欲附詩從來義如此兩意自相知贈慎叔良我是東臯叟君居在屋東已曽同硯席最好共耕農蕙帳兼棲鶴藍輿亦帯笻若評樵採事須更喚鄰翁寄田大夫老掾成迂闊彌年信不通白頭負髙義病眼想清風奉使更三節題名在兩宫有人能舉類舊徳起淮東寄慎朝奉一别三千里俱為六十翁日中多俗事枕上憶清風聞子生雙鳯看書快兩瞳以囊仍貯果寄我厥包紅寄張景修東南未囘客行樂又經年呉市花朝酒松江月夜船窮簷無屋住廣殿有詩傳若論平生事無如任自然寄朱博士呉有朱夫子相知凡幾年心憐閉門叟書附過江船行巳為人表文應許世傳臨風有餘誨時復慰皤然和李閎中幕官真有道野叟是何人彼此新詩贈兼之古意醇若論今世事前是老農身誰謂芙蓉客能來相顧頻送王潛聖四首前日喜重來今朝復送廻出門無僕馬為子走風埃逺客有詩贈短亭無酒杯南州雖得士東觀却遺才又一自渡江津茫然不記春船諳淮上月馬慣洛陽塵可去問唐舉未須慚買臣終令舊闗吏還似棄繻人又兩翅慢如雲倦飛歸故林褐夫懐有玉貧女缺無金北闕報初罷南陔情更深升堂拜親後先看白頭簪又南北倦遊客離家幾問津文隨年共老名與徳俱新射䇿謾稽古抱闗猶誤親窮通只如此寜愧斷機人送李守千兵州將巳嚴裝猶入西庵曳繡裳坐燕起來中酒色行春歸後落花香難酬髙義情彌重欲述餘恩事更長但看楚人遮道處草頭垂淚濕殘陽寄林虙昔者淮南使剛中輔以和生前無所苟身後事如何有子泣枯草無人誦蓼莪林公為不死下客謾悲歌送蔣憲二首節用黄金詔紫泥皇華仍賦使臣詩三千里路爭迎送五十州官待指揮盡解纍囚南到日却尋急傳北歸時趣裝亦有明珠否八樹成林桂一枝逺服兵刑事可知全呉分野有星移漢家詔使登車後蜀道忠臣叱馭時山色迎來城到近桂香隨去馬行遲梅林亦是公家管廣帥應須寄北枝和蹇受之四首出乎志者莫如詩商也能言得自誰雅頌漢時猶未逺風騷齊後若何衰翰林飛去秋鷹健工部行來老驥遲亦有孟韓聨句好姓張員外合肩隨右詩清而勁者􅅇為竒哀絶孤髙更不卑日暮誰人凭樓處月明離婦擣衣時何煩作賦攄師憤最好傾心破主疑一弄便能歌怨曲唐衢義哭合相隨右笛醉鄉恍惚在空虚若論真恬世所無坐客任貪清者聖今人何作古之愚宜教側帽穿花過更好敲門趂月沽誰似陶潛最瀟灑籃輿歸去不須扶右醉笑樂真情豈可誣樂而不笑是何拘日中無事逢碁局春後有花兼酒壺輕俠兒前撫手掌滑稽傳後掩髭鬚江南陸俊還安否乞與笻枝使自扶右笑謝趙朝散一識明侯二十年老農依舊未歸田學無所得成迂濶義有其終尚愛憐下筆自書青竹汗上樽仍附玉山泉如斯厚意難空飲待折梅花配酒船謝秦少游并簡参寥講罷潮溝吟綠槐手持銅鉢待相陪青瞳好客難留住白足髙僧又帯廻今日許尋陶令菊明年約寄陸生梅龎公妻子方炊黍且報舟人莫起桅送李漕淮上衰翁何所為有人寛厚誤相知光華奉使方行部款宻成書更附詩在泮飲時常睠睠乘軺過日倍遲遲縁公禮義如斯重好寄梅花近北枝送雲鶴山人倦鶴㝷流水閒雲歸故山青囊書在否留取教人間和孫元規資政㳺園三首禁烟娯樂且須頻二月風光特地新料得壺中無俗客更聞歌者盡陽春酒來花下斟瓊液茶向松間碾玉塵應笑謝安空寂寞東山終日為何人紅作簾帷翠作裀隨軒歌舞一時新未知醒者何如醉且向樽前莫負春烟重栁梢寒蘸水日髙花徑暖生塵自從三月芳菲後誤入桃源又㡬人竹為籬落水為鄰草碧花紅一徑新盡日歡聲連緑野滿城和氣入韶春歌姬汗濕眉間翠舞妓香生襪下塵酒陣詩兵皆大敵未知元帥屬何人節孝集巻十六
