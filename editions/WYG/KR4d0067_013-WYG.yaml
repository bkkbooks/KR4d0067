body:
  text: 節孝集巻十三宋徐積撰古詩十六首復古頌并序漢承秦滅學能以經術取士自孝武帝始故三代而下漢為盛至楊隋建進士科李唐又加詩賦之類破壊學者於是天下盡為進士而明經之路寖徒不復矣故楊綰賈至之徒發憤建議而代宗不能行遂為庸人所沮豈不謬哉皇帝三十六年乃詔天下復以明經貢士明經古之道也進士非古也明經之道寖以長則進士之路寖以消此朝廷之意乎春秋之義貴復古春秋之所貴固學者之所宜歌也頌曰其難其難道亦大艱或缺或完戰國盜竊嬴秦暴孽遺風餘烈所存㡬何枯株之柯填源之波漢得天下方有學者其徒蓋寡孝文孝武稍稍復古仲舒之伍巉嵓崢嶸窮先王經道乃大明西漢之風與三代同實儒之功晉魏冦讎學者寖浮不源而流齊梁之間斧斫刀剜大樸益殘隋唱唐和元氣盡破為斯文禍學者皇皇賦道大光六經逃藏冶容艷膚繡衣紅襦衆奔羣趨若大有為謂之背馳終身寒饑物不終盛皇帝有命萬口齊慶復明經科大張網羅海隅山阿麟之奔奔鳯之軒軒龍之蜿蜿㑹稽之竹崑崙之玉牛山之木逄䝉執射伯樂進馬造父御駕琴瑟既更韶音濩聲復還於今唐虞之謨夏商之書其庶㡬乎天下之賦摧縮消沮迷失道路革萬世弊興萬世利繄我皇帝臣敢不歌流為太和百世不磨暴雨玉女投壺天大笑千尋火炬當空照老龍行遲天忽怒雷車壯士􅗟連鼔黒鱗鐵甲十萬許急把銀河傾作雨思誠齋夜坐胸中不平氣忽然凌太虚無人哭一聲半夜思唐衢逃席主人雖好事其來不知幾胡不築髙垣胡不闗重扉不敢直道退遂由邪徑歸飲過即有疾何以慰親闈有客何為者有客何為者不穿亦不鑿匣中是何物塵埃漬鋒鍔登山守直道荆榛與溝壑安得百畆田以就斑衣樂周長官出二子詩相示丹山一鳯雙雛生十分羽翼三分成未能飛奮先能鳴纔鳴不作凡鳥聲羽毛安得相混并鵬霄九萬當冥冥簫韶九奏儀王庭光華舜旦魁羣經又贈二子周氏二子千人英余觀其詩余輙驚渾然骨格已老成凛乎辭句氷霜清不然何以知君名余知必作詩之精今觀君詩眉且低文章老大無人知少年便莫相輕欺丈夫壯氣如虹蜺古之庸者猶雄飛青雲自有相逢時封本堂四言并序淮南轉運副使黄公即其所居因地之宜構為棟宇名之曰封本堂謂山陽學官曰子能有以述而賦之否乎學官曰唯唯蓋所謂本者民也譬如植木培而封之其本必固既固必茂本固而末茂蕃衍盛大必然之理也即委而弗顧弗壅弗培又抔其土而去之或斧其榦或戕其枝則木之長也其可冀乎固君子之所閔也故因其職分設施所好恤民之災救民之患其務在乎一切便民使夫農安於其野賈安於其肆各得其安而不失其職通舟車之貨平闗市之征凡一州兩税者悉奏罷之其法始於淮南而行乎天下天下受其利矣即世世弗改世世受其利也封其本者孰大於是以此名堂誰謂不然物無其實其名弗至實以先之名以次之事無其實君子弗名可表其實可考其行信斯名者斯民可見樂斯名者斯堂可燕可燕可歌使臣之光有孚實惠民悦無疆書江氏芝草記後四言天門嶪嶪洞達通徹地雖幽隂明白昭晰有來即應無徃弗答或旋其日或逾厥月或降吉祥或出妖孽或生美好或産醜缺或使合并或令分裂凡皆若此其故可説人之所喜神則懽悦和氣流暢精粹凝結草木受之形類孤絶其無所苟而不徒設爰有江氏世載其徳子子孫孫能敬勿失其叔有令如出諸意戮力同心道路相繼二十六䘮收歛聚㑹在圉之北同日俱瘞廼有二物以彰厥美其一維何是曰靈芝如蓋上設如杠下持其色黄紫其光陸離其肉堅厚弗枯弗衰其二維何是曰連理巨榦脩枝貫通骨髓物不可間人不得披以類攷之不必異本其竒若此其吉勿問其恍其惚其惚其恍必寓諸物以來神貺維神之貺如岡如陵有徳者勝徳雖可勝其心兢兢則亦可承維神之貺必以其類或大其家或大其世敬之戒之永終厥義新安吕公尚書夫人墳四言一首彼美新安有水有山有墳巋然百五十年爰有曽孫赤韍朱軒來守兹土以慰斯墳掃除必躬奉祠必親水毛陸産膋牲上尊百物皆具千兵駿奔觀者如堵從者如雲心追無窮誠通無垠溟漠之魄恍惚之魂如闢其塗如啓其門如興于寢如作于室如出黄泉如見白日謝秀才晦庵山有武夷水有建溪有猿有鶴有庵可棲有庵可棲云乎不歸哀吟贈蔡子驤女蔡氏之子彼仲女者攷之古今如仲者寡有徳之容有徳之性所好所習一出於正貎莊而麗氣溫而醇女子之中而有斯人慈良端厚内敏而重終日寡言亦不戲弄字無難易所見輙識不知此女從何而得讀釋氏書欣然有適身之所有皆出自然如何不幸不假之年揚州道中死於六月二十七日暑氣酷烈二十九日三更大殮形神如生體亦不變其氣甚潔其香甚郁附於身者何用珠玉不知此女而徃何處杳杳冥冥雲霞烟霧世之所有則維其常若斯人者獨秀孤芳吾於其母是為内兄哀吟惻惻慰其死生題淮隂泰山行宫廟泰山隆隆作鎮于東有如配林在淮之隂厥廟維嚴厥貌維肖斯民奉之是為别廟登淮隂古城并序蓋以傳考之所謂甘羅城者非也謂之淮隂故城可也余登斯城為之歎息久之蓋韓侯天下之竒丈夫也方其寄食婦人受辱於市其志固巳大矣及乎出自亡命杖鉞而起決䇿東嚮項籍之輩已在掌中而天下勝負定矣其兵一出遂虜魏王禽夏説斬成安威震海内戰勝而不驕方且問謀於敗軍之將西面而師事之一何竒也平齊之後請為假王行縣陳兵藏匿亡命此皆智者之所不為一何謬也然而雲夢之游蓋亦遽矣此實髙祖豁達大度其弊入於不審而果於用詐遂令無罪無辜身被囚縶怏怏不能平鬰鬰不可活而至於此之極也方此之時以義處命能平其心者是何人也是其所養者巳充所充者已固利害不能揺死生不能變姦人不得施其計辯士不得措其辭確乎不可㧞者也至如韓信者其才雖竒而所養實不與此故可以處無憾故能卻武涉拒蒯通知義利之所在也即不可以處有釁而况身被廢辱如此之甚故其僥倖萬一終之以敗死支體分裂肉骨糜爛亡宗赤族為萬世之笑豈不哀哉余既為詩因序其事其亦庶乎登髙而賦為功臣之警戒也此城不可名甘羅淮隂侯國寃忿多其氣鬰鬰而勃勃遂令平地生嵯峨愛愛歌并序子美為愛愛歌巳失之矣又其辭淫漫而序事不得愛愛本心甚無以示後學余欲為子美抉去其文而易以此歌以解學者之惑其序曰愛愛呉女也幼孤託於嫂氏其家即娼家也左右前後亦娼家也居娼家而不為娼事者蓋天下無一人而愛愛以小女子能傑然自異不為其黨所汙其巳艱矣然愛愛以小女子顧其勢終不能固執此其所以操心危慮患深之道不得已而為奔女之計也於是與其人來京師既數年其人歸江南遂死於江南愛愛居京師自以為未亡人也慨然有必死之計故雖富貴百計萬方卒不能動其心以至於死此固不得謂之小節是竒女子也古之所謂義烈之女者心同而迹異按愛愛所奔即江寜富人張氏也張氏納奔妾於外棄父母而不歸以至其父捕去此乃不孝之大者固不得齒為人類禽獸之行所不足道也故余之所歌意有詳畧事有取捨文皆主於愛愛焉歌曰呉越佳人古云好破家亡國可勝道昨夜閒觀愛愛歌坐中歎息無如何愛愛乃是娼家女渾金璞玉埋塵土歌舞呉中第一人綠髮雙鬟纔十五耳聞眼見是何事不謂其人乃如許操心危兮慮患深半夜燈前淚如雨假如一笑得千金不如嫁作良人婦桃李不為當路花芙蓉開向秋風渚忽然一日逢張氏便約終身不相棄山可磨兮海可枯生唯一兮死無二有如樗櫟叢中木忽然化作瀟湘竹又如黄鳥春風時遷喬林兮出幽谷文君走馬來成都弄玉吹簫纔幾曲不聞馬上琵琶聲却在山頭望夫哭去年春風還滿房昨夜月明還滿床行人一去不復返不是江山岐路長前年猶惜金縷衣去年不畫深燕脂今年今日萬事巳鮫綃翡翠看如泥一女二夫兮妾之所羞不忠於所事兮其將何求蛾眉皓齒兮乃妾之讐不如無生兮庶㡬無尤喓喓草蟲兮趯趯阜螽靡不有初兮鮮克有終鴛鴦于飛兮畢之羅之人間此恨兮消何時深山人迹不到處病鸞歛翅巢空枝一般花下飲一盞一般花下飲一盞但是花開不須揀亂紅亂翠巳迷人猶望桃源廻醉眼節孝集巻十三
