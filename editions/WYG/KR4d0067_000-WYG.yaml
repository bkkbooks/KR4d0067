body:
  text: 節孝集别集類二宋提要臣等謹按節孝集三十巻宋徐積撰積有節孝語録巳著録積少力學受業於胡瑗之門淵源篤實其事母以純孝積立身亦堅苦卓絶盖古所謂獨行之士然其文乃竒譎恣肆不主故常故陳振孫書録解題引蘇軾之言稱其詩文怪而放如玉川子今觀其集往往縱逸自如不可繩以格律軾所論者誠然然其文雖雅俗兼陳利鈍互見頗有似于盧仝而大致醇正依經立訓不失為儒者之言則非仝之所及也惟其復河説一篇欲求九河故道而穿之不究地形不明水勢未免失於迂僻史稱其雙耳瞶甚畫地為字乃始通語終日面壁坐不與人接而四方事無不周知其詳殆不然歟舊本首載事實一巻後附語録一巻景定甲子淮安州學教授翁䝉正合編刋行明嘉靖間淮安兵備副使劉祐又因翁本重刋今語録巳别本孤行不更複載惟附録其事實一巻備考核焉乾隆四十五年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:6074dc605d07d306756cb99c32e128bf966c025a318ea60e90434e6f02baefbb
