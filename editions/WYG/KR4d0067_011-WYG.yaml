body:
  text: 節孝集巻十一宋徐積撰古詩二十四首寄王十七丈舒州懐寜尉是我丈人行兩遺小書去其禮若非抗何徳稱殊禮胡顔拜首貺更致附吟哦以問公無恙寄張芸叟豳有張芸叟言行俱無邪攝官為别駕虢州仍近家寄書來報我便可取其兄兩縑為一被同卧復同行寄呉安中十月十四日人自江東來書詢杜微病粟代陸生梅髙義有如子恤病而救災老身將入土報之何如哉贈魏教諭酒官幸得風流掾任貴須沽不須賤共君吟笑醉春風詩似陽春共黄絹祝君長作白頭吟台背肌膚凍黧面贈陳誠父東海陳誠父回身過山陽登時來見我言恕而行方主人太山野薄意似酒漿仍勸客莫飲恐酒有所傷贈張才父自笑陶潛輩相逢却論兵誰知陣上客時訪郭西生喜公抱忠義顧我非縱横今來求篤論古事聊一評竒正要兩存衆寡不可輕兵間有萬變所慙思弗精贈陳糾子來别我時送子到巷口約去百步地出巷更引首乃與二三子回所舍依依故人情可見何用送行詩和蔣龍圖二首公之所設施道徳之餘事有性給其才無物蔽其意大車積以載牛刀迎者解以要操其綱以妙觀其㑹善譽不盡知善毁沒可譏校之古人輩彼若有所為公之所然者以智不以鑿其力日以裕其濟日以博至於我曹者使相望相聞猶能領官屬携詩叩吾門先看陶家栁次看陶家菊茶中許投花坐上呼燃燭顧我為樂叟勉我以不倦我是孟東野終附鄭公傳又鷁口銜波船過猛檣幔排雲北風𦂳耽吟俊老繡衣寒傳詩急使筠筒冷詩同使者從何來謝安枕上吟哦回吟哦去望江南雪雪中徃徃梅花開和李自明自明多竒辭更為竒怪歌好共盧仝騎騄駬吟哦直上崑崙坡更令張旭輩醉中揮筆書嵯峨安用呼老子兩脚跨槖駞有命得堅疾無術除沉疴一從水木迭用事肺為廢物囚網羅而况小暑之後有初伏與大暑更添熱厲兼昏魔骨間赫赤炭丸走皮上烘炙鐵手摩有時一屋之内但覺湯火近不辨鑊與鍋手持匕箸腹先脹酒到喉嚨顔已酡青黏漆葉無所用鳥伸熊顧其奈何五臓孰云可湔洗百骸終恐生蟲窠脫身難上赤霄路夢魂忽泛滄溟波滄溟盡處是星漢有人常弄機與梭枯槎去後更無客歴歴赤桂來經過取得良書掛牛角持將斗柄吞明河但把明河吞滿腹不去龍田拾瑶玉便控鼇頭出海來霞㸃雲痕在眉目起穿兩栁行青莎怪歌使我須吟哦吟哦作文非小事要為法度後世無譏訶大抵文章本諸内歸之無憾斯平和擬之於經輔之友精講明辯相切磋君雖病肝其心可用教我雖病肺心亦不自阿日夜思索已矣老矣所學亡失多和倪敦復二首一别北軒君參商與胡越先聲從西來塵榻為君拂吟行時引頭吟坐即揺筆未見問行人既見惜短日緩頰相問勞劇談盡忠切耳竅雖塞豆口角自流沫崔子祥而論祝令閔且說籬間菊參差樽中酒澄澈把酒互相勸投菊兩不絶客主莫分辨僮僕亦娯恱若比龎公家妻子不羅列悔令唱驪歌惜不醉寒月念子為令尹行義髙突兀當官志不回歛版腰可折與俗皆背馳而慕古遺烈竹節未便堅劍氣久已發其時東野外頻煩大夫謁篇章日相㝷氣勢誰可遏仍携大軸來使我兩目閲人事有合離嵗月成恍惚逸翮騰方髙駿馬足不蹷子實不我忘我亦不子忽與之氣類同見之心欲豁金城不可破鐵槊不可奪擇交蓋已定言志亦已合布陣詩甚詳揮洒手不歇更約臨行時斯言可贈别縣令醉時花滿睫縣令卧時雲滿榻其時北面竹軒涼雨聲霎罷風颯颯美人爭唱醒酒歌濕透紅綃聲未匝玉容沃以沉香水瑶槃凍屑珠璣雜魂夢適從何處來帳中猶把浮雲􅂿自説騎鸞向閬風到時玉洞諸仙合只被桃花迷殺人行顧瑶闗忽雙闔枕上猶能走筆吟纍纍吐出珠千蛤壓倒唐時白與元兩翁相顧如何答答范君錫醉中吟問風流掾酒價太髙何日賤如何使我典衣沽詩人未有春衫絹詩人有酒不須歌自有春風四面多山陽才吏倪大夫煩君為我特致書正月臘寒猶未去諸君吟坐待圍爐報漫翁無錢可沽酒青衫典不得黄卷賣不售借問公田中秫米種幾斗休管將來旱與水莫為妻兒種粳米兄來留下二萬錢送與酒家主人未不然何計見春風空將花揷白頭翁簿書營營㡬時了何如載酒訪揚雄漫翁俊逸幾無偶安得吟詩類中酒却是蓬頭枕上吟不知還有人嗔否漫翁春思今如何但覺新詩老更多却應笑我粗豪甚頗似將軍出塞歌呈周裕之海陵周裕之又為淮上客來尋南郭路不見張宜伯宜伯在京口不知誰與逰時時應北望只可見𤓰州恨君不作洛陽客余雖不作洛陽客自有吟魂兼醉魄吟魂醉魄御風行看盡千花萬花色寜知洛浦有人留挽定春衫歸不得脫身誤入嵩山中山中逢見白鬚翁懽然借我雙金童須臾引入花林中亂花深處迷西東花光照天香薫空金盆挹酒雙瑶鍾酒酣邀我吟春風紺雲千丈揮玉虹搜羅萬變窮神功有人飛下紫霄峯酬詩解珮聲玲瓏余方却歩不與語笑余不似鄭交甫答錢思權兩箇學官位都來一歩地青眼與白眼五日不相視子為道塗行我為刀筆吏兩者較勤勞大同而小異妾薄命并序妾有過江館題其壁作隠語詩者其文甚哀且自言呉女也士大夫相告而感之余嘗病呉風俗多不嫁其女樂以與人而婢妾之至不幸有良家子失身於人者甚可憫也故因所感作妾薄命以告呉之父老其亦庶乎憫而悔之悔而改之也妾家本住呉山側曽與呉姬鬬顔色燕脂兩臉緑雙鬟有貌有才為第一十嵗能吟謝女詩十五為文學班姬十六七後漸多難一身困瘁成流離爾後孤貧事更多教妾一身無奈何其時癡騃被人誤遂入朱門披綺羅朱門美人多嫉妬教妾一身無所措眉不敢畫眼不擡飲氣吞聲過朝暮受盡苦辛人不知却待歸時不得歸羅衣滿身空挹淚何時却著舊時衣如今如今八月九月時吟翁還愛黄菊籬及見清風楊栁枝時時對栁呼酒巵頭顱半秃牙齒稀村田未去尋牛衣為唱驪駒不及時主人先道無庸歸夢中作詩翁吟袖忽翩然便脱紅塵騰紫烟一身病骨如生翅兩道銀河不用船奔星相隨趂明月鳴鸞引去追飛仙琅玕樹下夜宴起雲童為汲瑶山水仍遣詩筒寄閬風詩筒落下烟霞中人間知是吟哦翁舉頭齊望青冥空誰何哭誰何哭哀且危白頭母朱顔兒兒忽捨母去母何用生為架上有兒書篋中有兒衣兒聲不復聞兒貌不復窺誰何哭哀復哀腸未絶心先摧母恃兒為命兒去不復來朝看他人兒暮看他人子一日一夜間十生九復死君不見昨夜人靜黄昏時含辛抱痛無人知其時忽不記兒死倚門引頸望兒歸客去客去即吟詩吟詩即飲酒時時進一杯徃徃積成斗貪憶洛陽花忘却江頭栁借問别離客得似㝷常否醉中詠牡丹此花未開時美子藏深閨香心若無有深淺何由知前日花忽開美人放出深閨來春風盡日不相管鶯是即兮蝶是媒誰將金錢擲西子笑中不掩燕脂腮君王親執紫金盞太真又醉白瑶臺此花萬態不可説莫教容易為塵埃我心雖然淡如水為花一醉何辭哉節孝集巻十一
