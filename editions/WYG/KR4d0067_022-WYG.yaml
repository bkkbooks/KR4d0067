body:
  text: 節孝集巻二十二宋徐積撰律詩四十一首春草日暖郊前雪盡時東風吹起緑初齊人來花下禽偷避客到山前路已迷洛邑少年金作彈杜陵驕馬玉為蹄歌樓酒市無尋處踏遍青青日已西題紫極宫不須騎鳯跨鯨鼇來訪蓬宫是我曹玉笈著書金簡重碧牌題字紫垣髙因思大道閒閒意頓覺浮生事事勞一榻清風曽晝卧畧無塵夢及三刀移竹和倪敦復孫公髙義薄千金豈顧池邊竹淺深此物定非今俗好與公相伴古人心但看嵗久孤堅操不為牆間尺寸隂正是北忩閑卧日陶家兼有一張琴栁上見鶯楊栁枝頭見適從何處來青春三月盡黄艷一花開舊燕元相識新鵶近與陪聲聲吟得好未必乏詩才贈玉師鸚鵡學得能言不自閒雕籠何異網羅間客來青鎖常遮面人去長門深閉關感物寸腸絲欲㫁離羣雙淚血猶殷如何放我西歸去骨肉相抛在隴山舞馬詩并序唐明皇時嘗令教舞馬四百蹄為左右部因謂之某家驕其曲謂之傾杯樂者凡數十曲奮首鼓尾縱横應節樂工數十人衣淡黄衫文玉帶立於馬左右前後或施榻一層或令壯士舉一榻而馬舞於其上又飾其鬃鬛衣以文繡絡以金鈴雜以珠玉之類其窮懽極侈如此余讀唐書感天寶之亂於是作舞馬詩云開元天子太平時夜舞朝歌意轉迷繡榻盡容騏驥足錦衣渾盖渥洼泥纔敲畫皷頭先奮不假金鞭勢自齊明日梨園翻舊曲范陽戈甲滿東西題扇十首儒扇講罷窮神易吟成泣鬼文心營四海事手握一環雲道扇攜待眞壇醮搖吟玉笈書面題金鼎訣背畫五雲車釋扇把月行杉徑將風上竹軒倒持敲磬罷還指佛書言貞女扇妾非宋家鄰亦笑巫山神便是楚王來掩面不從人貞婦扇笑亦待君掩泣亦待君遮黄金買不見妾貌好如花粧婦扇妾貌非不竒行坐自遮面樓上曉粧成樓下無人見貧女扇妾有一尺絹已為身上衣自織清溪蒲團團手中持朝㝷麥壠去暮汲水泉歸無人不看妾不使見蛾眉寢婦扇酒䦨歌已闋解佩燈先滅羅帳隔清風玉腕搖明月離婦扇年來不把紫簫吹玉指摻摻弄素輝一自征人渡遼去唯有清風動妾衣孀婦扇已寫共姜誓仍題督䕶歌更無脂粉汚唯有淚痕多華陽山和查教授五首衝㫁浮雲截㫁霞滿天矛㦸競槎牙日來洞口迴龍馭月倚風前開桂花暮雨勢連巫峽遠春泉流過楚江賖物靈地怪非凡境鳯子鸞雛各一家玉井温温浸月華幢幢松檜聳髙牙半峰已㫁人間路絶頂自開天上花可恨白雲吟處起何堪行路望中賖怪來得似希夷子借問如今有幾家險物背隂彌炅矗竒峰當午更呀牙須知南地饒春色安得北風吹雪花紫府真人來最近紅塵俗客到彌賒因何占得多陽地莫是南方火帝家芝似蒿萊玉似沙更多麟趾與騶牙雲横秦塞妨歸雁風過荆州帶落花逰似赤松人已絶隠如𤣥豹事何賒秦宫女子今何在好問當時秦漢家朝隠真風暮隠霞鸞麟接步虎磨牙巖藏午日冬無雪池礙南箕荷有花子欲髙眠浮世外我思長嘯白雲賖攖寧未必非仙骨况有峯頭玉女家華山四首數峯向背隔秦呉看盡名山畫不如秋洒玉漿和沆瀣夜張雲窟隠蟾蜍鳯迷丹穴來還近羽化紅塵事總虚何日共君同去看也須閒步也騎驢一條雲路誰曽到萬丈仙梯也不如好上青雲騎鸑鷟更探明月弄蟾蜍風初定處雲􅃄合日未中時碧洞虚山下不須騎駿馬為言行客且乘驢華陽山仞五千餘便是蓬萊亦未如泉脈無聲通渤澥松梢有韻拂蟾蜍朝逢逋客談仙籙夜聴真人習步虚見説猿猱猛似虎莫教山下養黔驢諸山傴僂復盤紆唯有三峯勢突如酒母下來乗夭矯藥娥飛去化蟾蜍可為世上殊方樂便覺人間萬事虚安得往來巖下路不持鞭䇿駕疲驢秋山氣勢不可犯秋從何處通新嵐滴欲盡舊翠洗將空徙履寒雲裏倚樓殘照中快吟吟不暢長嘯入松風太華鎮壓秦衝仞五千蓮薰白日掌捫天旁連少華誠微類西顧終南只一拳大壑波濤終到海東峯松檜久凌烟可為梁棟為舟楫一構明堂一濟川宿山館十首下馬開門日已沉旋㝷村路乞樵燈隔雲吠去誰家犬踏月歸來何處僧潭上風生千嶂吼枕前泉落一床冰呼兒笑問今宵事身在危峰第幾層且喜破忩明有月不嫌壊壁暗無燈解衣就枕方成寐渡澗穿林忽夢僧一榻寒雲身卧水半霄急雨竹敲氷鷄鳴未曉鞭驢去迴顧烟嵐疊萬層煙蘿㫁處初逢舍雲竹踈時忽見燈嶮磴未歸樵塢叟破庵已去誦經僧暗龍吟罷庭無月寒狖啼來谷有冰君看床頭鐵鱗甲雨痕苔暈㡬千層倦客待沽山下酒飢童先上竈頭燈行經怪穴思防虎坐聽踈鐘欲訪僧手弄一張琴似鐵匣藏三尺劍如冰調髙器古無人伴身上煙霞空幾層好勇不須探虎穴愛竒何用㸃犀燈當求義路勤行已休把福田閒問僧一榻靜無塵世物半宵渾似玉池氷起來題作清心館此去泥汚千萬層龍歸潭面千㝷黒虎視林隈兩炬燈執㸑正燃炊飯火乞餐恰值寄眠僧倦聽雨後諸巖溜渴憶春前一片氷卧看滿山紅日曉碧瑶城闕鬱千層好雲入座邀為伴野火當門借作燈汲水賣來樵舍婦採芝攜去竹溪僧風嵓暴響聞顛木月幌微明見㫁冰誰信此來無路入敗籬折壁兩三層厨頭火滅童偷飯梁上巢空鳥避燈入夜更無同舍客今朝唯有放猿僧樵庵已貯霜前果竹磴猶存臘後冰誰道煙霄花上處一梯雲級萬餘層解鞍息馬夜將深倦興貪眠輒廢燈感物忽驚塵世事談真却憶舊山僧當峰豹寢方潛霧隔澗狐鳴若渡冰此處不唯饒物怪從來岐路險層層遠村樵採皆歸舍近澗人煙已上燈黍飯未炊催秣馬蕨羮初熟喜逢僧獸爭食鬬牙磨血鳥近泉棲羽刷冰若到紅塵人見問不將水溜結為層宿溪亭一榻溪亭直萬錢滿床明月伴閒眠荷花不把秋香惜又逐西風到枕前過望思臺昔日姦邪事可哀如今空築望思臺冥冥恨魄何之去唯有南山暮雨來望淮亭和君錫并簡敦復二首澤國茫茫似十洲有情空上夕陽樓可慿流水傳人意莫望遠山添客愁南浦雪思乗棹往北軒春負揷花遊若論仕宦何非義二子無容説愧羞烟波何處是汀洲白鳥歸來且下樓木落更隨寒雨盡山空仍帶夕陽愁詩筒去是蘭亭事客棹來非剡水遊我問兩人同榜彦仕方行義若為羞節孝集巻二十二
