body:
  text: 節孝集巻二十六宋徐積撰律詩三十一首雪十首淮上飛花正皓然日車月御欲停鞭千形凛凛如無地一片蒼蒼忽露天洞口似迷山路處斗間疑泛海槎年長瓢酒挹雲泉釀大軸詩題錦水牋僧舍手抔留煮茗漁庵缾貯借烹鮮喜餘稻糝投饑喙慚乏綈袍贈凍肩白裏好張紅步障猛中宜擺綘戎旃掃開寥廓憑風帚抉去紛紜憶劍僊獵火正燃雲有焰旅庖何在突無煙謂漫翁未應門外同袁子曽買汙萊數畆田君看飛雪競翩翩雲將爭驅正著鞭人望已酬殘臘後物華兼値早梅天招沽北掾輸平日走馬西州憶少年漏屋旋消濡敝褐破忩穿過濕餘牋蹄涔易見真窪滿糞土難辭偽色鮮席戸冷灰人削迹朱門熱炙客摩肩紛紛萬事還如此寂寂幽懐盡舍旃流水明中爭趂月㫁鴻深處獨藏仙誰家漁棹空聞笛何處樵村只見煙最好耕農相賀了牛衣醉卧夕陽田又侯款諸祠方徹奠謂張守車回五駿既投鞭雲如大練生淮浦雪似繁星落楚天有客弄花知樂嵗何人感物惜流年南城病僕惟沽酒西郭詩章但買牋隠伏急因明處見垢汙多自夜來鮮傭將粺榖纔餬口拾去濡薪未息肩白面韝鷹紅錦臂烏山圍獸赤繒旃却燃燈坐疑為夢欲上樓看恐有仙玉鏡臺前侵皓月碧紗窓外弄青煙樹頭還有鴻棲否船是寒沙水畔田諸少逸駕追無前我乗駑馬持短鞭更添一老愛白雪謂漫翁但開兩眼㝷青天詩中戈矛欲揮我君家伯仲恐忘年摇筆吟哦有裂管倒囊抖擻無遺牋誰知羣形消即露却還本質汙與鮮田廬有蓬尚塞戸樵衣無布堪補肩羣兒上壠芻且牧孤戍曝日旗與旃人間安得真洞府空中失却飛神仙明月隨來會星弁白雲迎去升紫煙溪灣留下㫁虹卧山隂亦有玲瓏田一夜五宫星茫然投壺笑電揮赤鞭何物變為淮上雪餘花散入江南天東家乞火温稚子西隣賖酒娯髙年樵翁頭上笠戴月漁父手中帆巻牋庾子貞家但㝷菜鮑通直輩彌矜鮮卞郎方弄瓠杯杓浙帥已亡羊髀肩當門正好張敝席隔籬可笑窺華旃最是珊珊上樓珮恰如冉冉升空仙牽牛童兒飲河漢扶犁老子耕雲煙漫翁何處拾瑶草自有梅花大庾田又江西詞客休刺船馬上俊郎休弄鞭且看滿城花落地恰如窮谷曉時天松林獨幹凌堅操麥壠踈毛白少年犬信宜將筒䕶紙鴻書須用帛為牋月中兩艷非投暗物裏千形不較鮮最好一環圍井口有時數㸃露山肩紛來上相揮長塵側去諸卿蔽曲旃水畔誰為佩珠女車中人是行雲仙吟裁笛竹清梅瘦忽㸑琴桐濕更煙近日無錢酬酒媪且教借賣漫翁田又昨霄夢看六龍淵鶴御驚回墜曉鞭萬頃落花春晩後一床清水月明天門無黄雀張羅地室有𤣥熊應夢年入竹好鳴寒玉珮寄梅兼附白雲牋楊妃繡段披方穏李逸烏紗裹更鮮避色莫投粧婦指弄香須撲舞娥肩羣烏噪過巢無樹一兔奔歸獵有旃溪叟正如翹葦鷺山翁彌似出塵仙僧簷鳥伺齋餘飯客竈猫棲㸑後煙且報漫翁來掘壁牆間便是我家田又吟懐忽共雪紛然罪逆餘骸自可鞭罔極之恩無報日難平所感欲呼天身騎騕褭成童嵗手握狻猊未丱年三釂冷醅將及斗一揮醉筆恰盈牋當時飾束頭毛緑今日衣濡眥血鮮楚泮師儒新靦目秦關父老舊隨肩中心但比孤青檜外物無庸大赤旃每指多圖為酖毒自言寡慾即神仙房中得子眠温席突外從人笑冷煙以此終身慰泉壤不須問舍與求田又荀翁猶慕李膺賢漫叟當車我執鞭轅下兩驂將逐驥牆間一穴欲窺天兵鋒甚鋭逢今日鐵陣横行記昔年將鉞揮金何用劒檄書揷羽不須牋勇騎龍子神彌俊笑扼犀吭血正鮮一鼓已輸元帥手雙矛將解敵人肩我徒北首思投甲子使西來約巻旃自是見羸謀餌敵却云養氣欲希仙已嚴軍令除添竈但恐師期忽舉煙設若渝盟相掩襲衝車突騎占平田又團團蘚暈埋青錢稍稍竹樹藏紺鞭鸕鷀覆水魚沉淵罞罿蔽地禽冲天梅房處女鶯坐禪草頭稚子松耆年浮光飛沫人游川斜行大字鴻書牋壯士可論持守堅美人休説容華鮮乞餘之夫尤慕羶附炎之子彌脅肩穿花走馬錦藏韉垂雲閲武車張旃虢姨滿路空遺鈿陳妃倚閣真神仙有人情似山中泉其情濃如春深煙留下㫁蘆雲蓑篇長令雪滿淮之田偶述寂然閒地好絃歌胸中森森萬刃戈自道壯圗終有用未知時事竟如何千金似糞無心願一劒如霜為國磨吟輒廢眠詩骨瘦酒能消思醉顔酡起登夜閣乗明月笑倚寒山望太阿誰道吾儒無壯士藺生功烈勝亷頗催粧二首魯巷予方樂秦樓子幸俱所期為烈女應不訕庸夫野叟田無璧仙娥珮有珠鸞歌迎弄玉麟脯宴麻姑自是閨中秀何煩臉上朱君看閬風客親駕五雲車又行事從來號濶迂酒間詩興便豪觕盧公誤妾平生事嫁得東臯卧草夫錦被堆春風蕭索為誰張日暖仍燻百和香遮處好將羅作帳襯來堪用玉為床風吹亂展文君宅月下還鋪宋玉牆好向謝家池上種緑波深夜盖鴛鴦神宗皇帝挽詞顧託艱難後宫城晝閉關師屯五校肅日馭六龍閒易貯金莖露難尋玉府山裕陵人散後猶望白雲間又啓殯龍輴動森森鳯翣移迎神帳殿遠背闕梓宫遲日慘河山路草枯霜霰時綵庭覺瀟洒應誦蓼莪詩代人進太皇太后挽詞并表臣某言得本道進奏官報太皇太后靈駕某月某日發引者太皇以憂勤損夀主上以諒隂不言事有司存舉無墜典中謝伏以大行太皇太后以太母之尊攝本朝之政扶持大業擁佑聖躬心至公而貫乎鬼神徳甚盛而格乎上下物皆受賜事有成功奄棄明時側承遺誥陛下以嫡孤之義而持重以聖人之孝而因心行已過哀動皆得禮外雖聴政内服通喪奉几筵於晨昏盡山陵之制度菆塗啟殯日月有期儀仗所施吉凶皆備至於靈輿發引挽士哀歌曲盡上心無遺一物臣官雖補外孚實由中不惟螻蟻之㣲敢貢蒭蕘之語九載憂勤事傾心為繼明手扶天柱起身御日車行大業真無負全功定有成生民正歌舞萬丈玉山傾又綘節排山仗珠襦換玉衣不乗黄鵠去即御赤鸞飛受諡心無媿朝真徳有輝太元庭上客聞義亦歔欷又一自姬周後難乎有此才明將照幽隠澤欲被蒿萊外屬私㤙絶本朝公道開勒銘何處好嵩嶽鬱崔嵬又玉殿菆宫啓龍輴叩陛初嚴兵猶警夜列仗已當車路指新陵闕窓留舊簡書移班近東處風月一簾虚又導騎鳴鞭去魂車戀闕遲梓宫何處宿幄殿夕陽時天上有名姓人間無路岐三泉深百尺神御復何之閻博士挽詞可惜方剛士平生氣貌嚴有朋搔白首無路弔蒼髯地下新潛徳人間故養恬儒林與孝犮二傳子須添又一夢龍蛇後難尋博士星所居城見月仍用栢為庭白馬車齊送黄宫戸永扄松陵今夜客慟哭入冥冥苖戸部挽詞雖負文場志何慚國士風王庭曽抗論廟鼎合銘功玉樹摧平地朱霞落半空故人遺嘆在秋後有驚鴻又已矣公歸矣哀哉將柰何黄宫無處樂𤣥冕有誰歌南越生祠久東川畫像多孤窮親黨在共立碣嵯峨林漕挽詞國士青雲器儒林合抱松羽儀丹穴鳳頭角劒津龍玉筍班雖貴皇華使愈恭人亡其政在尚可訪遺踪又一夢無回處龎眉坐栢庭幾時逢白日萬事付哀鈴畫翣行須緩黄宫到便扄松陵詩莫和慟哭不堪聴蔡學士挽詞斗分星孤隕虞庭鳳不還金龍抛使節玉筍誤朝班世徳元明後家聲王謝間國功圖未卒歸老負江山又命也雖亡矣但須銘此墳朝中尋故事江外訪遺文逺思歸流水髙風寄白雲忠魂在斯否義亦不忘君又舊業儒編富新裝使槖空潔身辭白日隨柩載清風義與人心在名須江水窮諸山同峴首有子勝羊公又且止明旌住𤣥堂即閉關素絲䝉柩往白堊洗車還身後千詩在生前萬事閒松陵哀怨客來弔自湖山節孝集巻二十六
