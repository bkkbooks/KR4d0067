body:
  text: 節孝集巻三宋徐積撰古詩十九首項羽别虞姬垓下將軍夜枕戈半夜忽然聞楚歌詞酸調苦不可聼㧞山力盡無如何將軍夜起帳中舞八百兒即淚如雨此時上馬復何言虞兮虞兮奈何汝虞姬别項羽妾向道向道將軍施恩義將軍一心靳財利妾向道向道將軍莫要為人患坑却降兵二十萬懐王子嬰皆被誅天地神人咸憤怨妾向道向道將軍莫如任賢能却信姦言疑范増當時若用范増者將軍早巳安天下天下成敗在一人將軍左右多姦臣受却漢王金四萬賣却君身與妾身妾向道向道將軍不肯聼將軍雖把漢王輕漢王聰明有大度天下英雄能駕御將軍唯恃力㧞山到此悲歌猶不悟將軍不悟兮空悲歌將軍雖悟兮其奈何賤妾須臾為君死將軍努力渡江波白雲先生白雲先生面如鐵一片良心似明月腹中和氣如春陽齒下清風欲為雪羣兒走馬正讙讙先生髙躅方尋山嵩山泰山俱有約先訪王喬後陳摶浮丘嚴駕欲迎子玉女整衣開瑶闗山中自是逍遥家手摩紅蘂生龍霞鼎中氣焰成何物不煉黄金煉丹砂明月一聲何處嘯但覺半夜鸞鳯呌猿不敢號虎不鳴一夜清風生萬竅此路髙深易迷錯只見先生一雙脚山中不似俗人家有客但尋猿與鶴西峯猶有秦宫女身上亂毛如鳥羽秦時人事不忍聞若見斯人莫與語先生何以遺時人先生有語醇乎醇莫分巧拙與强弱莫將外物成天真豈不見北邙山下狐狸窟掘出枯骸與陳骨其間豈無鄉原人其間豈無强梁物强梁物鄉原人當時爾等空紛紛後來之事竟何如不及癡兒醉夢之浮雲山中樂洞裏桃花開早春洞中酒熟宴真人紅蘂紫芝俱在手本家猿鶴亦隨身採拾飣餖隨所有物無不義即是真何須謝傅山東妓却用陶潛漉酒巾漉酒復漉酒何必金印大如斗一瓢復一瓢莫辨人間淳與澆時情大抵惡貧賤此間却是青雲霄君不見古人自謂為賢豪或入於佞或以驕但言富貴我所欲一身不保領與腰孔光屈身事董賢谷永隂與王鳯交賈謐之黨遍天下望塵拜者尤為妖須臾苟得快所欲終以血肉汙斧刀假令當日幸而免後世譏笑安能逃豈如孫登但長嘯眼看時事如鴻毛嵇康阮籍不與語何况紛紛兒女曹花下飲我向桃花下立飲一杯酒杯酒先濡鬚花香隨入口花為酒家媼春作詩翁友此時酒量開酒量添一斗君看陌上春令人笑拍手半青籬畔草半綠畦中韭閒烏下牛背奔豚穿狗竇潛身猫相雀引喙禽呼偶包麻鄰乞火穿桑兒餉糗物類雖各殊所樂亦同有誰知花下情猶能憶楊栁中心卒無累外物任相揉余方寓之樂自號閒人叟江南春今年是處春風早江南地煖春更好春風先把江山掃次入梅花後芳草芳草春深更有情直共江山到洞庭落花流水從武陵湖中有山春更青日欲落時一㸃明少年莫上岳陽城歡樂辭吁嗟人兮人生凡㡬何汝胡不思兮故為擾擾而紛紛人生如一夢兮萬事如浮雲汝胡不思兮胡不為直道兮胡為薄物細故兮疲精而勞神汝之所得兮余以為失兮汝之所失兮余以為得兮汝胡不思兮胡不為義而為仁仁義之道如大路兮人皆可以行兮汝反以為艱兮汝胡不思兮胡為失性而離真禍既自召兮福亦自棄兮汝胡不思兮故為乎災及其身善惡之報各以其類至兮汝胡不思兮胡不觀乎古之人與今之人嗟予言之不可忽兮汝胡不思兮汝其書諸紳吁嗟人兮登髙辭九月九日兮登髙何為古有此語兮吾未暇論其是非菊花黄兮茱萸紫二花此時還鬭開花滿握兮酒滿杯人人欲上髙樓臺我與世人雖異好此時亦難平襟懐因思雕蟲篆刻事此文乃是儒之災如今此災亦可避不辭萬里登崔嵬其如此物避不得但恐積蠧傷良材是以天下美璞少甚於矛㦸戕瓊瑰縱有美璞直萬鎰埋之塵土何由來聖朝有意去災害願將此物為渠魁淮隂義婦詩并序淮隂義婦富商之妻李氏有姿色邑人有同商者見而悅之因道殺其夫厚為棺殮持其䘮以歸紿云溺死且盡歸其財無一毫之私焉於是伺其除葬謀為婚媾且自陳有義於其夫義婦亦為之感泣遂許而嫁之廼一日家有大水水有浮漚其夫輒顧而笑義婦問之未應遂固問之恃巳生二子不虞其妻之讐已也即以實告之曰前夫之溺我之所為巳溺復出勢將自救我以篙刺之遂得沉去所刺之處浮漚之狀正如今日所見義婦黙然始悟其計而復讎之心生矣即日伺其便即以其事奔告有司卒正其獄棄其讎子夫讎既復又自念以色累夫以身事讐二子讐人之子也義不可復生即縳其子赴淮投之于水已而自投焉蓋以謂不義而生不若義而死也故謂之義婦或者以其生事二夫不得謂之義是大不然是責於人者終無巳也東漢時蔡文姬者䘮夫之後一為胡婦一再嫁之其傳名為烈婦攷其心迹與義婦不同逺矣嫁蓋其心出於感激謂其人真有義於其夫也既嫁之後凡再生二子閨房帷幄之好已固於人情無毫髮可以累其心者故能復讎殺子又自殺其身雪沉寃於既徃豁幽憤之無窮昭乎如白日之照九泉也如此之義是豈可不以為義乎故聞其風者壯夫烈士為之凛然至於扼腕泣下也而姦臣逆黨亦可以少自訕矣故君子謂劉歆為苟生王儉任昉范雲之輩為賣國禇彦回之輩何足道哉蓋自魏晉而下佐命之臣教人持兵以殺其夫者多矣使義婦視之以為何物耶惜乎事不逹于朝節義不旌于里哀哉酷賊姦讎既已除銜寃抱耻正號呼當時但痛君非命今日方知妾累夫捨義取生真鄙事殺身沉子乃良圖㡬年汙辱無由雪長使清淮滌此軀淮隂婦人何决烈貌好如花心似鐡殺身沉子須㬰間身雖已死名不滅北神烈婦詩并序烈婦有美色夫為小商舟行上下載以自隨至于北神其夫病死貧無以殮同舟富商者假貸與之䘮費所須一切皆具是自恃有恩顧其妻以為巳物烈婦既葬之三月復墓以歸勢且甚廹遂取其嬰兒縳置胸前母子號呼赴淮而死是其所以自度者其勢終不得免焉也與其被汙而生不若潔巳而死也嗚呼其决烈如此是豈可不謂之竒女子乎蓋古之賢女藉其家世因性而習之淵源漸漬其所從來者逺矣此詩人所以賦莊姜與夫韓侯之妻也至於負販之家見聞之陋安知義之所在乎乃一日猝然變生不幸毅然不顧如泰山之不可揺也是知其義利之分死生之輕重故至於殺身而不悔也惜哉亡其姓氏且不知何許人也以其死於北神故號為北神烈婦海水猶可泛君身不可犯淮水猶可瀦君名不可汙鸞鳯猶可馴氷霜猶可親不是雲間月即是月邉雲贈子瞻三首翰林主人其姓蘇左臂不任十上書㡬年乞得江與湖呉中父老爭懽呼玉堂金户不肯居肯來南郭㝷樵夫樵夫所識山與水除此如何論竒偉八月十五錢塘江海門山下潮頭起翰林豈特文章工赤心白日相貫通先與呉人除二㐫謂法外除二顔次與呉田謀常豐乃與徒役開西湖狹者使廣塞者除溉田不知㡬萬夫其田立變為膏腴世世可知無旱枯呉人衣食常有餘有餘之人善可趨官司亦可省刑誅無窮之利誰與俱前有白傅後有蘇翰林如此能成務呉人叩額呼為父未知何處立生祠定是呉山行坐處翰林却過淮之東無人不看眉陽公玉堂氣貌將以恭又到南城㝷老農仍使尊中酒不空玉泉最好白醅醲便將玉水傾喉嚨須臾醉倒無憂翁老翁雖醉不敢迂記得杭州三事書欲毗舜智臯陶謨事防阻隔有所拘翰林此說若行諸聖朝恵澤可大敷譬如雷雨動天衢曠然霈然而廓如無分草木與蟲魚一時奮振皆霑濡滿堂飲酒盡懽娯更無一人泣向隅老農雖然無所逋願同衆口齊懽呼昔者益州牧意欲見杜微不能以身徃使人轝致之雖用為諫議待士禮巳非而况君房輩端坐呼子陵子陵胸中氣直與青雲平豈肯為人屈彼亦徒驕矜孰如揚州牧自處遜與恭徳不矜其盛事不矜其功南郭已三顧迂身為衰翁以手書所問視面歎厥容移時能立語避乘乃鞠躬不知古之人㡬人能如公感秋和張文潛三首汎汎河中舟莫繫河上栁君看道傍葉行人一揮手枝條旦旦空顔色何可久坐恐霜霰繁諸媚歸一朽我有千丈松亭亭不可揉生在孤峯上獨與雲霞偶羣形靡且紛不與較妍醜羣動日夜馳而以靜為守守松者為誰白髮無憾叟蓬蒿可蔽身糟糠可餬口言者寓於詩黙者寓於酒誰知杯酌間便是無何有念子於我深我於子亦厚記我守松篇行行重回首又張子非不厚涕泗中夜起蘭蕙雖已衰松筠正堪佩君愛蘭與蕙忘我筠與松君愛洛陽官棄我淮上翁翁如揚大夫其心甘賤貧不投天禄閣却反離騷文騷人雖已殁萬古為忠魂欲知寃憤氣但看蒼梧雲寃情寄湘水寃聲寄湘竹年年霜露時夜夜秋聲哭又秋風一何惨物形隨以變秋風如無情蟲鳥聲俱怨我無外物累但有屋中燕翩翩勢將去盼盼如有戀此物雖至微其舊殆可念而况西郭交年將屈五指南城文字間東臯松竹裡氣類亦相合老少兩忘齒昔居吾舍傍今在河之涘船頭纜將解船上桅將起留君恨不早此役定難止如何舍我去處我復何以君看淮泗間一𣲖良可喜從來病濁汙而今稍清泚人方渉其流冠纓殆可洗此行君樂否一千五百里未見洛陽山先見洛陽水謝周裕之二首樂不須絲竹花不須桃李舞不須輕軀歌不須皓齒人生各有樂顧我如何爾我是兩栁翁家在南郭裏詩酒以為樂賔客至即喜酒味酸或淡瓷椀麤而偉或無一飣菜但費㡬張紙客所言用紙筆人情慕貴富公何眎賤鄙寒冷載肴酒暮夜煩屐履孚誠非猝然飣餖亦勞止不用卞即瓠但坐杜侯椅兩卓合八尺一爐煖雙趾不以藥隨時而用繒掩耳或啖魚菹盡或愛蔵蔬美或取鱐與腊或約酒以指人皆恱真厚誰敢停箸匕一客癯而清偶坐為六子吟聲尚皷吹懽情勝羅綺俗物無所用髙㑹有如此義無所不感誠無所不動誠義既如此外物斯何用以外表諸中以物將其義所謂君子誠誠亦不虚致人有忘恩者嗟歎而泣涕我心非土木亦有眼中淚贈玉師失鸚鵡詞紅蹊翠塢風花客家有千山萬山碧一從流落在人間玉環絛重金籠窄金籠一片烟霞曉花艶成團栁枝裊足穿蜀錦茜靴牢身著呉綾紺袍小参差㣲露紅霞裙丹喙即是胭脂唇真是人間富貴物何異朱門羅綺身慧性馴姿良可取只被多言仍巧語前身不是亡國臣即是傾城傾國女門外人來連報客㸃茶沽酒俱催索呌人名字學人言呉語秦聲俱記得大都有似原人為視人歡慼為笑啼俗客面前多俚語逢僧輙誦陁羅尼嗟嗟何用畜此禽嵗月養成姦巧深莫信口中一片舌對面千里萬里心主人曰予未有知為愛能言不放歸不道姦心多詐偽吭腸纔飽脫身飛節孝集巻三
