body:
  text: 節孝集卷二十五宋徐積撰律詩三十四首清虛臺題華州崔氏園名園自郊谷何况築髙臺酷暑未嘗到清風長自來雲嵐瞰山罅煙水近池隈誰更將松竹蕭森四面栽華州太守花園南園花謝北園開紅拂欄干翠拂苔却是梧桐且栽取丹山相次鳳凰來送李守莫說真州南畔路楚望亭南路已遙只可寄聲來見問更難折簡去相招船頭何處逢秋水山下誰家把酒瓢且趂潮行急搖櫓到江州後更無潮癸亥六月十三日與朱至機坐間得此到江州後更無潮一句其夕枕上成篇也擬和御製賞花釣魚禁苑千花一夜開祥烟深處翠華來重輪日色輝天步萬嵗山聲薦夀杯魚躍靈池初浩渺鳳巢阿閣正徘徊姚虞臣主方賡唱蓬蓽儒生願竊陪舞十幅華裀遍畫堂仙家粧束學霓裳一雙舞袖鸞凰勢滿院春風羅綺香巫峽朝雲無定意漢濱珠珮雜鳴璫歌聲未罷全無力歸去重闈泣暈粧錢塘江潮二首獨𣲖豈從天漢墜千濤爭趂海波還齊聲怒過轟雷鼓亂沫噴來碎玉山塵土刮開心目外氷霜留在骨毛間君看江上潮平後恰似魚龍戰鬭閒滄溟幾道入江淮此獨竒哉復怪哉風雨初隨霜練起雷霆俄送雪山來豈無海物齊驅過亦似神兵合陳回君向西湖亭上看杭州不信有塵埃秋水水與秋月色清無一㸃瑕有情山共遠無恨日初斜鷺下沉寒葦鴈空遺暖沙旋將堤畔木學泛斗邊槎題東軒二首我有東軒景喜君為此行一如曠野外四面好風生但見雲連樹不知山是城重來如有約秋水夕陽明又我家東畔好憑欄栁一林邊水一灣城下人煙都似野城頭雲樹恰如山中秋月二首青女霜華夜不收一天如掃月如流素娥奔去已千古狡兔隱來還幾秋冷逼蚊雷聲陡息光摧螢火色何幽塵埃兩眼洗不净安得凌雲萬丈樓珠箔珊珊掛玉鈎金梯軋軋倚紅樓桂搖團影上層漢桐墜踈隂才半秋萬頃玉田和露白一環瑶水帶霜流何人獨向繡幃泣燭淚淋漓香篆幽九月九六首九日一首上煩運使殿院一笑并酬酒伴賢關之句林旦次中九日諸公欲上山淮東病叟正閒閒如從酒伴無慙色儻論賢才即汗顔適載巨瓢尋陋巷仍封大軸委樵關不知我是扶犂手玉樹成林盡許攀又何必一首自賦也何必南山與北山此心非獨此時閒手持白酒為常事頭帶黃華是強顔醉後浩歌來就榻醒時清嘯起抽關誰人遺我明霞曲聲在赤霄無處攀又有人一首再酬運使殿院吟筒之句有人才思聳如山已燕淮亭未肯閒親載緑醽溫病骨更歌白雪慰蒼顔老慿書几猶操筆暮等吟筒正啓關兩手塵泥俱滌盡金莖玉露我須攀又桓家一首上煩太守公一笑輒借劉伶事以奉老氏之教又借陶潛事上謝明日之燕所以煩公一再笑也公蜀人也蓮峯繡嶺即其奉使往來之道是以為公賦之公既感之矣吟哦西望能不依依乎程守諱之元桓家賓客正尋山劉子藏身盡日閒忽為著書驚晚節更因把菊覺衰顔白衣來緩思沽酒繡嶺登髙夢入關最好蓮華峯上路藤條葛蔓手齊攀蓮花繡嶺在關中往關中謂之入關往關西謂之出關蓮華峯五千仞登峯者須攀藤挽葛繡嶺宫在長安臨潼縣望之如繡也又堂堂一首上煩通理朝奉一笑所以酬交鋒將壇之句如賜一再觀即一再笑至於撫掌也蓋其力盡辭窮緣大句而變為此章也堂堂兵陳列如山羽檄交飛勢未閒敵國正強無備處我師潛遁若為顔已張火炬嚴刁斗更使轅門置鐵關欲就將軍送降款金城萬雉莫能攀又不是一首上煩運使殿院一笑用琴嘯事以酬稽阮之句也公詩不來數日矣故用武侯強伏事也乃今日吟筒復來故用秦人開關事也諸公各以詩來四面受敵師老兵疲困於奔命以其所備者多也故有遁逃之句也復可一再笑也所謂驚坐客者是陳孟公也短篇小章猶足以為孟公邪公可復觀之可復呵呵一大笑也詩者吾家之鼓吹也引聲吟哦無一事能干其間亦復時自笑也詩中之趣公所自得乃信筆及此不是妻孥須入山著書未得片時閒琴逢嵇叔難施手嘯比孫登合靦顔幾日偃旗兼卧鼓今朝延敵又開關我師欲遁無歸路嚴壘如雲試一攀除夜四首春意匆匆又欲還一年都似片時閒青雲有路終須到白日無情不暫閒任老豈妨修古道更貧未肯憶深山明朝獻夀何為祝長著斑衣奉母顔但得文章與道深年來年去不關心幾時上得青雲後兩鬢從教白髮侵匣內深藏三尺劒樽前獨抱一張琴辭髙調古彈將曉待倩春風聽此音一燈髙照草堂中大笑髙歌送嵗窮栁色花光將屬我雪寒霜凛更相攻銅壺漏促三更盡白玉樽深一釂空待到平明無别事只將詩句贈春風前日慈闈獻夀觥為親歌詠祝長生被君翻作陽春曲却使巴人和不成喜雨上山陽守山陽太守奉更書盡束行裝載軸艫已有仁風為惠愛更留甘雨活焦枯粳塍帶溜蒼苗奮麥隴藏煙紺穎敷看取北郊臨去日爭先獻酒是農夫詠雪雪者隂之類大寒之所為於人無暖意著物有消時萬草若相畏孤松亦自持閒階不須掃日照與風吹答雪一夜寒聲夢不成讀書燈暗雪忩明起來待唱巴人曲間得陽春第一聲春雪二首天上星榆一夜雕曉風吹緊下層霄溪頭岸狹流應漲簾外春寒到不消數騎急投村墅宿幾人忙奔酒家謡登髙望遍東城路又領詩兵戰寂寥雪滿東風只到關西飛還不到長安鷺翹孤白精神健鶯斂黃金羽翼寒遠嶺玉迷樵木徑晚溪氷壓釣魚竿隴頭鼓腹謳吟者但向深秋前後看雪中書事聞道西家髙捲簾昻頭吟笑雪花天東家正泛一杯酒北望孀親夜不眠秋風萬物已衰歇乾坤正泬寥數聲何處起萬竅一時號好水望君惜殘蓬任汝飄霜空靜如掃努力助飛鵰秋雲淡似秋河水濃於春塢煙隴頭寒塞鴈峽外晚江天忽斷月華墜乍明虹影連西風休強管飛勢自翩翩樵家鄰叟是耕漁怡然只自如草迷春徑狹雀噪晚籬踈自向林泉慣翻嫌市井居兒童盡樵採斗粟亦無餘村家階前生蔓草門外是多岐老叟行無伴兒童飽自嬉鴟羣巢衆樹狐迹過踈籬不肯勤耕耨豐凶為有時漁者二首枯笠搖風雪滿衣年年辛苦事漁磯有時釣得鱣鯨上又被行人買得歸家住前村蘆葦中一生無事是漁翁眼看波浪如平地身向江湖若斷蓬小艇醉眠寒夜雨短帆閒掛夕陽風營營市井應相笑不道錐刀盡是空織女此身非不愛羅衣月曉霜寒不下機織得羅成還不著賣錢買得素絲歸節孝集卷二十五
