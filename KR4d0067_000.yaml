body:
  text: 節孝集别集類二宋提要臣等謹按節孝集三十卷宋徐積撰積有節孝語録巳著録積少力學受業於胡瑗之門淵源篤實其事母以純孝積立身亦堅苦卓絶蓋古所謂獨行之士然其文乃竒譎恣肆不主故常故陳振孫書録解題引蘇軾之言稱其詩文怪而放如玉川子今觀其集往往縱逸自如不可繩以格律軾所論者誠然然其文雖雅俗兼陳利鈍互見頗有似于盧同而大致醇正依經立訓不失為儒者之言則非同之所及也惟其復河說一篇欲求九河故道而穿之不究地形不明水勢未免失於迂僻史稱其雙耳瞶甚畫地為字乃始通語終日面壁坐不與人接而四方事無不周知其詳殆不然歟舊本首載事實一卷後附語録一卷景定甲子淮安州學教授翁䝉正合編刋行明嘉靖間淮安兵備副使劉祐又因翁本重刋今語録巳别本孤行不更復載惟附録其事實一卷備考核焉乾隆四十五年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:161038f9778b1f90b71ae4fdba9361271f5aa2f07d67a2f32649a3b5191a2e3a
