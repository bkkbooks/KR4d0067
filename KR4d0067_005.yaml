body:
  text: 節孝集卷五宋徐積撰古詩二十九首寄管久中我頭未白心先老吐出精誠為君禱若無歸計似陶潛學取蕭生抱關好贈查宣教晚來閒共秋風約惟有黃花莫吹却有人懷抱似陶潛待向東籬共花酌答盧魯山秀才吾道一於中所得無背向吾神充乎形所得無衰王氣入春風和興與秋鷹揚有纍已驅除無酒亦酣暢外如不可撓內如不可狀更讀魯山詩何樂可能尚答劉子靜秀才并示魯山難逢一笑樂易遇千黃金而况吾胸中所得蓋已深百物正爛熳二子方歌吟一樂已自足兩樂交吾心和魯山感春二首君看紛紛能幾時一番情態隨春盡歡者常少戚者多共君且趂春風歌莫學時人種花草不似山中松桂好一笑一啼何日休一榮一悴何時盡樽中野酒亦無多日伴吟翁慷慨歌茅屋窗前棲亂草勝却花間繡裀好呈次中煩公素葉詩答我碧蘆柬我亦為長句枕上不合眼兩城俄相通一意如同撰用韻亦無殊便可書之板述懷寄吕帥君看關西山壁立春雲突盡春空窄濃嵐滴去渭川寒孤峯深與秦天碧白雲流水豈無情立馬吟詩定相憶且倩東風先寄聲我整西裝期已迫吟到秋風放我歸歸來待作瀟湘客和李自明二首青松何嵓嵓生在孤髙處能鳴月下風更入雲間路雲漢何渺茫逺過衡山陽松風上河漢髙韻落三湘又我有金玉交家在臨流處秋來詩更清吟喉飲風露崔子在何方清思滿殘陽不知今夜夢幾度過衡湘送沅州通判過湘江時君且聽但恐水中有寃聲當時無地容屈平衆人皆醉嫌獨醒煩君須弔獨醒翁以酒注之魚腹中不須以物纒米筒但投詩去責蛟龍為君質直有古風能髙其義哀其忠投詩已罷弔已終寄聲急報南城翁贈吕帥玉門關靜邉鋒息回首金城趙充國繡帽霜鬚馬上吟詩興如雲滿秋色最好青門長樂坡灞橋路上情更多繡嶺風烟新草木潼關形勢舊山河洛陽城闕秋風緊有詔疾驅催大尹兩瞳直是有精神管取無寬亦無猛謝周亷彥致奠義無所弗感誠無所不動誠義既如此外物斯何用以外表諸中以物將其義所以古君子誠亦不虛致古人感恩者歎嗟而涕泣我心非土木亦有眼中汁寄道原二首好笑李詩翁寄身明月中饑腸吞白露醉口吐清風時時跨霜鶴步步凌秋空相呼且相待略住白雲峯又漫翁身上霜可刮酒未醒時詩已發急放人去守船門恐向河中捉明月和李自明病叟相逄恨不早蒹葭敢比瑶林好誰作羊車衛玠看不道好𤣥揚子老使君禮義髙如山清風更可清塵寰明日王君來訪我陶潛欲卧君須還送吕掾歸揚州二月四日於枕上奉送年年二月春色稠今年二月寒未收路上無花空酒甌清吟清嘯到揚州到揚州後登髙城緑波芳草連江津吟哦若望江南春梅花便是江頭雲寄范掾昨日沽酒典布襖今朝所典未可保最好綿衾剩典錢又恐夜寒妻懊惱兩務酒官俱見憐沽我好酒如甘泉為報孟光莫惡發待將黃卷換青錢送晦叔兩人俱是白髮翁不用語言情意通且喜胸中無一事一生常在平易中願公活百嵗我活九十九白髮變成黃髮翁回來同把一杯酒贈張敏叔張子生平最多難未老頭毛白一半頭雖更白詩更清正作詩時人莫喚頭不肯轉身不移口中聲調霜風凄太清宫殿月明時第一莫吹松竹詩送辛朝奉幾日遲遲辭我去夢中猶憶南城路不知昨夜月明時泮水宫中來幾度三月春風正向西我將心逐春風飛送過髙麗亭下路别遣春風隨客衣送崔主簿赴雅安見說西川好山水此行便是秋風裏洛陽年少本多才馬上一揮吟一紙鳯凰羽翮非徒爾上擊浮雲九千里枳棘須教别鳥棲自趂春風便飛起送張九掾兼簡同事錢明府可與慎叔良蔡彥規同一笑也有人獨酌南窗酒春是故人詩是友故人消息在江南為我江頭探楊栁詩人見春雙眼明迎春送春俱有情何况溫溫張九掾可無詩句贈君行送王潛聖公車待報凡幾年蕭生罷去心浩然鹽瀆野中尋舊隱揚子江頭呼渡船太湖波浪濕秋天洞庭橘柚生紅煙馬踏新霜吳嶺外猿啼小雪建溪邉關西夫子雖遲暮行笑行吟正安步菑川海上牧羊兒亦說公孫放豚去寄張文潛不知今之人誰識張縣尉勿問胸中事但看面上氣所謂人英者正是斯人輩前年南郭中文酒日夜㑹一從舍我去忽忽再逾嵗今兹嵗且盡為子吟不睡起坐却就枕伸頭出紙被約是三四更老老抱雙腳此時吟正酣聲調不可却春風起淮東須叟到嵩洛往往入子家但子眠不覺子覺將奈何聲盡情思多上東門外路洛水生春波還我大松來不用寄詩歌代簡呈通理察院去年過時花未紅今年過時春未融春未融時得子來吟翁面上生春風吟翁近來成白頷種種頭毛無一半唯有胸中氣未衰更得公來激吾懦送詩僧嚴上人日晚孤雲飛故山在何處八月凉秋時正望江頭去定無塵埃氣清風與白露送端叔二首并序夜漏將盡枕上再送端叔也洛水之陽馬上為我誦此詩即此詩用木葉書投之水中便為將來故事也延安塞上見羣鴈能為我誦此詩東南望否夜中枕上聞孤鴈聲尤數數誦此詩也紙窮意未盡端叔上馬去巷口馬頭轉我喚端叔時端叔急回面記取此時意莫使落風埃上東門外水正望楚州來此水一來不復見不及黃沙塞頭鴈是物可寄情是物可寄聲不須使黃犬延州岐路逺莫怪不登淮上樓只為淮水不西流直待銜蘆鴈却回其時隨到天盡頭再送端叔并序此詩於前詩亦補遺也端叔為我吟此詩果有情否此情得似醴泉故主簿否凡我所以愛君者皆在乎心今則形而為詩言在四詩也千萬自愛行有日否關中日落時但見山相接塞上閉城時但聼吹蘆葉延州平安火過早月出山頭照孤堡王家池上醉欲倒銅鉢聲中詩已了落筆揮成露布草主人更索平羌表文章意氣入杳冥金船插羽如飛鳥諸軍鼓吹髙牙曉大纛門開撲餘燎壯士犀衣劒氣寒客身依舊紅霞繞陸生待寄梅花枝庾即莫愛芙蓉好節孝集卷五
