body:
  text: 節孝集巻十四宋徐積撰古詩十六首題寄亭并序唐人亭榭好為美名者當時譏之以其苟於所玩宴安酖毒弗戒弗勸者也山陽通判呉郡朱公即其所居因地之宜構為棟宇名之曰寄亭寄有來去曷常之有如旅人之棲籧廬也一出一入主人弗與居處晏然氣貌如故曷者為得曷者為失曷者為喜曷者為戚曷者為寥寥曷者為赫赫然人之常情以去為諱以寄為不臧蓋有避是名而弗徃者矣又况肯名而居之者乎是其曠然獨得廓然大悟内虚其心外無係於一物其所以為樂者皆在乎其我而不在乎其彼也與夫患得患失問蓍問龜從相師而問之者異矣如此而弗貴貴而弗歌非詩人之志也大抵人間同一寓外物之來寓中寓主人於爾本無心誰使之來誰使去來時無所増吾恱去時談笑亦不輟惟有山叟與溪翁屋裡閒雲船上月一從古徃成蹉跎失之則憾得之歌不從平路從風波或遭陷穽或網羅有人嚙臂遺其親有人之楚復之秦侯門灑掃寜苦辛牛衣涕泣傷賤貧誰人衒鬻來上書誰人乞貸留公車誰人入闗便棄繻誰思躍馬疾其驅更有隋時二隠夫欲將林壑謀金朱倒行之輩尤可吁當時自欲烹其軀却是揚雄所性恬誰須名字學韋賢積薪可恨汲生言不道真風任自然自然處者其為誰以寄名亭如此竒俗人所患在失之安知達者靜者心平夷達者洞然無所蔽靜者泊然無所累無蔽無累無所營其中主者性與誠登斯亭兮觀斯名人間萬事皆可平耳邉啼鳥喚不起耳邉啼鳥喚不起有人醉卧春風裏被花迷入夢魂中却上烟霞弄瑶水偶述淮隂寄食卒為將南陽朝卧卒為相孟軻之道其如何枉尺如何直尋丈有客不為賦有客不為賦而乃求榮階是猶適呉楚却背東西來孟郊從進士聞者徒相咍退之髮巳秃知巳其誰哉余獨謂不然此事何足哀但恐子之道未足為竒侅子歌堅誠好不為利所囘得則為顔氏失則為隤敳為子歌一闋為子酌一杯余歌為爾宜何歌余聞日月如飛梭但憂其道不到古窮通之事余如何八月十四夜有人望月吟太虚半夜秋風生碧蘆碧蘆風起吹老桂吟聲入月驚蟾蜍明夜中秋更好吟兎肥蟾大桂成林桂兎之外有何物玉池水到中秋溢秋風刮水如霜滴中秋月下作贈吕祕校去年中秋月與子共吟詩今年中秋月與子嗟别離前書約相見頗説中秋期夜久風霜寒對月空相思寄汝弼山陽如許大不與我同住翩翩鴈與鴻可惜分飛去淮中極清泚亦有洲與沚一鴈自安棲一鴻望江水寄張宜伯空中氣候何蒼蒼風力不勁雲不黄一冬無雪農家忙為憂麰麥不豐穰若有雪時滿引觴仍將詩去報庾即牢收浙帥厨中羊恐有劍客過城隍山寺雪夜諸僧圍爐有美酒肥羜之思坐中有劍客提劍而起俄而携一銀榼酒一肩羊乃浙帥厨中物也出北夢瑣言漁者縛竹編茅雜亂蓬四籬俱是野花叢莫道江湖山色好籬落不禁秋後風秋後風從西北起身上蓑衣冷如水夫妻却在釣船中兒孫走入蘆花裡夫妻不㑹作活計辛苦賣魚沽酒費兒孫身上更貧窮白日無衣夜無被昨日前村酤酒處今朝忽見無人住聞道江南地更暖移舟急望江南去釣者有人口誦浮雲曲手把瀟湘一竿竹荻花洲上作茅庵坐看江頭浪如屋漁翁白髮老翁心似鐵網盡溪魚猶未歇船中渾是賣魚錢買酒烹魚醉明月漁父樂六首水曲山隈四五家夕陽烟火隔蘆花漁唱歇醉眠斜綸竿蓑笠是生涯無一事見説紅塵罩九衢貪名逐利各區區論得失問榮枯爭似儂家占五湖堪畫看討得漁竿買得船歸休何必待髙年深浪裡亂雲邉只有逍遥是水仙誰學得飽則髙歌醉即眠只知頭白不知年江遶屋水隨船買得風光不著錢君看取管得江湖占得山白雲同散學雲閒清旦出夕陽還不知身在畫屏間君不悟一酌村醪一曲歌囘看塵世足風波憂患大是非多縱得榮華有幾何濉陽嘗聞唐李氏世號為賢妻以力營七䘮或謂難庶幾孰知蔡家婦其事乃同之豈特在中饋無徃而無儀孝於其所尊慈於其所卑既知義所在終能義所為我生至此極我嫁逢百罹其屬死畧盡其骨俱無歸身為未亡人心乃真男兒以已任其責無忘須臾時但恐事不濟安知恤寒饑乃捐奉生具而為送亡資面不御膏沐首不加冠筓金珠鬻於市文綉容何施更無囊中裝唯有身上衣殆將截其髮幸苟完其肌所得蓋良苦所積從細微如此十年久猶以為支離日下卜諸良宅兆相厥宜一舉十八䘮一旦得所依手自植松楸身亦沾塗泥何暇裹兩足但知勤四肢居者嘆於室行者泣於岐鳥亦助叫號人思操虆梩冥冥長夜魂所獲喜可知鬰鬰佳城中不為中道尸卒辦其家事少慰而心悲義深海可涸行堅山可摧孤誠貫白日幽光凌虹霓吾聞古烈女犖犖非無竒一死蓋易處一節亦易持至如張氏者使人尤歔欷誰為孝婦傳誰為黄絹碑亦有淮上翁為述濉陽詩移書太史氏無令兹逸遺臨卧臨卧更飲一杯酒自唱仙謡拍雙手春風欺醉入懐來留下亂花香一斗哀哀詞哀哀復哀哀哀哀至此極孤兒與慈母中路忽相失恍惚須臾間終日不復得誰復坐我堂誰復入我室誰復飲兒酒誰復哺兒食兒饑復誰念兒寒復誰恤耳不聞慈語目不見慈色譬如行路人日逺於一日行人猶可期逺道猶可追天窮地盡處一日猶可歸哀哀復哀哀此去無盡時誰言生離别不如死别離君不見人巳閉門鳥巳棲黄昏塜畔孤兒啼李陽冰篆書之有古篆文之有六經秦漢而下浸以徙𨽻學基路生重扄其間述者亦世出牛蹄之水纔一泓先生之志在復古胸中直氣何森森獨乘騏驥追大朴執縛浮鋭攘欃槍手中一筆千萬變天風號令驅雷霆地蟠蠖屈體既具鶚立虎視勢乃成剛柔伸屈有常勢天地之道陽與隂傑然出者其勢聳嶽仞五千磨太清盤然屈者非一屈黄河九折來滄溟龎然一畫勢自若老將堅卧中軍營至於一㸃亦有象地丘人目天之星先生大體貴淳古輕輕重重齊權衡周家太師負黼扆髙冠大斾朝王庭唐虞二帝正揖讓臯䕫稷契環兩楹聖人作樂有大本剔抉滛哇完古音大匠作室以規矩悉去臲􅑶除斜撑專車骨節世不朽今乃一縦而一横巨靈以手遏大難印入山骨磨不平雄恢嚴毅不可犯手中常握十萬兵信乎創字自有説宜必象形而象聲天地之大有萬象萬象不能遁其情嗚呼篆法乃如此大哉剛健純粹精走獸之類為麒麟飛鳥之類為鷦鵬蹊徑之類為大路垣牆之類為堅城以徳論之為聖人以法論之為朝廷傍睨衆字乃可笑太山之重鴻毛輕亡國之主好逸豫兒女子輩多驕淫聖人之後惟孟子古篆之後唯陽氷金渾玉璞天下寳嗟乎世俗多聾盲欲行古道世輙笑欲言古道世輙驚志之所之在一賦斗筲之器徒易盈雕蟲篆刻滿天下不矜實行矜虚名六經塵土塞髙閣聖人之道成坎坑况乎古篆固可棄胡為獨好于先生節孝集巻十四
