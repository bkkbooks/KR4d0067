body:
  text: 節孝集卷七宋徐積撰古詩二十九首寄龔豫之震海角龔支使平生無所苟而今五十六豈肯變所守豈獨龔支使古來無奈何逹人自知命世俗徒悲歌謝永城令陳德任舉縣令有餘義以碣表孤墳昔嘗致酒脯兩手披荆榛今乃重加惠使與羣塜辨數十百年後名亦附公傳寄豫之掘地須臾便得泉主人徑直使之然此水埋藏千萬年豈無勃勃氣衝天主人意氣蟄亦久不知誰是掘泉手最好鹽場作選人靣目心腸無所苟贈即朝散仕宦何須論權貴司賔且喜屬即倅篇章淮上至今傳德性清溫善酬對神仙船過北神來應思詩老任員外沙河路上且吟詩猶有黃花伴吟醉乞留草贈路倅二首膝上已無三尺桐門前更少兩株栁唯有庭蕪似野風告闕留伴東臯叟又君看我家門外草欲把煙姿慰吟老誰知人靜雨餘時還似村深日斜好答倪令挑戰之句南城病客方閉門西郭檄書俄入手霜濤洗開醉合眼清風吹起困低首詩陳須知少敢當吟魔已遁無何有可笑將軍不用機示以强兵殆非誘答俞簿詩者為樂章所以貴聲調我雖好之篤子乃得之妙子妙既相逢如何慰病翁有時聞數闋盡日想清風送思權隨趙守往揚州一自移船便恐行城中兩夜夢河汀武林夫子在船宿往往將身夢入城夫子戀德雖未休不過送公到揚州我遣吟魂無逺近直過瀟湘江渡頭謝存中送四花并酒有人自折四般花手中四色成雲霞瑶瓶貯酒白如沙呼童急送野人家一般花是水林檎白處偷紅紅不勻笑臉易殘留恨色淺粧難就帶啼痕無夫少婦善居寡以禮自防容不冶君看盈盈閃色桃酒紅睡起未全消意待傾城又傾國花中偷得兩般色深色桃花將奈何猩猩血染春衫羅欲成鸞鳯吹簫急借塗鉛粉施朱多却是梨花白為勝四色花中容最正若與梅花相並時花葉花柯較粗硬為花傾出瑶瓶酒香泉急溜蚍蜉走兩手各擎花一枝深閃桃花將與誰主人醉起欲騎馬自插烏紗帶取歸寄蔣大漕大使莫憂淮上老無山可望梅花少梅花可種山奈何日中枕上山更多不開兩眼行一步懸崖絶磴青嵯峨豈無閒僧坐林下亦有樵子持斧柯起來恍惚從萬里便買𤣥猿栽薜蘿人間流水寓之意天外白雲來者歌寄汝弼行人過江來遺我數紙書書云困行役家事仍紛如真州嫁孤妹蘇州取病弟方且謀醫藥相期未可冀古風一篇贈梅使君并序漣水縣尹梅大夫景純以古人之心行古人之義淮上老人親聞而親見之故為之吟哦讀其詩誦其事何必古之人乎哉今之人亦古之人也古有賢令尹為貧民出租今亦有賢令代民償所逋何必償所逋不忍傷肌膚君以古人心能為古人義我是吟哦翁亦有古人意幾夜月明中為君吟古風寄江子和客有江子和時時慰衰老寄我江黃書其意不草草恐我有疾病欲我得壽考古人正如是但恐今人少送吕明府古人吕明府而愛南郭吟不嫌我衰朽知子有良心良心何愛吟笑翁為我平生懷抱空一心常在浮雲外萬事付之流水中送陳明府人而有常德古人良所貴乃有陳明府其如斯所謂豫嘗察之久得之辭與氣何以為不忘比諸太羮味再送吕明府昨泛江都船曽作寒冷篇今浮清洛水仍是清風裏野岸有幽花孤村有酒家此酒與此花尤宜日西斜大抵人生要自樂何必持花與杯酌有無酒花俱笑吟為我回頭望南郭有客所養厚一首贈送吳安中歸省其兄有客所養厚氣貌已可知而况五日間議論未停時亹亹來逼人我覺老且疲何人慰衰朽須臾合復離所為吳中喜鴻鵠翩翩飛最好西湖上一床同寢衣鴻鵠喻兄弟也和吳奉議一物勿令侵吾神一事勿使搖吾真養諸內者氣欲息散所滯者體欲伸為報平居既安叟幸為平世難老臣亦有閒僧晤言否呼來伴子逍遙身贈程秀才我是南郭翁門前兩株栁君是誰家雋肯來顧衰朽兄弟六人應姓荀一人錯認李膺門不談俗物唯談文更說長淮謡主人所祝送寧秀才四言所祝君者豈敢如昔在養在正在進在德在好聞過在親亮直精講明辨所以臧也早夜思索不可忘也以正而通以正而窮以義而始以義而終勉之戒之其所養者勿使害之送張子厚滕縣行戰國甚於狼虎鬭孟子力將仁義興豈無父老傳聞事為我訪之鄒薛滕送錢思權子處我為兄我以子如弟何待去呼喚自可來相視因敢苦留君留君住數日待問六年事但恐煩紙筆明日從早起等君到昏黑贈張教授與弟别君看兩鴻亡所依江南塞北何所歸一鴻留在淮之湄一鴻獨犯霜露飛哀復哀兮將奈何願期弟子廢蓼莪先翁經却憂患多為君半夜成悲歌戲答二首我喉已吞霜我口復吞月吞霜吞月太粗豪五臟心胸總清徹東家亦有人中清一從年少名豪英文章餘事能用兵蛇矛丈八折羽旌排成大陳將橫行太華屹立洪河傾螭騰豹躍哮虎鳴斗膽可落突眼睛衝車突騎出不意鋒不可當聲動地前軍已勝後兵繼唱罷凱歌氊帳睡將軍但築受降城老夫不煩修武備君看月上霜君看霜下月不知月蓋霜不知霜蓋月但覺我一身上下中央四旁總澄徹霜是何物如此清月是何物如此明白頭老翁坐中庭半夜可數毛髮莖羣隂積聚純粹精蝦蟇吸盡瑶池津銀河兩道來藏氷玉龍走入蟠千尋倩君兩耳為我聼其間恐有波浪聲初出海時蛟螭鳴却入海時潮頭生小鯨走入尾閭內大鯨大鰍寒不睡莫教射倒金銀宫鰲背神人難設備贈徐彥昔者見君面記得秋風時遺我壽陽書故人情可知一從西城居復來南郭住時時還憶君不知在何處寄朱少府過巴陵後北風猛洞庭水白湘波冷江頭風猛霜霰多竹節老硬竹梢緊此時誰為湘江行其人有道直而清宜其所至無寃情蛟龍不復侵屈平代人上陜西漕生辰嘗聞五百歲一有賢人生議者實在公仍與聖運並全資五嶽粹髙挹太元清與帝為元老與國為名卿中外試已煩玉振而金聲漕柄雖云劇其道安足行宜哉廊廟器蹇蹇王之庭春色滿長安春山圍長坰春芳森綺繡春風鏘瑶瓊秦封幾千里富庶而安榮人與春意和跂竦長安城何以獻公壽莊氏之椿齡何以獻公福洪範之康寧黃河為富貴太華為功名此詩何為者聊用歌羣情節孝集卷七
