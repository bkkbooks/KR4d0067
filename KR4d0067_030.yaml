body:
  text: 節孝集卷三十宋徐積撰雜文代人求薦書某官閣下仕而不得其志顛頓狼狽且將老於州縣者冝何如是必有待於上之人爾然上之人有可告者有不可告者可告而不告之非也不可告而告之亦非也嗟乎捨閣下而之他人是豈可不為非耶然而以卑瀆尊以賤干貴以不肖干賢某實有此三罪惟閣下不以某為狂然後敢畢其説夫下之人其所以待於上之人者不過推而薦之也然推而薦之其亦有取於廉與勤乎如不取之則巳如取之則某將自薦於閣下矣然今之所謂廉者曰無贓汙而巳所謂勤者曰不以私事廢公事而巳古之所謂廉者則曰不苟得而巳所謂勤者則曰早夜孜孜於其所事而巳閣下將曰汝於此二者安處焉某將對曰某之愚將兼此二者非將兼此二者安敢有意於閣下乎豈有叩魯般之門而不知斤斧之用入王良之廄而不知銜策之用乎故小人之於大君子其道雖不同然必有一事近乎君子之所好者然後敢恃而來也雖然豈敢恃也哉其實顛頓狼狽且將老於州縣無如之何乃自為衒鬻之計也伏惟閣下惻然動心焉譬如一孺子坐於泥塗而烏獲之在傍不過一引手之勞即援而出之也某之亨否決在此舉下情無任惓惓代人求薦書某官閣下某不佞某將有告於閣下者不敢詳具蔓辭苟自為遊説之具其所以來至誠謁見閣下不以某為狂且恕重罪留頃刻之間使卒其説惶懼惶懼某三衢人也少而苦學長而不得其志乃用蔭為吏凡在州縣間十餘年矣公卿之間無葭莩之親半面之舊其性質朴魯鈍不能籧篨戚施以為悅媚之容故在州縣雖十餘年之久卒無所遇者求之於不肖也蓋亦有由焉爾然此事可為閣下道不可為時人道也某嘗自計以為平生所見公卿大夫不可勝計至於方正長厚公於朝廷鄙薄勢利汲引寒賤未見有如閣下者捨閣下將安之乎此某之所以不待一日之雅左右之介而自為衒鬻之計也是亦區區下吏不敢不以古之道來也然自視所有無足以辱閣下之知者而小人有犬馬之能願得煩辱役以自試閣下觀其所效何如然後罪之器之某顛頓狼狽且將老於州縣矣伏惟閣下惻然動心某死罪死罪上楚州慎郎中書知郡郎中閣下甚矣人之恩不可忘也某嘗居關中矣有崔公者時為華州太守某始以文字見焉今日觀某文明日問人曰子識徐某乎某文曾見否時所居窮巷與樵採鄰賓至則坐於門外公不以是為陋儼然辱而臨之又時使人叩門曰無恙乎公貧甚然所與者源源而來飢而食寒而衣身不勞而親有以養几如是者實一年及治任將歸公曰子能為我留乎吾將以子弟學於子某於是為崔公留愛某之身而及某之親削巳之俸而使某有餘不挾長貴而與某朝夕焉公之恩可謂勤矣嗟乎世俗輕佻浮薄今日受人恩明日忘之矣某也何人敢自謂獨不然耶然公之恩未嘗忘之也思其恩欲見其人不見其人見其交如見其人嘗聞崔公為興元時閣下為洋州矣其相與情好以至詩酒之娛無如閣下也及崔公改按察即以閣下之才上之朝廷崔公何嘗妄與人哉觀其人閣下之賢可知矣而况講聞盛德之日甚巳久矣此某之所以委負薪之役諄諄而來固願掃於閣下之門也惟下執事與之進退謹伺命唯上提刑邵學士書提刑學士閣下古者上下相尊用下尊上謂之貴貴用上尊下謂之親賢是故年雖倍其父兄而不敢挾其長貴雖極乎卿相而不敢挾其貴孟獻子百乘之家也有友五人焉費惠公小國之君也所師者一人焉所友者一人焉豈惟百乘之家哉豈惟小國之君哉雖大國之君亦有之矣晉平公之於亥唐也入云則入坐云則坐食云則食雖蔬食菜羮未嘗不飽也蓋不敢不飽也嗟乎古之人何獨有此事今之人何獨不有此事豈今之公卿大夫在乎上者賢而布衣窮處之士在乎下者皆不賢哉豈今之時與古之時異者哉是故布衣窮處節操之士寧閉門却掃潛光遁迹不願與公卿大夫相聞也某嘗恨此事嘗發憤太息又以為今之天下雖有如此事而吾未之聞也前年自關中來山陽乃見同人説閣下用孫覺為學官某曰為一州為一軍用人為學官乃常事耳然又思古之人雖能尊賢愛士而未必能用之今閣下既能愛其人又能用其人是真公卿大夫尊賢愛士之實也且閣下以一員外郎知一軍尚能得其人而用之使他日閣下為宰相佐天子治天下其得天下之士而用之宜何如也既而又得閣下與孫覺書一篇其文皆述安定先生之道某於是又知閣下能知先生矣嗟乎世之囂囂者尋罅窺隙究虛百端以此言毁吾先生之道而閣下乃能獨立不顧大明吾先生之道以尊重其人如此閣下之賢可知矣嗟乎古之天下如閣下者幾人今之天下如閣下者幾人安定先生吾師也能知吾師而尊之是猶知吾父而尊之也知吾師而尊之其徒之心視其人如何此閣下之道使某言之不足而嗟嘆之也雖其人閉門却掃潛光遁迹不願與公卿大夫相聞亦不可得也近著六篇謹授僕人投獻且以為几席之汙如閣下者姑可矣然後敢自信即盡其所有代崔刑部與劉先生先生閣下六經皆聖人書而宜所先急者其春秋乎有議春秋之所好惡而敢為非議者否也春秋之義失之久矣仲尼據魯史筆削一字正褒貶之大法左丘明作傳固宜附其源奧與聖經相為表裏不當詭意蔓辭汨亂聖人之文以為富豔之具公穀二氏雖矯此弊而悖聖人亦多矣杜預作注又托左氏説附贅經下其意欲專守左氏簡去二傳其不憚煩巳甚矣何休范寧自謂有志於春秋而休之學怪妄不經特甚王仲淹以為春秋之失自歆向何必自歆向自丘明始之也噫春秋者賞罰之權衡也仲尼之志盡在春秋不宜使之昧昧如此必有張而明之者非先生而誰願先生發憤一道使諸生執經座下以就其學是先生之道與天下共之也不識能之否乎謹伺命唯上楚州太守書某官下執事古之人未嘗不下士也雖其內有不合亦且陽陽浮道而與之况其道無所不同哉今之人不下士久矣至有不交一言而擲其人其意豈不曰我尊官也爾賤士也吾何為之屈哉挾長而見挾貴而見以為是適然耳嗟乎士雖窮賤亦何能籧篨戚施以為邪枉之道乎下士則進不下士則不敢進也閣下既下車者幾日矣治某事言某言山陽之人傾耳而聽喜而相告而况至於某之輩哉某關中人也其嘗任涇州非閣下乎及閣下為泗州而某巳居山陽矣是以二州之政耳聞而口誦之其為日巳久矣豈有盛德如此而布衣之士不得進於門下哉此某之所以獨知其進而不知所以自量也其亦可使得見否乎謹伺命唯代汪主簿上田提刑提刑學士下執事前某既上書惶懼不知所為待罪纍日不敢以巳願復自畢其説惟閣下并容廣覽不以某為狂且恕重罪而少加憐焉某無狀為簿尉官者實兩任凡十餘年年且老未嘗一遇知巳今乃不圖天與之幸而外臺王公者不知某不肖嘗語人曰汪某者可謂亷且勤矣即以不肖薦之朝廷而兵部馬公者亦以為然又從而舉之然某自到官巳逾二年更數月且將罷去而舉主數實未足當此之時不能決然自奮不肖之軀而忝竊閣下一顧是齷齪自棄也某雖無狀幸為閣下之吏事閣下之日不為不久顧其心豈不有冀於閣下耶捨閣下其將安之乎重念某生而鄙朴實自知無他技徒能以謹亷修潔自持自厯官以來雖無尺寸之效亦未嘗有毫髮之過惟閣下憫其窮且老惻然動心而與之亨道焉某雖不肖願以犬馬之勞仰酬閣下大恩之萬一惟閣下憐之無使區區賤吏老於一簿尉而巳也日暮之人其心狼狽言意迫切唐突威尊某死罪死罪代人請見書某官閣下是非者天下之大公也某人某事是議者必是之矣某人某事非議者必非之矣是亦不徒然而然也挾利害於其間阿其所好惡而然也至於識者則不然某人某人吾父兄之黨也吾之所嘗好也今有某事其事不善則將是之乎非之乎縱其口不欲言其心亦非之矣某人某人非吾父兄之黨也吾未嘗好之也今有某事其事善則將是之乎非之乎縱其口不欲言其心亦是之也而况不挾其利害不阿其所好惡而不徇其情者哉然則閣下之行事某藏之胸中而又誦之於口日巳久矣不如是是瞽於見瞶於聽冥於瞽惡與世俗之混混也故某之來見閣下與他人不同非苟見於閣下也閣下其亦將苟見於某乎賜之坐與之語由外迹以求其心如何代人上省判蔣工部書省判工部下執事天下泉貨軍國大計此非三司之任乎故其使必擇天下能者而又擇能者以為之佐今聞朝廷用閣下宜矣此固吾君吾相且將大任閣下之階也甚休甚休老人之子某者為濠梁掾某不見此子者逾年矣即嘗以此意叩於下執事且欲其假一事而來也一日有來報者曰濠梁掾來矣某笑且問曰信然否既而果吾子也入門而聞其聲上堂而視其面老人之喜其有大於此者乎嗟乎人之情莫親於父子父之年且九十而久不見其子子久不見其父此其心宜何如耶而閣下能使見之矣其恩之大小輕重宜何如而報也此古人所以感恩而出涕也前日聞閣下拜嘉即聞使節不可以久留皤然之叟甚欲一造節下以拜閣下見謝萬一而某之軀老甚殊不可以筋力為禮用是不果此實老人之私恨也惟閣下顧上意自夀以繫中外之望以永膺無窮之慶此老人惓惓也上趙殿院書月日鄉貢進士徐積以兩耳病聾不敢走伏節下謹再拜授僕人獻書運使殿院下執事前年嘗為臺官者非閣下乎積思閣下之日久矣雖病聾數年亦未肯自廢身居布衣而志在朝廷聞天下有一利未嘗不欲興之聞天下有一害未嘗不欲去之今有四事不敢與衆人私議謹與下執事公論之其一曰明經不宜拘注疏其二曰經分大小其三曰二年一開科場不便其四曰尊經抑進士何謂明經不宜拘注疏去年朝廷復置明經科議論者皆謂此科廢來巳久朝廷能復之是復古也於是窮經者與窮經者相告未窮經者與未窮經者相告而窮經者日益窮經未窮經者皆思窮經議論者以為此科行之十年古人之學可以復而雕蟲篆刻之學可以廢也此豈非天下之福哉豈非萬世之福哉今年乃見所謂明經條制其對墨義帖經對大義對䇿分為八場先四場對墨義帖經後四場對大義對䇿其對墨義兼全引注文其對大義亦具注疏本意此固朝廷欲求該博實學之一道也然議論者皆謂此制與朝廷建明經本意不同朝廷本意其大略蓋患學者之失文浮而少實雖或口誦其文而心昧其義故特建明經科使夫朴茂之倫得以發攄其藴今乃拘以注疏之説則是朝廷不貴明聖人經義貴記誦注疏而已且學者窮經必先熟誦本經然後觀注疏若注疏之説是則取之若注疏之説不是雖一字不取至如窮春秋必先熟誦春秋經然後觀左氏觀公羊氏觀穀梁氏若左氏之説是則取左氏若公羊之説是則取公羊氏若穀梁之説是則取穀梁氏若三傳俱不是則俱不取傳且不取而况於注乎而况於疏乎蓋注出於傳疏出於注也然大凡注疏雖多失少得若其説不至迂繁學者欲應此科亦須勉強而記誦之今按一經之內積文下注有倍於本文者有數倍於本文者有十倍於本文者又有倍於本文而不可勝計者而數不與焉使學者如何而記誦之然而必不得巳積日纍月劬劬勞勞雖無用之説百千萬億亦可記誦但恐學者勞而無功博而寡要非英儒之學腐儒之學也自非有為之士則不肯窮經則不肯拘注疏朝廷必欲使之拘注疏則自有諸科今既建所謂明經科則不宜拘以注疏若必拘以注疏雖其人負孟子之道韓退之之文亦恐無能此科矣且朝廷建此科必欲人應之也今諸科舉人雖能唇腐齒爛記誦注疏之説至精至熟然而並不知經義窮經之士但明聖人之道而不能記誦注疏則此科將使何人應之哉則是朝廷有復明經之名而無復明經之實也謹按漢之學者皆能精通一經其時固未有注疏其所謂精通者或得之於心或得之於師精通聖人經義也故其所學如此者於行事如何其列於史傳其見於後世如何以此論之責其通不責其實貴其要不貴其多蓋精者不博博者不精此事之常也至於商農之業百工賤技皆如此也唐之啖趙陸淳此三人者可謂明經矣於聖人之道可謂有功矣然而解春秋多不取三傳而解已意而况於注疏之説乎故後之學春秋者必自啖趙始此皆前世窮經巳然之效也自唐虞以來簡䇿所載天下治亂之本未嘗不繫取士之得失也而士之所學繫上之教何如爾以此觀之朝廷固當養育天下英才使之不為腐儒之計也且朝廷亦嘗置説書科亦何嘗拘以注疏故近年多得其人為朝廷計者莫若取説書科條制仍以朝廷建明經本議再詳酌而行之以塞天下之望以網羅天下之英傑以為萬世不刋之法豈不盛哉豈不快哉此一事也何謂經分大小近降明經條制毛詩為中經周易為小經議論者以謂毛詩恐不宜為中經宜列為大經周易若據字數誠合為小經若據經義得列為大經又曰聖人之經不必分大小其三傳春秋亦不宜各置科只宜特置春秋科使引三傳解之而附以已説今置科若以春秋為名則是尊經之義也若以某氏傳某氏傳為名則近乎棄經任傳之義也故董仲舒守公羊劉向守穀梁歆守左氏此三人者於春秋各守一傳故不能大明春秋之道此先儒之弊也其孝經論語此二者聖人言行之書恐不宜為帖經孟子醇乎醇者也此三者並宜附於易科爾雅多識鳥獸草木之名宜附於毛詩科諸所附者皆問大義謹按帖經所起蓋自唐初劉思立為考功員外郎遂奏明經加帖甚非古也積亦嘗應進士舉其帖經墨義但互相傳寫一本爾科場之內有同兒戲何益於事哉其帖經不若罷之此二事也何謂二年一開科場不便積常行陜西道中親見西川舉人多是徒步或自提挈或十數人共雇一僕役其甚者破産業而來及至半路或滯霖潦或不幸而有疾病故有不得應舉而歸者雖應得一舉亦受盡艱險今又二年一開科場則其逺方孤寒益受其弊也然又有大不可者今之為進士者多是不肯治經但於經史之內摘拾題目及賦中要用事迹其甚者只是記誦近年詞賦䇿論及諸家類題以為苟進之計今又二年一開科場宜乎學者尤不暇治經尤為苟簡之計以此論之且宜仍舊四年一開科場或三年一開若三年一開科場亦宜於轉運司類試積夙聞朝廷亦嘗議轉運司類試今誠能如此以一路州府軍監解額定為轉運司解額使天下舉人只就本路轉運司試不惟便於逺方孤寒天下舉人皆便也而又可以革寄應之弊也且天下舉人所以多就開封府寄應者亦無他蓋為本土解額人𢾗少今天下解額又減其半則是開封寄應者益多而舉人之冒法者愈甚也今若轉運司類試總一路解額解額既廣則人皆便之是可以革寄應之弊也其福建一路舉人最多故倍於他路只宜各在本州試圖天下之便者不必同也拘一路者必妨天下也此三事也何謂尊明經抑進士近降明經條制十三通者乃得比進士第一甲今進士及第自三人巳前便得大郡通判只是一賦之功其恩例在明經之上恐非朝廷尊經重道勸天下之本意也謹按明經所學與進士所學浮實大不同其進士恩例宜乎殺於明經當此之時正宜尊明經抑進士凡此四事實關天下大利害固學者之所宜究也古聖人之為君古賢人之為臣雖愚夫愚婦芻蕘賤人之言未嘗不取而行之未嘗私巳之好惡而妨天下之公也至於後世則不然雖有可用之謀可行之議惡其䇿不從巳出往往沮而不行但欲行巳之謀售巳之説惡其議之異於巳者此皆不公於朝廷不顧天下利害也然而豈能掩天下之公議哉豈能掩萬世之公議哉徒自大其非耳今閣下為朝廷耳目之官所言所行者當思至公之道則積之所言合天下之公言願閣下早為之所幸甚代慎秀才上陸學士書學士下執事前日不幸至於大故先人棄諸孤諸孤苟假視息以畢大事今葬有期宜有銘以銘之不得則無以掩諸幽此諸孤所以泣血相告皇皇如也然前人之銘其行事可信與否未嘗不繫其作者何如爾故觀銘者必先觀其文果誰乎苟其人也必從而曰某銘某之所作也其所銘者可信矣苟非其人必從而曰某銘某之所作也其所銘者未足信矣如此則與不銘何異是不可不重也嗚乎以今世之文而能取信於後世者非閣下誰乎先人自厯官凡九任積四十年餘其相識者不可勝計至於平生與諸孤之言其所切嘆服者閣下而巳今先人不幸至於大故其不肖嗣無以為先人之光故必將圖閣下之文以圖先人之不朽焉惟閣下哀憐而與之無使諸孤失其本心其行狀輒用致於下執事諸孤惟以圖先人之不朽而不復自量也其死罪與亷公望薦王秀才書亷君公望足下士蓋有不待相見而相知者積於足下是也積固不敢以時輩相期以古之道期於足下焉顧足下待積之意何如爾琅琊王君彥升者積與之無頃刻之舊與之往還之日亦未甚久然知其人博學能屬文事親孝事長順與人交和而有禮完然不見其缺可謂善士矣然其人貧甚其家七八口無以為資環堵之中狼狽萬狀今乃以至易其所用器物而苟以為須臾之計然器用且盡大寒將至菽粟不足於其口繒纊不完於其膚使其人一身獨如此而巳可也然其人有老母既抱羇旅之恨而又戚戚窘乏如此為王彥升者宜何如哉彼口雖不言顧其心豈不有待於人乎夫十室之邑必有忠信而况吾鄉黨豈無仁人義士乎在夫有為者唱之而巳也積所以其心惓惓將有冀於足下也惟足下深有意於王君使王君有以悅其親顧不美乎王君有老母積亦有老母愛吾老以及人之老而賤貧無可為之資故將欲有所為而莫之能為甚於齪齪而無所為者不能不慊於其心若將餒者焉自不能巳乃用告於左右與吳待制書安撫待制下執事今天下士籍籍論述閣下行事謂閣下之才無施而不可閣下之處一邑也一邑得其賜金壇是也閣下之處一州也一州得其賜池陽是也閣下居言責之地則侃然正色不畏強禦使夫姦欺汙漫之輩魂喪氣沮不得以肆其欲而朝廷賴之以寧臺諌是也閣下用之於繁劇則齊敏辨察有不可學之明智足以辦事而有餘而輔之以仁術非若俗吏特一心計小數瞡瞡而巳也此軍國大計所以不勞而成吏服其神明而愛其惠民吟咏而歡樂之三司是也但未見閣下為宰相爾使閣下為宰相佐天子治天下其設施注措本末先後固閣下之所存而天下之所望也學者之所樂道之也今者閣下將天子之命當一面之寄斂天下之澤而萃之於一方閣下豈不優為之哉朝廷無南顧之憂矣伏惟閣下自重代李駐泊與許職方啓兹者假媒妁之辭謀婚姻之好屈中臺之貴族顧右列之單宗幸自不遺慚非所偶恭惟某官文登英彀秩處名曹䇿足要津有聲當世紫泥鳯詔宜優異等之才青雲鵬霄巳有雄飛之勢某早聆大望晚拜溫儀不謂寒門得依髙眷萬萬之意豈任其私代人回報啓近者偶以單宗輒攀令族雖金蘭之展契愧玞玉之異芳豈謂媒妁見臨緘縢為貺禮逾情過愧與幸深且承納幣之期仍諭共牢之夕椇榛為贄敢忘受室之儀鞶帨修容巳謹從人之戒所承嘉命敢不奉從惓惓之私指敘奚罄代李駐泊上李客省啓伏念自違大斾深跂髙風嘗聞拜命之嘉殊乏貢緘之便敢圖盛德尚齒同僚屈巳之尊以書為賜禮逾情過愧與幸深且承休福之來密有神靈之相恭以某官稟川嶽之秀兼文武之全丁虞朝日月之華藴郤帥詩書之略永惟全德尚屈逺圖冝在將壇以光賢業代慎駕部上南京劉相公啓伏念碌碌賤官庸庸近器早緣大幸嘗側下塵雖霄壤之路殊而犬馬之心在仰惟百神隂相諸福來宜恭以某官天昴儲精嶽嵩孕粹凛凛國器堂堂棟臣當千載之盛時為一代之名相蓋均勞逸乃重藩宣民思霖雨之恩帝輟股肱之重方今勵精而治側席以求固巳詳延於衆賢必將圖任於舊德入持台柄參贊陶鈞足以措時重雍致君髙拱博觀衆議實在元勳代人與夀春令啓向從吏役俄終戍期既旋弊廬即聞受署恨無徑翮往揖髙風邈若胡秦之遙徒積參商之嘆握筆持簡難形仰上之私慎寢重興以永大來之吉代人與濠州郭右司啓伏念早聆髙風吾黨末由而跂慕晚緣大幸兒曹乃預於使令敢貢私書仰塵下執惟百神之陰相有諸福之來宜恭以某官以才德之高都搢紳之右雄文賁若竒操凛然中外之試巳煩朝廷之望彌峻一麾出守聊屈於逺圖三節以趍即膺於顯數代李駐泊與沂州石比部啓伏念睽違未幾企仰惟多時迂赤牘之來如受兼金之貺禮逾情過愧與幸深惟明神之所扶有諸福之來萃恭惟某官全才挺特治具該詳對休盛時蔚有能譽左符篆竹巳交政於黃堂五馬朱輪即班春於緑野敢祈自重以永大來其在惓惓何以涯罄與寶玉大師啓某啓失問逾月不審安否屬者玉公大師及諸上人即墓次親啓法席內盡其誠外豐諸物環墓數十即神座而祝之自昏及旦其事大周德意可以格神義心足以感物見者莫不悅聞者至於歔嗟况其區區之心乎恭惟屬者之事實及吾毋弔冥魂於黃泉慰哀思於白日蓋古人之所未行後世之所難有可謂不世之髙義也某雖甚庸不敢以言報然牽母子之愛欲報之實未知義所措惟是藏之於心死而後巳區區之言何足盡意輒因問起居少布從者感涕不知所云謹啓不次某啓上代池倅慎駕部與太守先狀兹者代戍而東趨治之下顧惟江境巳在使封未瞻羅戟之門巳預歌𥜗之列行賫板刺前造賔階其在欣愈何以涯罄代慎即中遺表臣某昨奉勑差知海州軍州事於楚州待闕至嘉祐四年四月二十三日偶染沉疴醫藥不效奄奄之息指長夜以將歸冥冥之魂戀明時而莫逮尚留寸晷以罄哀誠仰期帝澤之沛然俯及天民之窮者中謝伏念臣早緣蔭藉遂忝榮階白首即曹敢嘆逢時之晚朱輪州將屢玷出麾之權固嘗驅䇿駑才砥礪臣節老而愈固知無不為未嘗以陛下之法而害善良未嘗以陛下之刑而私喜怒雖自無卓犖之效以擬古人亦嘗著涓埃之微仰毗盛旦方且沐浴膏澤鼓舞聖時願陪夀域之民永荷仁天之覆不謂自招疢疾遂至膏肓嗟六尺之軀將隨土木之化望九重之闕永辭鴛鷺之行重念臣自束髮以來逮事兩朝厯官七任死之將至家無遺財老幼嗷嗷二十餘口兩女未嫁四男白丁其長男宗傑凡三應進士舉頗服膺為儒敢希任子之榮庶竊代耕之祿伏望尊號皇帝陛下特迂聖覽曲軫睿慈俯天光而燭幽大恩波之延世如是則為箕不墜轉壑無虞生者蒙再造之恩死者有無窮之感意迫情切言與涕俱臣無任祈天望聖激切屏營之至節孝集卷三十
