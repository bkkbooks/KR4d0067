body:
  text: 節孝集卷二十七宋徐積撰古律詩十五首蘇子瞻挽詞起起公終矣斯文將奈何新書傳異域舊隱寄東坡直道謀身少孤忠為國多死生公論在髙義自峨峨又白玉棺無價青囊葬有書奔星來啓路走電去隨車官是修文號人同上行居峨嵋山下客誰是跨鯨魚蹇侍郎挽詞舊德朝之望平生勇所為赤心逢誼主皓首棄明時路入皇宫近誰將畫翣移有人號欲絶莫誦蓼莪詩又一閉玄堂後更分明與幽雖辭白日去不忘錦江遊古檜蒼顔在孤雲壯氣收文章如可訪遣使入西州楊集賢挽詞彼美朝之望光終不較年醇風隨入地義氣去凌煙身後人人慕生前事事賢故交貧與賤沉痛欲呼天又門靜車聲歇庭虛燕几間藝籖新汗簡玉筍舊淸班事寄浮雲外身從大夢間復為長夜寢慟哭入玄關韋侍郎挽詞徹殯哀鈴動蒙棺素幣舒明旌先啓路畫翣側隨車長夜玄堂近平生燕坐虛須臾泉戶闔挽紼且徐徐又野水鶴猶回舊山雲不歸不歸將奈何但恐雲無依公是吳中老吳人愛公好公好不來歸淚濕江邊草林殿院挽詞吁嗟人兮而有斯人以義為質兮以剛守身內明白而外昭晳兮氣貌甚真動則不苟兮可使之為國可使之為民使之為國兮取義舍生使之論事兮傾出赤心世方好柔兮我方剛彼為轅下駒兮我方鷹揚彼作威之臣人莫敢當我方藐視兮直攻其強彼作福之臣兮烹煎牛羊羅列酒漿我方折其匕箸兮覆杯而不嘗以甘易苦兮自以為常以退為進兮如寢諸牀所往所居不察刀筆者害兮簿書有蔽隱必露兮伏必發照姦膽兮破姦穴小姦積忿兮五藏欲裂大姦睚眥兮其眥有血口且欲吞兮齒且欲囓何誣之不誣何説哆兮侈兮三寸之舌顔淵偷飯曽參鬭殺慈母投杼兮其誰不信所賴公明兮得無悔吝夫何不幸兮人之云亡誰司有命兮付與之不長揭丹旐兮歸晉疆望江湖兮歸故鄉太行山上秋風起度浮梁兮盟津水符離東畔更凄涼山陽猶有舊吟忩吳人俱望揚子江素車白馬迎道旁故人亦有孤與孀更憂今嵗寒無裳洞庭橘柚正青黃鱸魚膾美蓴羮香且緩哀鈴送酒觴一辭白日掩玄堂玄堂一掩難開扄夜復夜兮何時停負髙才兮成鬱鬱揭髙義兮徒冥冥一心在兮湖水清萬事空兮山月明悲慟處是松陵雲慘兮鳥哀鳴念骨肉兮摧心形鬚鬢斑兮涕縱橫寧倅挽詞人生如逆旅來去何容易對面正談笑轉頭成夢寐傷哉手上書已矣胸中事義不復駕驥灑盡辭家淚又記得髙山否淮東非所歸誰迎玄冕去自趂白雲飛泣盡孤兒血空遺舊日衣容州公莫去此地故人稀又平生富情義至死不寐悔更無桃花米惟有銀魚佩一家將奈何九子尚無配魂兮且勿憂幸有山公在山公乃太守裴公也李朝儀挽詞一從洪井到處州見説洪人總淚流本望聖朝令久任若論明吏合封侯髙才所至都無事厚德於今可鎮浮故作此詩傳野史不須銘記掩諸幽哭張六并序張六子莊死矣十一月十三日夜四更時積用素服望其所居哭之哭且為詩明旦涕泣以書使孤甥老老致於柩前嗚呼哀哉欲視目已瞑欲語口已噤欲動肉已寒欲書手已硬惟有心上熱惟存心中悲此熱須臾間此悲無休時所悲孤兒寒所悲孤兒飢苦苦復苦苦此悲遂入土招陳顧魂挽詞魚有所歸鳥有所棲孤墳纍纍子將何依束子之裝褁子之糧促登汝航往歸汝鄉節孝集卷二十七
