body:
  text: 節孝集卷四宋徐積撰古詩二十二首送蔣憲穎叔并序國之南服逾嶺而西號為重地而兵刑最大本朝選用名賢即拜山陽太守蔣公奉使以往公始聞命不敢安處即日束裝以俟即拜其命遂決行日一州之人皆惜其去以其嚴而不苛察而能恕實受其惠也作詩者因民之情述公之義送公之行亦以告諸越人也五嶺之南其極西徼其旁大海木深山峭內有溪洞外有交趾皮厚肉堅鐡為骨髓雉兔伏藏猱猿突起動如飄風猛如湍水獨恩不畏獨威不懷擾之則去撫之則來恩之與威不可去一寬猛交濟不可無術坐當一面則有帥臣按刑將漕要皆得人以德以才公稱其選能不擇官義不辭逺始聞有命嚴裝以需青氊角簟藥鼎茶爐琴堂舊譜鈴閣新書史帙籖重詩囊卷粗前施齋舫後設行厨公既拜命不敢寧居乃戒徒御乃建帆檣鳴刁擊鼓旗幟開張州人感恩父老童稚知不可留以足頓地或前塞路或後從行或獻花酒或犒從兵或望於野或送一程即日渡江江南春早雪盡氷消江山如掃栁徑桃蹊梅花芳草沽酒村遙賣魚船小晨散烏羣暮歸白鳥春正好時已到嶽陽嶽陽樓下蒼蒼茫茫嶽陽樓上飛沫浮光江山舊物吳楚凄涼夜宿巴陵曉過洞庭湖中水緑湖口山青黃陵古祠長沙古路瀟江湘江風煙古渡嶽麓茶林沙洲橘樹此時春深衡陽鴈去時飲一杯時吟幾句更望九疑清詩無數攬轡登山日日西南褰帷叱馭車不停驂乃有部吏乃有蠻酋青衫負弩錦帕纒頭公曰使者實典兵刑增置強弩多募土兵宜浚其隍宜堅其城公曰弓手宜如舊制加之訓練可使精鋭可代城郭為民捍蔽公曰民命懸在獄官不可不慎不可不寬寬於善良勿失有罪惡人如虎養之成害公曰生民不可無教教民之官縣令最要今則不然困於簿領甚者可除煩者可省仍復鄉官則無所病凡我部吏各恭厥職夜則精思晝則宣力一節當官赤心為國如此教告如此施設吏則心服民則心恱諸公聞之薦者交章朝廷器之下詔褒揚召而用之優於馮唐謝吕帥寄書并序淮上老人七十四嵗矣衰朽疾病日入於不可支廢書久矣故作詩代書為吕公一笑也公家兄弟以問名子是其所尚者家法如此作詩者其可妄乎以其法可傳也疇昔逢公時老人恱公義率然應公問而云在藏器公以問為好其法為可傳老語不記時人事成恍然送程運判江南風物可醒酒江山氣勢侵牛斗大庾梅花入界香南康瀑布從天吼此間好共吳人樂井蛟為害須除却觀風未到庾公樓褰帷先上滕王閣仙籟鳴時獨鳯吟劒池黑處雙龍躍縣令寧無種秫翁還似王𢎞就翁酌最是髙賢徐稚墳急齎酒脯祠溟漠部吏爭迎使者車野人夾道亦歡呼且得官司減鞭箠若逢水旱放田租關市如何從薄賦設法通商為逺圗方今聖世雖無事須修武備戒不虞生民所恃在城邑更嚴壁壘完其郛何况荆湖與二廣溪洞盡是蠻所居一日除書遣受降便持斧鉞建油幢陳上風神應更偉軍中才氣亦無雙勢似疾雷從便道揮兵直指富良江代玉師謝蘇子瞻海上山翁歸童子言有客身披一鶴氅足曵雙鳬舄控却大鵬頭踏著巨鼇脊面帶玉山氣手畫龍泥壁諸仙爭進硯一笑已投筆其夕刮兩眼燒却犀一尺寄李道源春風本是詩家友典却琴書也沽酒呼童去問紫霄翁近來枕上吟詩否不醉不吟將奈何過却今年春已多胸中壯氣吐不出看看空作送春歌酬李道源彈琴之句二首數尺焦桐常在手知子愛歌兼愛酒今朝已是二月三梅花驛使曽來否古今多少無奈何古人慷慨良已多為報陶潛且飲酒無絃琴上不須歌又漫翁來索詩千首須與古人沽美酒近來聲調大尋常不知得似陽春否漫翁教我歌云何水逺山長春思多安得桓伊吹短笛共君慷慨一時歌和馬秀才并序余為淮之水鄱陽馬進士為長淮謡二篇大指皆歸於平和而無憾是平世之音也夫既歌而善矣於是乎自反而和之也君看淮上翁雖老胸中意氣從來好白日吟到夜夜後吟到曉門前是雙栁樹上無棲鳥西邉是人家人家兒夜啼四更五更後往往催鳴雞東邉是空庭空庭清風多吟聲上河漢河漢生銀波移聲入明月桂樹無停柯蟾蜍不得睡狡兔將奈何清風却下來直入淮之水不知淮東西波浪如何止清風清風不復住復住射陽湖上路寧知烈士怨曹袁義鬼哀哀寃未訴此聲未可闕臧洪不須更往吳江去吳江心中有寃血寃聲吼兮寃氣結奈何乎湘江亦有獨醒夫醒時何故沉其軀當時魚腹今在無此聲莫過洞庭湖謝皇華使者并序皇華使者送趙公也趙公罷山陽守奉使荆湖邑人徐積作是詩也皇華使者將就車先聲即日傳江湖良民置酒相歌呼姦人落膽猾吏逋手中平握三尺書權衡輕重量錙銖寃聲弊獄一切除寧其家室完其膚本朝寬大恩涵濡一物不被成焦枯煩公大手持刀鈇開塞去擁鋤荆蕪其和易致仁易孚此行遂與春風俱蠻酋鼠竄稽天誅官兵指日縛狂奴皮囊插羽徴軍須人方汲汲公有餘藉公之智須公謀使星已動宜疾驅非惟一道無無辜朝廷南顧無憂虞吾州父老將何如呼其子弟牽僕夫縶之維之馬與駒晨炊夕㸑空其郛亦有下客身鰥孤懷公禮義心區區寄詩如問公起居公能報我荆州書謝田守并序太守大夫公重於安節近在燕居不視事日有縉紳士大夫布衣諸生吏民之在部中者問公居處各以類至而某獨不肖獨不以身往失事太守之義其罪固以自訟矣太守復視事一日登乘以出即以其日遣使持簡送柑酒二物所以問勞甚溫是其意篤情專勤於愛士又能恕人不及如此顧不可無詩以謝且欲因是詩祝太守之重自愛也太守自移疾凡有三簡一再送酒而衰朽吟哦緩且粗略惟公一笑也前日李山陽説公安且裕精神健復初決遣敏如故吏復畏其明民復愛其恕可保長康寧但更勉將護尋聞車馬出州人喜可知或出車前望或走車後隨南郭有賤叟雖愚亦更喜不敢問公者恐煩答數紙賤叟固自訟太守謙愈勞即以出之日折簡親揮毫送之上尊酒副以黃巨苞情意專如此禮義積已髙賤叟不能報自恨如時輩所以作詩者欲公重自愛自愛以為國為國斯為民慰我之鄉黨恱公之慈親謝畢令一身多難過春風兩眼未見花枝紅近來廢却無限吟今年自覺詩無功畢令與我如相識遺我春醅表胸臆知我愛酒兼愛詩使我吟哦醉春色春色半酣正二月草頭爭露花爭裂是花是草屬詩家若無此酒幾虛設此酒有似君德醇先入六腑搜吟魂相將醉魄御煙雲遊遍江淮無限春謝王觀文韶東野鰥夫未識公寄聲直入茅廬中茅廬四面生春風草頭添緑花添紅東野鰥夫最好吟感公髙義藏於心為公製作平戎曲彈向蔡家焦尾琴謝呼延禁侍有客從京南來尋淮上叟氣貌良肅雍辭令亦溫厚如此巳可喜遺我故人書須臾四千里恍惚遊江湖昨日之夕和蔣頴叔昨日之夕誰叩扉大使遣人來索詩吟聲一發巢烏飛一夜清風搖木枝吟亦不住風不停安知半夜風出城大使船上風霜清更添南郭吟哦聲寄崔尉人間多少無奈何勸君收淚且酣歌不須載酒但相過共君携手踏青莎東臯間日苦無多南城應是合吟哦胸中有淚難消磨惟豫詩興如風波送張君河朔之行嘗聞此道春來遲山中積雪埋狐貍黃河三月氷正合朔風凛凛吹人衣吁嗟客路正寒苦數千里外將何為答云此去非徒爾有如羽翼投髙枝主人之賢聞天下出門捨此將安之嗟豫贈此復何説少年養取胸中竒古人之學不可廢丈夫之操不可移江淮之上親且老臨行須約將歸時邉城吹角客心亂此時應望東南飛答范君錫泛泛愛花之句泛泛愛花非愛一范掾愛花如此密一從春色到人間每月弄花三十日第一花中愛牡丹待與金叉共玉冠第二桃花及杏花此花大抵顔色奢又愛墻頭看海棠亂點燕脂如急粧更無間暇及芳草却解回頭覷緑楊其餘好花有何限范掾看花眼頭爛見花如見故人來尋花太緊攀花慢洛陽城內騎馬走山陽城外坐監酒坐地愛花情更深時時取酒為花斟誰知有此風流掾詩情酒興紛如霰好來間伴老翁吟老翁是物吟將遍海間亦有蟠桃花可能同發乘桴願贈倪敦復北軒主人吳中清所居才義皆有名曽在東臯壓衆賔人皆閣筆詩已成其時於我最有情如今相見情更深野人情義亦不輕夜來枕上為公吟贈張敏叔張家船上雪壓篷船頭船尾堆玉虹此時半夜明月中有人兩腳登雲空其人便是吟哦客能作清詩無俗格更向孤舟雪裡吟一生多難頭先白白毛吟處徹骨清喉嚨往往生寒氷可能乘興到南郭戴家為子燒破琴送汝弼赴潭倅二首莫説江南行路長山蒼蒼兮水茫茫莫問長沙城逺近洞庭湖口是瀟湘去時先上嶽陽城夜宿巴陵探隂晴泛洞庭時四五更出湖口處曈曨明平生聞説潭與衡今來吏隱駐箳篂四時所見皆所經湖青草兮廟黃陵眼看君山别洞庭笑談却作江南行巴陵渡口轉船頭一帆風過嶽陽樓行盡江山到真州畫船旗鼓入揚州不作長沙行湖湘少斯客潔身不可汙好義是所積口不出巧言面不為邪色誰可謀定交斯人不可失富貴篇答李令我有一筒詩寫出千年意將令後世觀不是前言戲感君再唱洞庭謡我亦重歌酬子惠古人逹者嘗有云富不如貧賤勝貴君不見古之富貴即父祖俱封異姓王一門五侯三將軍弟兄同入中書堂對開大第連幾坊私門列戟森鋒鋩十二簾捲珠熒煌雙姬扶起坐牙牀緑鬟紅袖花成行左盼右顧生春陽髙車食客劒佩鏘堂上已滿坐兩廊巨鑊大鼎烹牛羊玉壺挹酒金船長美人拜客求盡觴歌姬一誤已絶骯纒頭彩幣堆如岡酬歌買笑金鴛鴦奴袍火浣直兩箱三千廏馬紅錦障厠幃文繡爐薰香更衣侍妾如閨房主人意氣秋鷹揚其心端如彩鳯凰一言合意青雲翔須臾睚眥磨刀鎗門前臘月可烘裳一日失勢成氷隍小者腰領尸道旁大者連頸宗族亡犬雞散盡空遺墻野鳥入室山魈藏嗚呼哀哉可歎傷至死不悟猶陸梁古來如此有多少豈似洞庭湖上老無租無稅一生間有飯有魚一杯飽日落波間煙正昏雲開湖口山光曉棹翁適自巴陵回挂帆直指瀟湘道有言不問俗窮通何憂可入翁懷抱修竿短棹巳自足更有前村一茅屋賣魚沽酒任醉醒繡户朱門自歌哭嗟余未往心先慕更謝棹翁詢去住風前月下有誰知醉魄吟魂自來去堂前畫作荆南圖夢中記得巴陵路節孝集卷四
