body:
  text: 節孝集巻三十一宋徐積撰語録門人江端禮李恭録蘇東坡志林云徐積字仲車古之獨行也於陵仲子不能過然其詩文則怪而放如玉川子此一反也耳聵甚畫地為字乃始通語終日面壁坐不與人接而四方事無不周知其詳雖新且密無不先知此二反也公曰凡人為文必出諸巳而簡易乃為佳耳為文正如為人若有辛苦態度便不自然公曰為文必學春秋然後言語有法近世學者多以春秋為深隠不可學盖不知者也且聖人之言曷嘗務竒險求後世之不曉趙啖曰春秋明白如日月簡易如天地此最為至論公曰黄元明行巳簡易論文取一切平恕公曰為文必須讀春秋而士子急於為利以求耳目之用雖數教而不從近世文之簡古者無如曾子固新竒出於胸臆者無如蘇子瞻學者能熟讀二家之文各取其所長則盡善矣公曰事各有所主不得相侵某借書必自經諭有急故畱門必白直學不敢自專也昔霍光不罪符璽郎而賞之光可謂識其分守亦真用人法也公曰某少讀貨殖傳見所謂人棄我取人取我與遂悟為學法蓋學能知人所不能知為文能用人所不能用斯為善矣人所共知事可畧也端禮謂公曰友人陳師道南豐曾子固門生也才高學古介然不羣於俗今有書令端禮致左右公讀已曰一言誠足以知人陳君書辭不俗必賢者也江君稱其不羣於俗某雖未見其人敢以為信然某未嘗以詩書入京故不能為謝子幸致意謝之陳無已謂予曰徐公善論人物試令評黄魯直張文潛之為人予問之公曰魯直詩極竒古可畏進而未已也張文潛有雄才而筆力甚徤尤長於騷詞但恨不均耳然人物亦難論孟子嘗以去就行止論孔子伊尹伯夷柳下惠蓋此數人皆一世之所繫故行止可以定其人然去就有大小輕重其小者止可以見常材而不足以見異人其大者無出於死生善觀人者必於死生之際且孔子厄於桓魋而曰天生德於予孟子有為兵而受餽然不聞孟子少莽也若揚雄則云云雖多及動時遂有投閣之失此聖賢所以分也然人必有所養然後臨事而不惑北宫黝匹夫之勇耳亦以養而成則浩然之氣亦在養之而已且謝安王坦之在晉時無以輕重其人及桓温之召謝安毅然不懾而坦之懼倒執手板此王謝之優劣所以定且如王儉之文學政事可視庾杲之為奴𨽻然儉世受晉宋高爵乃啟齊簒逆之萌及齊高祖即位儉躬執璽綬屏氣而進惟杲之不往賀使者促之亦不移疾王儉所為如犬豕而杲之之行章章不可掩此人物所以難論惟以死生方可定也如亷范之竒才在古亦少其比而終附竇憲此為可訾然完節之士不可多得也公嘗慕諸葛武侯之為人也端禮問其何以取之公曰深探武侯之所存不可見其涯涘且如薦馬超於先主雲長恐其出已右移書問之武侯曰可與翼德並驅馳衡然非髯將軍比也闗聞而喜既不掩馬之美復有以結闗之心其深沉大畧誰及之又頓兵武功而數敗衂乃下教曰今非將不善兵不衆而敗蓋亮未聞過耳諸君攻亮之過則兵勝矣且當時賢者與後世之士忌人刺其失而武侯乃願聞其過豈不誠大丈夫哉然人有過雖親必誅有功雖讎必賞廖立輩乃其所黜聞武侯死至於感泣或嘔血者蓋其用法平而得人心士亦樂為之用此七代以來輔佐之臣有其才者甚多惟少德耳武侯誠竒人謝安可比之然士欲行其志要須如此公曰人各有所長慎勿輕廢人也公聞蔣穎叔得廣帥曰廣為雄藩府座出先導以門旗夾以銀撾屠劊人次之它鎮所無也初至蠻酋必以琉璃瓶注薔薇水揮洒於太守不及其它公送穎叔詩具道其事曰穎叔老聞之應喜公曰退之詩書記志各有體亦至今新竒也若為顔子不貳過論專欲入於規繩故稍陳俗公曰文字要多作多作方思熟某無日不為文無時不吟哦但苦無筆力故不暇書耳問武侯之屯五丈原其志欲戰耳武侯固知魏之不肯戰不幸而武侯死使其不死後當何為豈可相守而巳乎當是之時循渭而東以攻長安則三輔震動魏必奔命可戰矣武侯不知出此此兵法所謂分不分為糜軍也公曰此論甚大且以坐江淮而料京師之事有所不可必况在千百年之後而論千百年前之事而其人用心未易言也然深攷武侯之用心誠欲以大義服天下耳其用兵之迹乃餘事傳曰威武者文德之輔助此武侯所以不得巳而用兵也然自兩漢而下無必勝之將如武侯真能必勝者也以蜀之地狹土瘠兵力孱弱武侯將之人人有勇卒能强蜀而抗中原殆節制仁義之師也以武侯觀韓信輩用兵則皆庸將以僥倖取勝者亦如兒戱耳然舉兵一出而三郡響應馬謖違令而遂敗豈非有必勝之䇿當時善用兵者無如孫權權謂司馬仲達為變化若神則仲達可謂能兵矣然與武侯相拒閉軍固壘而不敢動武侯死曰吾不料死及觀其營陣歎曰天下竒材則仲達與武侯優劣可見矣方是時蜀之將關張已先死而姜維馬超又後出方戮力以戰時所用惟魏延馬謖數子又皆庸將則蜀之所恃一武侯而巳以一武侯自用雖魏之强不能取勝則武侯之才未易量也然腹背受敵兵家所忌而武侯又不欲乘人之隙而幸勝故不循渭而東恐非不知出此䇿也問管仲蕭何武侯王導謝安王猛房杜李德裕王朴得失優劣如何公曰孔孟論管仲詳矣誠有功於國者蕭何房杜則忠於社稷然何輕信流言買田以自汙非獨立不懼之君子此最謬者也王導謝安皆晉室之碩輔然王導挾私忿而殺周伯仁謝安有期服而不廢樂此皆所短李德裕有將相之畧王猛王朴真一時之竒才然猛不知以義自處而屢受困辱朴亦有傅會妖祥之譏此數君子得失相半無全能也若武侯則稽德論才無可訾毁其最優乎昔崔浩嘗非武侯矣然浩非知武侯者浩不足道也又曰王導固賢者然欲用趙𦙍而為孔愉所沮保芘注術而為孔羣所牾昵於桓景而陶囘面折亦少闕矣問謝安之立諸桓是耶非耶公曰荆江二州皆據上游用武之地固不宜與諸桓然傳稱其得諸桓之心亦合時務矣以桓石民為荆州改桓伊於中流石䖍為豫州既以三桓據三州彼此無怨各得其任其經逺無競類皆如此又曰謝安非不知人如桓伊之賢晉室亦不多得諸桓分據一方無不當處若以桓温之迹言之似於山東有可疑者然坐論數十百年事當時其勢與心亦有不可盡談者荆江之寄如謝𤣥非不可徃但逺嫌保身恐謝公意有所寄公曰揚雄著法言本欲刺王莽其曰學行之上也言之次也之類是也然王莽之惡愚夫愚婦皆知之不待子雲刺譏而惡自彰如佛不待韓愈排之而後人知佛為非若夫楊墨則迫近吾道而能為吾儒害則孟子曷可以不闢公曰孔子言其畧孟子言其詳故曰孟子者孔子之解也公曰嘗見一俗書云作文用事必用新意如論友若使管鮑則不新矣昔卓王孫云人弃我取人取我與故能致富與俗書正合此說學者宜取法焉公曰君子言欲孫而行欲嚴蓋不孫則召禍不嚴則受侮孔子曰吾執御乎又曰幸苟有過人必知之此雖孫何傷也若言媚竈則曰獲罪於天無所禱也蓋恐傷乎行不得不厲爾後世君子言之不孫者多矣於行則未嘗嚴也問蕭望之如何人公曰蕭望之近世賢者也以聖人槩之不免為過剛者盖聖人之於夬必待一陰至弱然後揚于王庭則小人决可去矣如孝元時小人方盛而蕭生排之既無所濟亦以自斃也至於不肯挾持則已受侮矣豈若見幾而不徃耶然大節已卓然矣公自謂尋常作詩作書美其人皆以已所知所見而美之又於數事取其尤長者美之而未嘗溢譽亦未嘗以傳聞為虚美也近世士人好譽人至言其人無所不能有類乎聖者豈不欺後世哉公言文字須渾成而不斷續滔滔如江河斯為極妙若退之近之矣然未及孟子之一二公言人之為文使古事如避犯衆葢有無意可以取禍者如嵇康以一言而見殺可不戒哉公言人之為文須無窮愁態乃善如杜甫則多窮愁賈島則尤甚李白又近於放言此皆貧賤之所忌故退之欲人輟一飰之費以活巳又感二鳥而作賦甚不可也若孟子人不知亦囂囂直能受賤貧而不枉道矣公言恭謹敬三字其義相近而詩曰敬天之怒則敬為不輕矣然武帝云敬舉君之觴又陳國時兩國交聘謂敬為自上待下如此則人與在上位者書不當云敬矣公言人當先養其氣氣完則精神全其為文則剛而敏治事則有果斷所謂先立其大者也故凡人之文必如其氣班固之文可謂新美然體格和順無太史公之嚴近世孫明復及徂徠公之文雖不若歐陽之豐富新美然自嚴毅可畏公言人之同官不可不和和則事無乖逆而下不能為姦必欲和莫若分過而不掠美問公治春秋之法公曰春秋之學其大要先求經旨三傳非所急也後世必以趙啖為善學者大功正在此爾至於論春秋所作殊不求孟子之意而反以為救弊為言甚疎濶也若乃立例求經恐遂拘泥不可攷合例有變者當須存之矣又曰治春秋必須存闕文如夏五之類是也如不書即位則諸家之說紛然矣然某亦以為闕文而不論蓋傳寫既久不能無脫誤若便立議論恐非聖人之本意若易言研諸侯之慮則明多侯字矣何必曲說公曰西狩獲麟諸家但止論麟不知論狩以譏非諸侯之事爾公曰治春秋當以孟子為折衷蓋知春秋者獨孟子爾如言無義戰者止譏其戰無義者也經言侵伐征者蓋侵者小其敵也直侵之耳伐則大矣不惟兵車多亦所以聲其罪也故經言侵蔡伐楚是以知侵小伐大也至於征則又大矣如周公東征征有苗之類是也公曰說者謂春秋無褒非也然方其時書褒者少爾如齊之遏强暴而强中國孔子言一匡天下而葵丘之㑹孟子亦取之豈非褒乎如存衞國而有木𤓰之詩豈得不為褒邪問乙亥嘗說者曰先言御廩灾是以火灾之餘而嘗不恭甚矣公曰曾子問言天子諸侯之祀遇日食火灾喪服則皆廢祀今御廩灾則嘗可廢矣而不廢是為不敬何必曰以火灾之餘而嘗問秋師還說者譏其逾時而左氏云善之也公曰一百四十二年用兵多矣獨此言師還恐非譏也且以清人之詩驗之則以喪師為棄民而深譏其君則師全而還可以為褒矣問盜竊寳玉大弓而不書人紀侯大去其國而不書其滅公曰稱盜賤之也如漢言盜高廟玉環唐言盜殺武元衡皆其意也故不必書其人也然此譏有司慢藏也譏有司慢藏則時政可知也紀侯事有二說一云譏其不死社稷其滅之者齊也言紀侯之大去其國則齊之惡亦可知矣一云大者紀侯名也譏其不能死社稷故名以貶之有以紀侯比去邠之事者失之矣正如以王莽比堯舜之禪讓也公言王令之文少所許可如以房杜為刀筆吏非也且如庭議事房喬謀之矣必曰非如晦莫籌之及如晦至卒用房䇿以此觀之則其不掩善而交用其所長固足以為賢相所以能成天下之務夫為相者能不蔽人之謀以一身而行天下人之善豈不大哉而後世之人恥謀不自我出而謂人獻言為犯分是以人受其蔽而巳不知事亦多不濟也昔魏相集賈董所言而行之則其知識甚髙矣然為政者必有術然後能立事故王導衣練布謝安用蒲葵扇不言而人從之蓋以術也後世宰相之行事乃欲以勢力而刼制天下又怨人之不從已豈不愚哉公曰欲求聖人之道必於其變所謂變者何也蓋盡中道者聖人也而中道不足以盡聖人欲求聖人之道者必觀於變蓋變則縱横反覆不主故常而皆合道非賢人之所能故孔子曰未可與權孟子惡其執一也然善論聖人者必觀其世且如孔子處周之季天下如何哉所以車轍馬跡徧于天下而不自以為勞豈好為哉冀一得用以行其道而濟斯人爾至於見佛肹南子而不自以為汙也然聖人之變疑卓爾不可及有志者跂而學之亦何難哉此孟子所以學而至之荀楊則不及也且在書則如堯如舜如湯如武如平康如彊弗友如爕友其世不同也在易則如泰如否如豐如剥如小過如大過其世亦不同也若以湯武之時而行堯舜之事如以治豐治泰之道而行於剥於否豈不傾覆無功乎此堯所以禪而舜所以受湯所以革夏而武所以造周伊周所以攝也蓋皆用大過之道而適於變者也學者不知此乃妄生議論非也詩曰棠棣之華偏其反而偏當音徧以言開徧而復合也豈不爾思室是逺而言權之逺而不可及故孔子曰未之思也蓋譏其言不合道也此乃逸詩著此以見孔子刪詩之法務去其不合道者也善乎鼂錯云能明其世者謂之天子此言出六韜後世學者其言其學俱有可取至其臨事制宜則或悖亂或拘泥者以其不通乎世變也苟不通乎世變則利不可興害不可除事雖至於隳敗而不能救者以此耳公曰揚子投閣後人乃為揚子諱云無此事則是漢史所書皆不足信也况此事甚明然揚子實未至於聖人而不適乎變雖有此亦何妨為大賢乎且如孟子曰堯以天下與舜則是禪也明矣韓退之對禹問乃反此說而後世學者又為退之諱云此非退之文何其迂論以自欺也就如為退之之文亦不害為退之矣此皆好竒而不適於簡易之過也公曰治河誠大事然利害有可以坐而言決者嘗因大禹治水之法而親觀其勢且自陜以西登髙東望左丘陵右岡阜河乃行於其中所以自古以來河未嘗決於陜同之間也行而至於河北京東之界則地形益下而悉平原山足復軟不足以為之固所以釀為二渠又為九河以殺其怒勢而決洩之河所以趨於海而三代之時無水害也而今之言河者必歸之於天胡不折之曰周之時王與列國之君未嘗無失道者而不聞河為患者何也蓋有禹之遺迹也若必欲以人力治亦恐無功蓋今之河身既狹又地軟無丘陵岡阜為之固又無二渠復無九河以分洩其怒勢獨行乎一道以孟子言之乃掘地而注之海今則以人所築堤為之扞乃水行乎地上則安得不決也其不決者幸而巳然不可保萬全不決於今年必決於明年或二三年斷然矣莫若畧依古法分為數道隨其所趨而利導之寛為河身縱其游波而不壅塞則河之患庶乎少矣屈平自沉于江雖曰褊心亦可謂不幸然聖人亦有不幸而有以處不幸亦有不得已而有以處不得已必不至於自戕故如屈平孔孟不為也作詩切不可斥言事至於美人亦不可斥言試觀詩之風雅頌所美所刺未嘗不婉順而歸之於正問象以典刑孔安國曰象法也法用常刑也漢儒則曰唐虞畫象又曰畫衣冠為戮何也公曰有曰象魏有曰兩觀觀言其高大可觀法也象則自然高大魏則有巍巍之意皆有可觀可法也則象所以言其法猶天之垂象唐虞之刑雖不經見如蕭何之律輕重大小各有定式然恐古自有定式也觀其放四㓙而人以為宜則是刑有常式故民聽不惑所謂象以典刑者蓋法用其常刑而無過差也問諸言明堂者曰布政之宫又曰在國之陽七里蔡邕以為天子之太廟也其說不同公曰明堂者布政之宫則是矣葢取其向明而治之意故孟子曰王者之堂也其曰在國之陽七里則固謬矣然歴代諸儒之論紛紛無定漢武則牽於方士之言以茅葢通水惟隋宇文愷之論為當然必欲興作則請用魏鄭公所謂自我作古可也斷而行之在我而巳衆說不能改也問鼂錯張敞請入粟以贖罪無乃刑失有罪乎公曰書有金作贖刑則所犯有詿誤可恕者使贖之則刑不失有罪矣錯等葢取此意而作此說況權時定宜以濟其急與其重歛于民不若為此猶成無費之利也且今之富人有入貲而為祠郎室長者矣意亦求庇其身而朝廷實無奬進之道故仕則竭力奉公不敢為過失有加于儒生世胄而仕者也然上之人避嫌而不敢舉朝廷亦無升進之法所以多有才力可稱者而卒阨以死也且張釋之以入貲為郎則是人材不可決定於所取也況漢帝之詔曰使久立於庭下宜旌異之問漢武帝築朔方而公孫𢎞諫曰不可及朱買臣發十說難之而𢎞不得一亦終築之何也公曰漢武好興作而𢎞諫之者欲以靜正之也然買臣嚴助輩方欲自鬻其說又挾武帝之威以壓之則𢎞何敢不從所以曰鄙人不知也然武帝疲弊中國而失民心幾喪天下其本葢買臣導之也吁為天下者可不審其所用乎治詩者必論其大體其章句細碎不足道也且詩何必分二南為國風而雅有大小又為頌也葢天下之本在國國之本在家家之本在身故二南言文王之化正於閨房祍席之間以至乎人化之葢風為治家之始而小雅者治國政之始大雅者治天下之始頌者成功之始是謂四始也其餘刺惡之詩乃刪詩時分附于諸篇其惡之大小自可各見别無意也故惟箴刺之詩不專立名也且十五國風者乃謂車同軌書同文孟子所謂地醜德齊者也故無所分别先後且季札謂小雅周之衰而王通乃謂周之盛其㫖異矣葢當時樂歌適聞所刺之詩所以謂衰而王通原鹿鳴以下之大旨所以謂周之盛各以所見云爾非不同也人必有威然後不為人之所慢侮而事可立亦可以應猝然之變且如子路片言折獄以其有威所以能得人之情而下不能欺且易於豐於噬嗑有雷電之威明故皆能折獄若賁則小明不足以立事所以曰無敢折獄葢無雷之威也問劉歆鄭康成謂周禮者周公致太平之迹而何休林孝存毁之何也公曰惟春秋詩易書語孟為聖人完書而無後人増益者其餘經籍皆有可疑如王制乃漢時博士為之月令亦吕不韋所纂而中庸則子思語也其餘雜漢儒者甚衆孟子曰諸侯惡其害巳也而皆去其籍則制度滅亡矣此周禮所以為疑也然又不可全以為非要須攷其所言合于聖人而不悖者取之其不合者勿强為之說斯可矣問季札見舞象箾曰美哉猶有憾也服䖍曰憾恨也恨不及巳誅紂也書言四岳舉舜孔安國曰四岳知舜之聖不得巳而舉之夫二子之言固為妄然何為而言之公曰憾可曰慚也言文王不能正紂已有慚德可也何必曰恨也四岳之所舉用悉以丹朱共工為言堯屢卻之然後舉舜豈非安國便據此而生文乎問司馬遷作史記以孔子列于世家而豫讓名為刺客可乎齊魯大國也而首書太伯叙傳則尊道術而薄六經何也公曰士要須所養者醇所學者醇所師者醇所友者醇然後所言所行皆醇也如馬遷所養所學皆不能醇其所師所友亦或如之故其言多駁雜無足怪也以春秋攷之嘗譏世卿則世禄可矣葢惟諸侯方得世而卿大夫皆不可以孔子乃曰世家可乎豫讓天下義士也其節凛凛可畏以齊晉周陳之臣觀之其祖其父其身皆食其國之禄而享其位至其易主遷代則又泰然就它主之䘵而無慚色甚者贊成其簒奪之禍如王儉輩是也以此觀豫讓所以報德者豈非為義士乎列于刺客非也泰伯三以天下讓則齊魯開國固在其後然亦馬遷之意重其讓而取于道也其尊道術而薄六經乃其所學所見之不醇也問三代稱用肉刑而治後世用行之則病于傷民今可行乎公曰肉刑之法前人論之詳矣徒為紛紛嘗觀唐太宗曰不行井田肉刑不可致治大非也葢前世之法有不可以下行於今世今世之法有不可上通乎古者正欲觀時變爾且孝文以仁心廢肉刑是也縱云有輕刑之名而其實殺之亦非本意也不幸而巳故人疑孝文以嚴致平然法無病民者要須得良吏乃可行必欲行肉刑須得臯陶者乃可行臯陶不可得得有臯陶之用心者亦可矣此人不可得則肉刑未可輕行也左氏云十六相堯不能用四㓙堯不能去宜云不用不去不當云不能也葢堯若用之去之則無以成舜功此孔子所言惟天為大惟堯則之也君子無所爭於文則不可不求勝人凡作文必須自立令前不見古人後不容來者乃善不善其立意自戕禮文殘闕甚可閔傷儀禮粗為完書然決非盡出乎聖人何以知之且禮者出乎人情也而儀禮有曰父在母不可以為三年之服又曰嫂叔無服所以辟嫌也又曰師無服此豈人情哉可以決知非聖人所為也葢多出於漢儒喜行其私意或欲用其師說或利其購金而妄言耳甚可閔也問今兵冗矣欲復民兵如何軍儲乏矣欲復屯田如何公曰今兵勢患乎一定而不得動如一路中復置如漢之奔命者數百人使徃來赴急不可如駐泊者則盜賊不敢作矣屯田誠難復葢古者兵取於農而其勢順故耕者皆兵也後世兵民既判名已不同况今之兵驕惰不可使豈可令耕乎必不肯矣且兵患不精不患少昔李勣以三千而平定襄古人有以少擊衆者是兵雖冗無益也問衞青不斬裨將王猛棄軍迎苻堅與穰苴亞夫異矣公曰將在軍君命有所不受是也若衞青不斬裨將可為保功名者非將法也王猛弃軍迎付堅堅責之是矣問人固難知然孔子謂由不得其死孟子謂盆成括必見殺後果如其言何也若蕭何謂韓信國士無雙武侯謂蔣琬非百里之才後亦果成功何也公曰子路盆成括有取死之道孔孟觀其所行而知之縱使幸而免孔孟之言猶信也蕭何知韓信之為可用而不能知其終武侯之明固能知蔣琬為可用然人亦難知武侯不免失於馬謖也問國之本在兵兵之本在將則將才難矣必欲選將當以何術使將能靜則折姦謀而不作動則破大敵而制其命其用何術古人誰能之公曰將誠難事不可易言之古之名將各有所長所謂靜能折姦謀者所謂上兵伐謀伐謀者能破敵之謀不得用是也不必見於用兵然亦無迹如李牧在雁門二十年而匈奴不敢加兵王覇在上谷亦二十年而敵人不敢窺邊近之矣然以數子之才猶須久任然後有功則將不可遽移易也所謂動則制其命者必勝之將也自古必勝之將惟武侯一人以其兵有節制而不妄動其餘皆幸勝爾以李光弼猶戰則納短刀于鞾知其不能必勝也夫以馬隆之才武立標募卒得驍勇者三千五百人又請自至武庫選仗有此三者所以能多克勝昔高崇文伐蜀卯時受詔辰時出師兵仗器物皆不假借而畢集以其有素備也所以解劍門之圍平劉闢之亂吳時有將缺三字無事時常作出兵計故敵人畏之而不敢妄動此正用兵者當法此也然用兵必有驍將必有敢死士故古人去敵百步猶選敢死士葢敢死士則能壯兵威而驍將則能奪敵之氣傳曰智信仁勇嚴將之事也則為將必須嚴嚴則有威有威則號令明而人畏之然威必素立乃可猝然辦事李晟之卒有折人之匕箸者斬之而李光弼欲斬貴臣雖天子欲增秩使免死而光弼亦斬之所以威立而人畏之也然郭子儀仁厚得士心而卒伍少懈及李光弼領其兵皆股栗此可見有威者人乃畏也易言忠信所以進德又曰果行育德則信與果皆入德之本士君子所不可須臾忘也而論語曰言必信行必果硜硜然小人哉而自漢以來說者皆以為小人之事無乃害德乎蓋孔子以子貢之所問者愈卑而又問其次故曰言必信行必果恐再問其次故特舉其最下者曰硜硜然小人哉硜硜空虚之謂也則是言必信行必果與硜硜然小人哉皆義不相續各是一叚也或曰孟子言言不必信行不必果者為大人故此以言必信行必果為小人也殊不思大人者成德之稱其言不必信行不必果則如從心之謂惟大人能之而論語所言者士也曷可比大人哉浩然之氣與北宫黝之勇孟施舍之勇皆以所養而致之然孟施舍養成匹夫之勇故不動心而無懼所以視不勝猶勝也孟子曰若量敵而後進慮勝而後會則必經於思慮而動其心矣故其文勢宜自猶勝以上言孟施舍其量敵以下孟子言施舍不能如此非一叚事也書者天子之事也終于文侯之命也費秦二誓何以與焉蓋書之文乃舊史之文其篇章之次第乃孔子刪而定之故斷自唐虞所以明治世教化之本然堯典亦謂之虞書者以堯所以治天下之道非舜以成之則其仁民愛物經綸世變之道不得而顯也然堯舜之時道隆也故大禹臯陶之謨皆謂之虞書夏書以往有戒之深㫖焉故夏書之末繼之以商書以商警夏也商書之末繼以周者以周警商也周之末繼以文侯之命所以警周也其意以為周德既衰而晉强盛矣宜知所以杜絶簒亂也又繼以費所以見魯公之僭又繼以秦以見秦之强大皆以警于周而周不悟所以卒為秦所滅故曰費秦二誓所以戒周亦所以警後世也春秋魯史也是諸侯之事也而書曰西狩獲麟何也葢孔子所以刪春秋者用意深微故用一字有重輕其言獲麟諸家止說麟而不論狩非孔子意也葢狩乃天子之事而諸侯云西狩所以譏僭也詩之有頌所以明盛德而告成功雖有文王之業武王之功微成王周公則不作矣是太平之事也而繼之魯頌又附之商頌何也蓋自二南言治家之始小雅言治國之始大雅言治天下之始頌言成功之始所以見周家終始之道一隆也其終有魯頌商頌者何也葢魯實僭天子今觀魯頌之事豈是為盛德而豈可吿于神明故言季孫行父請命于周而作是頌則以周室既微明魯之强而僭也其商頌散亡特附之而巳故曰得商頌十二篇以此知孔子不欲絶一代之事因其所得而附之非有所褒貶也易之書未嘗不戒故以未濟終焉而說者以為既濟豈聖人之意乎葢關朗子明以六變之說解易故其言曰易以既濟終焉然子明所論六變上不見乾坤下不見未濟又疑其法止論終于既濟非謂不可終于未濟也二禮所載終始不同何也夫禮學不明良可惜也惟儀禮稍為完書然皆說士禮故知論禮者以士禮升而上之至于天子也然儀禮始于冠昏其法是也終于有司葢以為追逺乃人之大事所以喪葬而繼之以祭之禮也至於戴禮之所記駁雜訛舛不可勝道葢多出於漢儒之私見其首不以冠昏而以曲禮其終乃以喪服四制而制度又多舛雜而不近於人情極可怪也然詩首於闗雎書首于釐降春秋首于聘娶易下經首於咸恒故於禮宜首於冠昏乃惟相近而禮記無叙恐未可為確論也艮言思不出其位正以戒在位者也言豈特見于事者各有所止而不可出雖心思之運亦不可出矣若夫學者則無所不思無所不言以其無責可以行其志也若云思不出其位是自棄于淺陋之學也揚子稱孟子之不動心曰貧賤富貴不能動其心大非也夫古之山林長徃之士豈不能以貧賤富貴不動其心而世之匹夫之勇者豈非所以死生不動其心也如此則孟子之不動心乃常人爾蓋本謂孟子充養之至萬物皆備于我而萬變悉昭于胸中故雖以齊國卿相之重位亦不動心思之經營而可治故言曰不動心以其養之至也猶之北宫黝之輩雖不足道亦以其養之至也孔子言山梁雌雉謂梁高也如屋之有梁橋之有梁以其山之髙者而雌處其上可謂得所亦猶小人居乎髙位也子路多言者忽于此能黙而識之共以致敬三嘆其事焉嗅當作嘆葢字之誤也揚子亦不詳孔子之旨而其論雌雉極不稽後之學者信以為然良可怪也問歆向言仲舒是非孰當公曰伊吕聖人之佐不得則不興管晏特一時之豪傑爾以仲舒所學醇正而其三䇿該通當世之務非俗儒也其答江都易王曰伐國不問仁人此論又幾於孟子矣殆賢者也謂如伊吕則過之其曰未及游夏似少貶矣然但稱其所長自足為一時之賢何必逺擬古人也問丙魏姚宋孰優公曰丙得宰相之體魏有宰相之量姚有經綸之才宋有操持之節皆賢相也然宣帝雄傑明達力能自致中興雖無丙魏亦可矣若明皇則中才之君可與為善可與為惡者也故姚宋在而成開元之治姚宋亡而致天寳之亂也然宋則剛者也剛故無私無邪能斷能明矣姚喜任數茲少貶焉賢人不可多得葢天地亦自愛惜况于朋友况于同類况于用人者可不惜之乎且天地若不愛惜人材何以孔子後無孔子孟子後無孟子也陳力就列不能者止而近世拜官徒為飾詞已足恥矣而朝廷又為之法曰至某官乃得辭免是教人為偽也其兩府有除命未受命必先押入其名自不正葢賢者當以禮進以義退既可押入必可押出也近世講辨之學廢夫講辨所以發明義趣而起已之志慮如陳平之智固宜料天下事無疑方吕氏未誅而平之沉思未決聞陸賈之言然後志思煥然得與周勃交驩則士之智慮未及陳平者曷可廢講辨乎問肆大𤯝何也公曰𤯝灾之名也五行傳曰青𤯝赤𤯝是也據書言𤯝灾肆赦則是不可常行也故蜀先主言吾游于鄭康成陳元方之間未嘗言赦而武侯治蜀十年不赦所以刑平而下無幸免之民此言肆者赦之别名又曰肆大𤯝言非其事也然赦過宥罪天子之事而諸侯行之可知非禮矣其三年因郊而有赦有賞惟王彪之傳論之别不見所起問吕后欲王諸吕陳平以為可而王陵以為不可孰是公曰陳平有包天下之量自秦漢以來一人而已問人之治身何者為先人之所戒何者為急公言易曰閑邪存其誠孔子曰思無邪則是人之治身以誠為本而所戒者以邪為急葢正心誠意而行乎正則動容舉措無非正也正之氣充于四體發于面目可以望而知其為正人也苟不正心誠意而存乎邪則形容動作亦皆不正充于四體發于面目可以望而知其為邪人也至於國之興亡亦以正與不正况于人乎然孟子云志氣之帥氣體之充此言精微學者宜思之葢以為志則在心而心為有知有知則所好亦有節而所惡不過分縱過而踰節亦知自反也若氣則冥然無知特可以充養四體縱之而不巳則喜怒為氣之所使必至於過分踰節矣此小人之事也若君子則學而能正能誠所以志能帥氣而喜怒不過惟小人為氣所鼓方其喜怒之際不知形色之變至於不聞人之聲音不覺巳之忤物或報仇復怨辱人以自快或至於受辱而不慚或至於殺人或至於殺身者皆為氣之所使而不能帥氣也故孟子曰持其志無暴其氣學者可不知此乎然自孔子以來非孟子誠不知此問公嘗言賈誼篤好管子幾為管子所誤何以見之公曰管仲誠竒才所言所行皆適于時宜其言㓜官則非也賈誼亦一時之豪士其法于管子者非一且如言色用黄數用五殆為㓜官所誤也讀誼之文則漢儒之文皆不足觀及讀仲舒之三䇿然後見誼學未至非醇儒也仲舒之言幾如孟子矣然孔子之為政於衞止欲正名而巳子路不能如顔子黙而識之至於發問其所答亦不過數事而管仲所以說其君者累數萬言而王通一見隋文帝陳十七䇿弟子編為三巻文帝不用退而作皇極之歌此自取亡宗赤族有餘擬法論語何足道哉傳言信而後諫豈有一旦遽為人陳十七䇿何其多也有異於孔子矣人之德有諸中必形諸外而盛德者猶且容貌若愚况無諸中者乎語曰有若無實若虚則學者不可不知此也讓不可以苟為之若伊尹三聘而後起此以禮而讓也孟子於齊餽而不受此以名而讓也後世讓官不合於禮義又非避名而朝廷又立為格使至某官而讓皆非也黄憲聞召即起受官即拜此皆有以過人也安定先生居湖其倅不甚加禮一日公欲往見之問先生宜何以答之先生曰若思而後往便是不誠直已而往可也公聞此語遂大開悟安定說中庸始於情性葢情有正與不正若欲亦有正與不正德有㓙有吉道有君子有小人也若天地之情可見聖人之情見乎辭豈得為情之不正乎若我欲仁斯仁至矣豈為不正之欲乎若棖也欲凡言寡欲皆不正也故以凡言情為不正者非也言聖人無情者又非也聖人豈若土木哉强哉矯葢矯者强之甚大木之曲者性也能矯而為正豈不强乎道自道也者且以道路之道言之凡窮天下周八極霜露所墜人跡所及皆可至焉則道豈不六通四闢乎然有徑有支皆道也故必在人之所擇而行之中庸所以獨取舜顔淵者所以為中庸之法也蓋自誠明者聖人也舜顔淵積勤不巳而至非至誠不能也舜自匹夫積仁累義至於聖人使其父母為聖人之父母使其父母為天子之父母至於以天下養其父母其積德可知孔子曰吾見其進則顔子之至誠亦可知矣此叚恐非先生本語人之大事不可以不謹者祭祀是也葢鬼神不可知爾然奉鬼神者安可不以至誠奉之乎上丁釋奠皆薦熟是也葢事天神則當用生若孔子則宜以人鬼之禮事之而薦熟州郡牽於微末之胙而不肯變又朝廷以令文拘之不知議禮者何不知其非也安定先生不令諸生學字曰字若稍可觀便為人役觀魏韋誕題凌雲殿額豈不謂之人役乎王獻之之對謝安可謂大丈夫矣公常教其子曰若在貴人之前堆黄金積白璧呼之使來不可往也况以藝易之乎故孟子自欲見齊王可也及使人要之則稱病不往其不可屈須如此臺諌之任甚重不可以苟然居之非德業蚤著名譽素聞則君未見知而言不盡聽近於未信而諫矣說者以為陽城居諫職與屠沽出没果然則豈能使其君聽其言哉若楊綰用而人至損音樂減騶御則人豈可不素有養素自重耶孔子云三年之喪自天子達而漢文行以日易月之制甚非也後世因循無人議之亦可惜也然漢以三十六日而後世以二十七日而釋尤非也宜稱時制為衣服以軟巾墨縗以臨便坐見羣臣亦可也凡評論人材必以不得巳處之則近於孔孟所謂恕若其人得巳而不巳者乃可罪也如仲尼見陽虎微服而過宋皆不得巳矣孟子言五人者無獻子之家則不與之友亦不得巳者且以居喪不可以出也墨縗惟軍旅宜用之然其人無田園衣食之奉豈特守禮拘拘與其親戚坐以飢凍則其出不得已也公論趙盾之事曰孔子言之矣後人雖累千萬言豈足垂信若信後人而不信孔子其人可知矣然殺髙貴鄉公者成濟也其使之者司馬氏也晉山陽公死書曰宋志也此推本而誅之耳王導曰我雖不殺伯仁伯仁由我以死則其事亦可見矣然王導禇遂良皆賢者導以疑殺伯仁而遂良譖死劉洎皆可惜也問依世違俗如何論公曰不必言依與違但論正與不正而顧其義如何耳論經義要寛裕而不迫正如折獄須先定其大情然後求其微情則無不得矣然大情未正而先求微情則紛亂不決矣天下之事有可以懸論而利害可定者有必待行之而後利害可見者故自古以來創法之初非不深思熟講及其施之而有不可行者葢有利害不可以懸料者也鄭雲叟羅隱之真隱者也种放文章極嚴其詩文未嘗不在雲山是可髙也然真宗禄之以尚書與之握手登龍圖閣其待之可謂厚矣亦可畱而行其所言然終不可畱其志又何也韓退之與故人書憂其米鹽不給懇懇有情真義士也老杜詩多稱人名非也葢孔子惟弟子乃稱名耳董仲舒不惟道學深醇亦精於論議所謂下髙其行而從其教民化其亷而不貪鄙者真厲世之法也裴行儉言士之致逺先器識後文藝與盧毓之論同此誠取人之法也安定云頭容直此所以檢其外也禮云葬欲其速朽欲體魄早歸於土也故棺不貴厚近世用厚木使體魄隔絶數十年不朽非禮也古人懸棺而葬不為隧道又記曰封之崇四尺則古之四尺今之一尺有餘爾近世用墜道興墓務髙廣使後人妄意其中往往啟盜之心於死者殊無益也諫諍大事也孟子言惟大人為能格君心之非則非一朝一夕之故昔漢武暴君也見嚴助諸人恨得之晚而其餘皆以誅死任公孫霍光可謂篤矣亦未嘗以禮遇之惟見汲黯則不冠不見可知汲黯所立如何爾黯嘗毁儒面觸如汲黯所行曠世絶代未見其比惟失之少褊葢非聖人不能無弊伯夷伊尹之徒皆有弊要之不可以聖人責之不失為賢人也若黯真諫爭之臣也或論陽城之不言以為養其勇大非也孟子曰未有枉巳而能正人城居諫職與屠沽出没而日沉于酒言不聞于人行未信于上一旦悻然而强諫特一醉人語爾宜乎其君不聽董仲舒言下髙其行而從其教民化其亷而不貪鄙則士必貴於素有所樹立况諌爭乎曷可暴也公問崔子方秀才何如人端禮曰與人不苟合議論亦如此公喜曰不必論其他只不苟合三字可知其所守之正正者大本也昔楊綰以清儉在位天下之士多以敝衣為儉以求合於綰惟武元衡素好鮮美不改所為至其論議則未嘗苟從葢惡衣食未足以為賢至其不苟合乃可以見其人問率性之謂道何也公曰孟子曰志者氣之帥也率其氣者是在其所志也率其性者豈不然乎率其性而行之足以為道矣易曰成性存存道義之門問名世何如公曰名世者自名也非特自名而巳也能言之類莫不名之也名之如何方斯之世而有斯人焉濟斯世者必斯人而巳也是以其人而名乎其世也是以天下之重而任乎斯人者也為斯人者如何其自任以斯世之重也方斯之時濟斯世者舎我其誰乎是以其身而名乎其世也以身而名乎其世者謂之知天知天之所以命我而出乎斯世則我之所以為斯世者其敢廢天之命乎問公穀三傳何如公曰子心之所自得必已多矣此其大本也至於古今論議擇而取之輔其所自得者也啖趙二氏有大功於春秋但未能全盡爾攷其所學葢不止於春秋貫穿經義窮極是非所論不苟若斯人者豈易得哉所謂有志於聖人之道者也公惠書云毁譽不可䘏至於操心慮患而防之者要在於幾微也臨别一說千萬祕之吕氏童䝉訓曰徐積仲車先生山陽人小許榜登科初從安定胡先生學潛心力行不復仕進其學以至誠為本積思六經而喜為文詞老而不衰先生自言初見安定先生退頭容少偏安定忽厲聲云頭容直某因自思不獨頭容心亦要直也自此不敢有邪心後因具公裳以見貴官又自思云見貴官尚必用公裳豈有朝夕見母而不具公裳者乎遂晨夕具公裳揖母先生事母至孝山陽人化之又云先生嘗為文訓勵學者云仲車先生一日升堂訓諸生曰諸君欲為君子而使勞巳之力費巳之財如此而不為君子猶可也不勞巳之力不費已之財諸君何不為君子鄉人賤之父母惡之如此而不為君子猶可也父母欲之郷人榮之諸君何不為君子又曰言其所善行其所善思其所善如此而不為君子未之有也言其不善行其不善思其不善如此而不為小人未之有也又云元符三年滎陽公名希哲字原明自和州謫居起知單州道過山陽因出過市橋橋壊墮水而不傷焉仲車先生年幾七十矣作我敬詩贈公云我敬吕公以其德齒敬之愛之何時巳巳美哉吕公文在其中見乎外者古人之風惟賢有德神相其祉何以祝公勿藥有喜後批云前日之事橋梁腐敗人乘蹉跌而公晏然無傷固有神明陰相其德願為本朝自重生民自重右節孝先生語一巻得之畨陽洪公紫微手抄舊以東坡先生志林語冠于首因以吕氏童䝉訓語附其後琹之臨汝郡庠嘉禾巳琹先生文集兹録雖燕閒咳唾餘一話一言足為後學警䇿如云治身以誠為本先生所得於安定胡公者葢終其身而無愧至極論諸葛武侯之平生與汲直之素立又先生所忻慕而自處者用否雖異君子謂其志則同其因讀貨殖傳而悟為文之法若有異者攷其說以簡易渾成為主學者毋以異求之乾道已丑季冬望日教授永嘉許及之書節孝集巻三十一
