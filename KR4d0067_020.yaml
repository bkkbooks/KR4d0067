body:
  text: 節孝集卷二十宋徐積撰律詩三十二首答崔汝弼忽對蒼髯叟誰吟老栁枝豈無解印日兼是省官時子實安於命吾何戲以詩如能少施設亦可慰余思答魏老二首滿面春風醉落暉滿頭紅艷帶花歸醉眠自有風流格不是無人為解衣一片山中雲自飛葛巾有酒琴無徽陶公自是秋風客不見黃花未肯歸答楊存中出郭人來又喚詩七香官酒杏花枝我詩却恐春風惜莫使春風度度知謝張先生出示鐵笛南陽張老本仙才鐵笛其形亦怪哉遮莫片時吹便已鳳凰非獨待簫來上林殿院次公九首身雖老矣心彌壯義必為之世所諳新著繡衣行殿內又騎驄馬使淮南升堂避席非常禮就室迂身共燕談更問熊熊與老老應咍稚女拜而參一從搢笏垂紳後所至官曹不苟拘皓首積成髙世義赤心傾在逆鱗書溫如冬日人之望嚴載秋霜使者車以愛以威無不濟恩從城市入田廬衰翁大半白髭鬚活到明年六十餘未死須為治河說此生難就賑飢書西庵共坐諸僧榻南郭親逢大使車記得偶同詩韻否淮東使者亦嗟歔老身如坐白雲山人日登髙我自閒莫道此心無樂事未知何日有愁顔月將寒影投書幌菊遣秋香過竹關悔不醉時籬下卧和花和蘂一時攀閉門老子卧遊山心去穿雲身自閒平地散仙曽有號坐曹為吏亦何顔吟詩著屐都無齒探月開門更不關酒後愛逢花後發花枝好向醉中攀老懷秋思各思山緑髮兒童事事閒感物但搔頭上雪呼人莫笑鏡中顔籃輿自可來嘗酒芒屐猶能去渡關玉井有花髙百尺秦王宫女許誰攀三歎枉教陪一唱詩仙爭肯伴樵夫金刀刮盡塵埃氣玉水洗成氷雪膚涸胃已慙搜思竭乾喉兼覺出羣粗餘篇只等功成後留和棹歌尋五湖兩人外迹本相踈何故孤孤為病夫未報已慙公面目有情顧入我肌膚將身荷負嫌軀小引臂鐫鎔要骨粗盡力吟哦吟不盡此時寒雨滿淮湖林氏家藏萬帙書五船便可當五車别顧客舟施坐榻更謀官舫作行厨寫時教子烘青竹讀處呼童捉蠧魚悔不早知都借取終身挾䇿灌園蔬寄顧龍圖龍圖莫怪白鬚翁依舊閒吟閒笑中未有梅花充信物但將竹簡換詩筒子如行路真無巧我信居山養有功氣類相從應得士并州兼有傅元通寄張子中時輩區區耳盡聾姓張夫子在關中孤松節操乖今俗獨鳳文章得古風至寶却須三獻捷病鸞終看一飛雄儒家自是詩書將又况潜心郭令公子中嘗慕汾陽王之所為過故鄉并序過故鄉美彭公也彭公以福州太守過於故鄉鄉人父老喜而作是詩也蓋學士大夫起自逺方羇旅仕宦處於中州皆東西南北之人也嵗月既久即其所居求田問舍遂為中州人者多矣建安彭公亦羇旅仕宦者也身在中州而日夜之心游乎東南以其家世墳墓松楸桑梓先疇舊廬所親之黨皆在閩中故也乃一日以右司移疾懇請便郡朝廷不違其意即用為福州太守仍總兵鈐甌閩郡縣皆在部中矣過家上冢得所願也蓋先之以掃除嚴之以齊戒思其所祭思其平生思其笑貌思其聲音思其所言思其所嗜內盡其心外盡其物故祭之日必見其所祭者焉其形僾然如有所視也其聲愾然如有所聞也自其門內至於疏屬外姻故人父老各以其黨來㑹人神和矣蓋公之孝思弸積乎其中而至於壅閼堙塞鬱鬱而不得泄者不知凡幾何年矣乃一日豁然如有外物抉而去之也公之所以自慰者不問其何如而可知也於是二三父老酌酒而賀公曰重金疊組尊為將相髙牙大纛虎士如林前歌後舞窮極富貴君子弗貴也君子之所貴者義也義無所病則君子弗病矣公以明儒出仕所居必治內外號為稱職心無不忠言無不直行無不正故不負於朝廷不藏怒不匿怨不挾忿作威故無傷人無害義夫義無所害人亦義之神亦義之神亦義之者報之以義人亦義之者身受顯名故自黑頭至於白髮士無異論而名義俱全以此還鄉鄉人之所以悅也若彭公者真可賀矣亦可歌也不似嚴生乞會稽一身名義總無非何須佩印如金斗若論還鄉勝錦衣行處眼前新事滿坐來門外故人稀有時載酒尋閭巷認得當年老父歸少年行車馬朝遊去笙歌暮宴歸繡幃初睡起紅日上簾衣贈李通直昨見君家父祖碑德功俱茂節多竒初終義正今難有積纍源深後可知但得名為騏驥子何須身到鳳凰池其先付豫皆良法隨所居官任設施寄范君錫人事大難知悲歡與合離忽驚殘臘盡還憶去年時對雪我無酒招沽子有詩春深相贈物花共緑楊枝寄崔汝弼四首黃艷花前白頷翁憶君詩思入霜風如今相去猶未逺明年把酒望江東除却行吾義其他任自然胸中清水溜頷下白毛鮮别我未逾月思君似隔年北軒翁在此曽醉菊花邉又不見吾崔子南城兩度春應從湘水夢來就泮宫人壯氣胸中舊衰毛頷下新明年六十六望子過淮濵又數幅長沙紙殷勤為寫懷知公富情義念我老形骸處世日無幾歸耕計未諧若論身後事賤骨要深埋寄裴守髙麗亭下張帆日引首將心送畫船本恨無因到䕫國誰知有夢向澶淵情逾舊物非徒爾義等髙山合使然料得政成公事少冬溫常在北堂前贈盧君常并序盧公病甚遣其弟來辭訣以詩贈之人世情懷已索然幸無不義入黃泉不須永訣行相見六十三翁能幾年君向瀟湘我向秦我望秦關方整駕子如湘水欲登舟馬嘶山塢誰家宿纜繫江楓何處留壠上耕隨殘月去日邉帆帶落霞收灞陵古恨騷人意歌向樽前不易酬寄朱廣微兩官本是好吟翁雲出山來鶴入籠記得僧軒閒坐否無人到處水邊鴻答白雲之句三首我是白雲雲是我自知雲我不須分時人若問山翁意看取山頭一片雲朝共白雲行暮共白雲歸眠時雲亦眠以雲為寢衣白雲白雲常在身有時忽共白雲分君看天外逍遙物便是山翁身上雲菊花為汝花中開最孤詩翁何惜屢提壺却應有意酬青眼渾似傾心向白鬚擊銅鉢時吟更好擲金錢後醉相娛楊妃只有黃裙在且問風霜留得無贈黃魯直不見故人彌有情一見故人心眼明忘却問君船住處夜來清夢繞西城節孝集卷二十
