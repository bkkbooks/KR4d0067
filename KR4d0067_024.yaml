body:
  text: 節孝集卷二十四宋徐積撰律詩三十七首無纍仙塵世紛紛總是空花開花落幾時窮有人若問煙霞事我是逍遙無纍翁笑仙天上人間自不同莫將澆俗比真風真風大抵無今古萬事都來一笑中憂仙我是真人何所憂所憂世俗好多求相謀相詐何時了一笑一啼無日休憫仙禍福之來本自求世人聞語不回頭但知自快身前欲不道永為身後羞又水仙四首紫金沙路明珠闕浴罷龍兒洗明月待來人世等麻姑只被塵埃汙羅襪為買蟠桃海上花明珠滿載玉龍車蓬山諸子須相問笑指煙波是我家我視江湖都一掬海水雖深不濡足待教平地産明珠但恐世人更多欲伍子波濤空渺然至今猶有不平言屈原褊淺尤多忿但恐有時來訴寃勞仙朝採藥暮採藥踏盡間雲一雙腳出一山入一山先生如此何時間有時兩腳不出戶不煉黃金即煉丹先生手足已勞苦一心欲把河沙數却笑間仙無所為門仙端坐亦相嗤大都世事亦如此相笑相非無盡時宴仙紫瑶樓上宴真人膾是鯨鯢脯是麟醉倒玉妃何處去煙霞迎步鶴隨身晨起仙帳外雙童持劒履一榻紅雲睡初起滿面清風漱月華瑶槃更挹明河水童仙憶昔為兒跨竹梢誰何傳與太平謡如今羽化已千載緑鬢朱顔更不凋老仙腳踏青雲身已老訪道修真恨不早曽見商周全盛時不及唐虞古風好飽仙誰道真人能辟穀先生每食無餘肉鄰家便是忍飢仙糊口之糧猶不足飢仙糧雖不足氣常充真是根源久是功真久不惟能養氣幽明亦可感而通茶仙賜得龍田不種花自攜瑶水灌煙霞誰將玉樹雙枝換只得春前一寸芽狂仙香枝灑面瑶池水霞艷裝衣閬苑花一半是狂兼是醉急教扶去卧煙霞迷路仙當時採藥因迷路平上青雲不用梯却似人間行路者醉魂春夢至今迷賣藥仙蹄涔蟻垤何須較芳草浮雲事可知曽向人間間賣藥塵埃滿眼看兒嬉無知仙為向平時尋古風幅巾芒履走塵中俗人不識煙霞客喚作無知賣藥翁飛仙二首不用驂鸞不御風騰身拖袂便乘空方從碧海遊三島却駕煙霞上紫宫十萬里餘都一息須知此道非人力有時間望玉山遊鸞鳳滿天追不得謫仙二首曽宴巫山十二峯歸來謫下廣寒宫如今已得瑶環賜便揖浮丘騎玉虹自脫霓裳辭玉關玉符金字謫人間人間雖與煙霞隔醉夢吟魂自往還忘憂仙鳥不曽喧獸不爭鸞歌鳳舞碧瑶城羣童盡唱忘憂曲也似人間樂太平力仙二首崆洞道人良多識易以真為難以力豈無羣聖可相師亦有一篇言道德挾虎搏蛟良有力扼斷鯨咽批豹額虎豹雖獰却易防螻蟻口中藏劒戟急仙但把真聲吹鼓簫鳳來鳳去不須招浮槎河上無徒涉種玉田中莫揠苖慢仙急仙燒煉日盈罐慢仙十日未能半一人賣藥走不停一人得金不肯換又雪仙二首華蓋車前龍步滑紫微垣上鳯巢寒一時掃下塵泥去却入漢家承露盤人間多是苦寒飢短褐踈衾正弊時欲把霞衣都覆蓋却辭玉女宴瑶池求仙神仙不知真有無其術可圖不可圖得之不得存乎命躁不以命良可吁愚夫忘欲棄所愛父母無子妻無夫本求長生不死術夭厥所夀殘厥軀玉霞弟子玉霞弟子非無學金籙名仙亦有才却作左慈筵上術誰將酒脯盡攜來藐仙藐哉小哉其奈何牛蹄之水一泓多若是胸中能自養長源巨𣲖傾洪河竒仙竒哉竒哉有此仙胸中廣大可容天深莫測兮髙可仰滄浪之水太山巔不可知歌謡才作彩衣童䇿杖俄為白髮翁走遍紅塵人莫問先生意在不言中莫回頭薄夫用意終歸險更有鄉原事可羞多少古人遺恨在紅塵岐路莫回頭無奈何我曹意者非忘物自是為仙無奈何海水玩來如股掌人心難處甚風波無奈何兮無奈何失之哀兮得之歌巧拙其間不容寸得失相去能幾何謫仙我是蓬萊山上客暫到人間管春色謝家池館聳吟魂卓氏酒壚間醉魄人間春色將奈何瀲瀲灧灧濃如波歸來説與秦玉女麻姑偷去唱為歌勸君勸君莫折楊栁枝枝無根本任風吹勸君莫愛水中萍萍隨流水何時停莫愛春風山上草才到秋風便吹了更有籬邊紅槿花朝來錦繡暮泥窪不似茅庵水上家碧蘆門徑白汀沙兩眼僅分鷗與鴉口無巧語心無邪不但無邪兼寡欲釣得一魚心便足漁衣便是岸頭莎釣竿自種籬邊竹龍雲是口中氣雨是口中沫口中噓吸須臾間天下焦枯一時活鳳百尺樓頭鳳一羣聲如韶濩羽如雲開口一鳴天路白六龍馳上海之濆鸞吹簫臺上曽歌舞留住秦雲伴秦女近來長趂紫宸朝麟鳳肩隨龍接武鶴任教雞鶩爭粳粃脫身一舉三千里如今直入鳳凰池口啄琅玕飲瑶水舊羣流落在人間為趂稻粱飛不起節孝集卷二十四
