body:
  text: 節孝集卷二十一宋徐積撰律詩三十二首示諸君古俗今時不用分只將虛實判澆淳養心有要先除偽入德無難只用真此道若從為得路他岐如往是迷津我曹好尚雖迂濶最愛山夫共野人妾薄命四首偷把羅衣裛淚痕落花江上泣青春空將鳳管題君怨自是蛾眉纍汝身翠黛不須勻緑鬢紅膏休更點朱唇自然彼此無心妬猶恐多言巧中人春深江浦流還漲雨後山花落更多舉目未言先有淚當樽欲唱不成歌心知自古皆如此事到如今不奈何莫向夕陽樓上望幾人遺恨滿煙波將身誤入楚王宫負却家山事總空枕上無言吟夜雨花前有淚灑春風假饒醉飽朱門內豈似寒飢漏屋中更有文君作奔妾爭如寂寞嫁梁鴻女子恩讎事可知我曹何用弔吳姬如斯才貌如斯苦也似賢人被妬時璽書長句并序元豐辛酉夏山陽大水太守大夫睢陽李公捍禦甚力援溺賑飢民賴其賜全活者甚衆蓋公之所居忠於職分而行其所性然也部使者即以其事上聞朝廷無東顧之憂先是詔求吏最部使者諸公連名合薦以公應書是為選首及治水事章上天子尤嘉之至於歎息於是賜璽書慰勉勞問甚渥蓋西漢故事凡用璽書謂之所表及公卿有缺即用所表者補之此孝宣帝所以待牧守而與之共治卒至於甚盛者也公既為所表稱士大夫論議而山陽之人父老子弟所以相告而喜之也公之客邑人徐積辱在所禮且使之與觀焉於是乎述璽書長句隨船父老踏青莎人各持杯奈醉何謡俗戀恩成太息吟翁樂義合長歌皆知察物嚴而恕誰似當官正不阿東漢武威任郡守至今髙義聳峩峩瑶真詩二首并序淮南轉運林公次中所居之府有花一株舊名玉蘂公改曰瑶真即瓊花之别本也瓊赤玉也名其花者蓋誤矣揚楚二花同為一物而楚花獨得瑶名也真者天下之良貴也故因物而寓之則存乎其心者不問可知蓋未嘗不在乎其真也既名其花遂名其館謂山陽學官曰子能賦之否乎於是得律詩二章其亦庶乎述而賦之也此花所在宜開館彼玉維瑶合比君每到黃昏成淡月却臨曉後作團雲人間偽采何如質物裏孤芳自勝羣應笑馬嵬坡下女太真為號繫黃裙不知記得瑶林否故國曾陪閬苑春色貌易分渾是正性情雖辨總歸真紅塵世上無雙物白雪宫中第幾人若問誰何名玉女一般嚴靜敵霜神詠慎郎中園木香仙子霓裳曳紺霞瓊姬仍坐碧雲車誰言十日春歸去猶有春風在慎家長春花五首誰言造物無偏處獨遣春光住此中葉裏深藏雲外碧枝頭常借日邉紅曽陪桃李開時雨仍伴梧桐落後風費盡主人歌與酒不教間却賣花翁一從春色入花來便把春陽不放回雪圃未容梅獨占霜籬初約菊同開長生洞裏神仙種萬嵗樓前錦繡堆過盡白駒都不管緑楊紅杏自相催一謝芳菲更不還誰何嬌步獨盤桓雖於物態為難有却是時情總易闌日曬香肌難避暑雪濡粉面亦禁寒等間莫使人知處長與詩家醉後看誰與猩猩血染紅重重疊疊費春工應無暴物侵和氣自有深根藏暖風每見靈芝三秀了回看凡艷一時空如環光景循將遍又到江南梅信通枝上疏疏花啓房輕綃重錦迭為裳更分深淺兩般色不作尋常一面粧蕣有紅華須鬭艷蘭雖清節亦交香吟翁未暢先投筆為與東君詠海棠天下風流無緑楊天下風流無緑楊半遮粧面出宫墻客醉任鋪紅錦段馬嘶爭繫紫絲韁上東門外我回首長樂坡頭誰斷腸最好春深山下路亂花薰與一身香誰把間愁付緑楊誰把間愁付緑楊我疑渾是别離腸每教啼鳥呼春色更共平蕪送夕陽山下人行雲慘慘渡頭船去水茫茫髙樓亦有思歸客莫望天涯尋故鄉一生多恨瘦纎纎一生多恨瘦纎纎染盡春華緑試圓十二樓臺寒怕雨九重宫殿暖愁煙城邉放客尋花路溪畔留人載酒船莫向灞陵橋上望白雲流水舊山川一片花飛減却春一片花飛減却春共君同作管花人急將步障圍春圃莫使狂風近四鄰問楊栁我愛風流楊栁枝楊栁如何報我詩落花滿面春風曉借與絲鞭走馬時白蓮花水一重重玉一重更無妖色媚西風雖然物外能為素又恐人間只愛紅野花一點香心寂寞春牧童歸後更無人誰家庭院栽楊栁猶自飛花入四鄰謝人惠梅花我共梅花情最深左持樽酒右持燈持燈持酒豈辭倦却是春香不自勝海棠花并序海棠花盛於蜀中而秦中者次之蓋其株翛然如出塵髙步俯視衆芳有超羣絶類之勢而其花甚豐其葉甚茂其枝甚柔望之甚都綽約如處女婉娩如純婦人非若他花冶容不正有可犯之色蓋花之美者海棠也視其色如淺綘而外英數點如深胭脂此詩家所以為難狀也余少時嘗為詩屬有以長春花示余者因為長春詩詩未卒忽念及此花蓋余秦中時舊物也遂不復為長春而為海棠花詩云彼美花兮宜晚春柔姿淑艷是何人十分國色粧須淡數點胭脂畫未勻帶雨容開渾是恨出牆頭望恰如真幾時謫下蓬萊島霞汚仙衣痕尚新一度相逢一度春不知名姓是何人十分國色粧須淡數點胭脂畫未勻好把東皇為上客便堪宋玉作西鄰臨卭道士今何在説與唐宗是太真别玉女花辭他玉女難空手酌盡銀瓶醉未休任是職嚴風望峻也須一步一回頭緑楊二首緑楊何處不相逢到處伴他花草紅只為人間苦離别更無情緒管春風且尋緑院朱扉好莫看山前水畔容肌膚瘦盡春風甚更被春風舞不供栁絮二首君看青蠶蘂間花使棄捐臨風競離别就地忽團圎孤客正心亂浮雲來馬前灞橋逢杜甫老淚更澘然又長條徒自重狂絮去何之禁籞穿花樹春江撲酒旗因風無定意著物有間時謝女何為者深情在雪詩荷花池上交加礙釣船漢宫新妓約三千緑蘿枝葉能承露紅玉肌膚不惹煙巫峽已曽縈客夢西施何處擲金錢無人為把秋香惜聊向西風贈此篇敗荷有客方笑歌誰人吟敗荷但言為秋惜不道礙船過折柄刺芒在亂絲根本多江頭浪如屋今夜奈風何杏花二首窗外花開紅滿枝董生正下讀書帷東風到晚殊無定今夜清香屬阿誰一點胭脂淡染腮十分顔色為誰開殘燈欲盡書幃閉猶有清香半夜來雙頭芍藥三首金谷栽培異春皇養育殊一枝輕聳翠雙萼密承朱根是鴛鴦化生來姊妹俱同行雖有伴並寢總無夫共鑑勻粧臉偷霞點絳膚東鄰與西子謝女共羅敷解佩還曽否為雲總解無情深難獨步力弱易相扶卓氏彌傷寡長門愈恨孤鬭誇紅粉面齊著繡羅襦盡好藏金屋誰堪作舞姝郎須待劉阮家想住秦吳翠幕渾遮步雕闌並向隅黃金難買笑為爾倒金壺又國艷粧成總一般月娥霜女不相干春閨有恨須招伴夜帳無夫並怯寒誰道皇英沉水去好教劉阮憑闌看陽臺雲雨如俱解妬寵爭妍有萬端越艷吳姿總一般嬌鶯之外孰相干雖同交甫江邉見不似劉郎洞裏看未必解爭春帝寵却應同笑月娥寒阿誰能伴詩人醉不惜紅綃與萬端節孝集卷二十一
