body:
  text: 節孝集巻十八宋徐積撰律詩四十首寄路倅洪澤阻水二首黄金宫闕紫瑶關鵷鷺思陪玉笋班仙仗好教鳬舄去客槎却在斗牛間有為義對霜濤湧無敵詩同鐡陣閒誰報京師羣弟子先生吏隠鬢毛斑莫教容易過龜山多少人心願復還更有南城黄綬客但吟西戸緑楊間纔經濁汴無澄浪且趂清淮洗醉顔安得就公歌一曲緩吟遲步夕陽灣和潘朝奉鄒國公配饗丹書一下人神慶美矣先朝貴孟公能與百王興漏典長令萬國仰遺風躬為獨行生無禄道配彌髙祭有宫孰謂濶迂窮至死正而窮勝枉而通和路朝奉新居十五首世俗紛紛事總虚詩翁今作逸人居勤穿東地縁栽竹喜占明窓為著書近市好賒春肆酒就淮仍買晩罾魚忽撑小艇來西郭不問皆知訪仲車詩翁愛酒典衣沽六子將孫侍燕居正要白家醇釀法不須劉德偽金書厨經雪後炊無黍門近淮瀕食有魚何以獻公㝷一物庾郎三韮載盈車昔也聞名誦子虚今來白領隔城居新詩解道論頭句舊客仍移把臂書北郭髙風真隠豹南州循政喻烹魚歸時見説臨川路父老爭留太守車陳傅門前客姓徐有何智術佐閒居接簷俛仰令遮雨縛竹縱横為架書趂雪劚田移草木和灣汲水貯龜魚上元已過清明近更約㝷花不用車誰家住處近田廬朝奉抽簮就退居竹葉已成新嵗酒梅花未領故人書呼童解袂捫飢虱趂日開箱曝蠧魚一似散仙閒到夜卧屏仍看五雲車坐想堂前弄白鬚蒲茵筍席正髙居綵衣六子傍供膳錦髻諸孫自教書愛士主人新置榻清身太守舊懸魚更吟整斗論頭句勝却西庵詩一車不辨時人直與迂濯纓且喜近淮居朝衣脫後常耽睡野史脩時或借書恨乏青山供採藥愛看白鳥伺吞魚東園賣酒花開近待看詩翁倒載車簿領脫來如一夣身名全後喜寧居生來自信無非義世上何縁作謗書所養有源如大水其賢可樂比嘉魚願公八十為更老玉幣三招乃就車自是平時大隠徒何須水宿與山居都無長物垂空槖却有閒房聚逸書近見雪消思野蕨遙呼船問憶江魚卸㠶便去㝷村酒醉使兒孫推鹿車身著練袍履用蒲鶡冠鳩杖稱郊居家中但乏青囊印坐處便看黄巻書賃屋為無揚子宅休官非為武昌魚長年不出何妨事况是門懸致仕車夷白先生好對廬醉吟處士作鄰居幅巾自去呼樵父蠟屐何時訪竹書坐想髙談揺麈尾情知相誶跨鯨魚更憐同姓陪罇酒勝却荀生得御車路家巷口是何渠半似城中半野居已退白仙常按曲未歸陸俊謾傳書雪消牆外逢挑菜日暖門前見捕魚更有花間行處樂舊時歌舞願隨車好養𤣥猿共鶴雛茅茨盖屋竹間居家無越使千家槖腹有齊臣四部書一自臨川登畫鷁便煩别駕掌銅魚吟哦還作詩仙退恰似驂鸞鳳駕車世間詩淡鄭雲叟夀且安寧陶隠居愛酒自開浮蟻甕耽詩如好換鵞書籜冠戴後搘笻竹鶴􅌁披來控鯉魚學作蓬萊吟醉客何須駟馬駕安車西庵翁上北城隅為望臨川舊守居所恨足無雙翅舄但將詩代一函書甥教洗榼多沽酒妻使磨刀細切魚洒掃待公來獻夀親扶杖履醉升車送路倅二首所居有本能行義此去無人不戀恩情似緑波長送棹夢如飛絮忽隨軒帳前舊學千餘子槖裏新文數萬言何日從君温故業待操几杖問淵源我曹初作綵衣郎白紵先生正擅場大筆可堪專簿領逺圖終恐用文章清淮絶唱新盈巻緑髪竒篇舊滿囊此去功名都未測公年方永力方強和石宣德五栁亭安正五栁神君氣貌端所希所向靜而安每思往行投閒地肯逐時情慕熱官秫酒易醒風戸猛葛巾難卧月窓寒也應種得東籬菊好置籃輿自在觀送秦漕昭昭所性諍而辨坦坦其行樂且恬公義已令淮部肅清風更入朔方嚴行無瑕纇孤標聳養有根源數器兼猶使樵夫來教我樵歌為述古人謙送宫教郎朝奉博士髙才御㸃名徃陪羣俊盍朝簮門頒錦詔先生入帝錫綈衣後殿深設坐宫官嚴絳帳執經王子肅青衿堯親已被欽文化更倚師謨稱上心送李憲二首使臣車用赤帷裳帝選明侯重嶺陽後乘未離淮分野先聲已遍越封疆冝教㢘吏心如水但恐貪夫背有霜大抵當官須去害人間所在有豺狼五船鳴鼓待嚴裝且赴雙蓮舊燕堂不用水沉薫紫綬過梅林後一身香送程守二首楚人相喚守河梁鳴角樓前駐畫檣未肯放船來北渚且教載酒去東堂傾城和氣傳芳草沿路清風配緑楊見説新班名玉笋赤墀登對待馮唐聞道西城欲解船病翁懐抱更騷然將心已附諸生輩䇿杖難隨庶老肩負義本非今世俗報恩終愧古人賢不才自訟無他技合作詩歌更百篇送人從軍古來雄雋是從軍問罪殘羌正有名黑槊將陪黄鉞帥銀鎗隊擁鐵林兵十州假息恩涵覆百載逋誅事貫盈首惡便應囚巨檻壯圖難議請長纓須空大漠遷降卒好決洪河刷逆城報國主人心更勇西山勒頌得班生贈山翁耳聽人言似不聞心於時事若無分一生已是青山物更欲將身換白雲山翁荅無分之句身邉外物雖無語事到中心自有分莫道山翁頭似雪心如劍㦸氣如雲謝張才甫卭竹杖二首老來無物可搘頥正要一莖卭竹枝滿袖清風秋月淡陶潜遶遍菊花籬手中忽把一枝笻稱我逍遙林下風不是西征車上物臨行自合與詩翁戲呈魏評事三首北齋有酒夜開門獨酌燈前酒一樽只被詩魔無處避待教醉魄戰吟魂我向燈前置酒盃南軒北戸一時開如今正是花時節且放春風數路來紫府瑶關夜更深阿誰閒醉洞中春呼童去問煙霞事只見桃花不見人寄江子和為問江先輩何時訪白鬚老懐何所慰得子寄來書和路太博莫教竹馬誤羣兒謝守行春未可知落盡梅花寒食近却應桃李怪來遲謝頴叔能歌白雪公常事不醉黄花我㡬曽一絶便勝書一紙情知髙義過劉𢎞寄王觀文扁舟欲泛湘江月亦泛洞庭湖上春十年此意逢今日且喜洪州有主人别崔刑部黄金何日上燕臺致主猶輕樂毅才便是功名未如意報恩寧肯惜重來送秦少遊叟罷耕耘妾罷機忩忩人意甚牽衣可憐數里笙歌地但見一畨楊栁稀節孝集巻十八
