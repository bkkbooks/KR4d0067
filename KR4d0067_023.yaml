body:
  text: 節孝集卷二十三宋徐積撰律詩四十一首天都仙三首甘露灑時黃道肅紺霞環處紫宫嚴金華未啓瑶臺曉流月奔星共一簾真童列仗嚴如兵誅姦號令雷風行俄聞一物不遂性急傳口詔春陽生天兵十萬著犀衣手執金幢踏彩霓龍共玉麟相次列羣鸞班在鳯凰西早朝仙三首紫瑶闕上煙霞曉赤玉階前劒珮齊十二金童傳詔罷雲冠星辨一時低紫府真人朝玉京三千玉版先進名叩頭欲跪紫煙合但聞玉珮玲瓏聲閶闔雲深未啓關霓衣夾道已成班須臾特詔仙官入日月諸星共放還朝回仙匆匆朝罷九重天便按蓬萊御紫煙趂得蟠桃花下宴鼓簫諸部約三千文仙紫微詔誥都經手東壁圖書盡在家何日再遊羣玉府吟窗依舊鎖煙霞武仙冠珮嚴嚴坐綘雲環兵列仗是何人諸仙稟命羣靈肅玉冊金符盡在身富仙碧霞樓上常先曉白玉宫中愛早寒亂玉甃成池浴鳯渾金削就棟栖鸞貧仙莫怪先生身上貧眼看外物似浮雲房中除却琴棋後更有門前鶴一羣貴仙鳳節霓旌擁萬神五雲車騎駕龍麟腰間獨佩黃金籙元是瑶宫第一人吟仙金編誦處無人見玉洞題時有鳯知昨夜忽然何處去月中吟就白雲詩醉仙曽共諸仙宴紫微金鍾插羽疾於飛醉魂已望三山去猶整華冠齊羽衣醉起仙珮環聲動出金華鳯引鸞隨入綘霞行到瑶臺雲路狹側身趨避玉妃車亷仙人間日月分庭過天外星河入戶流是物化金無所用滿田種玉不曽收寡欲仙膝上橫琴鶴在傍白雲衣共白雲裳夜深閒卧南窗月更有清風共一床地仙瑶臺紫府都歸夢碧洞紅塵總是家蓬島有時來問信桃源無處不開花玉妃琳琅宫殿本無塵猶跨青鸞踏紫雲怪得曉來天色淡海霞都在玉妃裙麻姑二首折盡青林多少花麻姑却在蔡經家瑤臺好酒無人醉鳳怨鸞棲空暮霞不道風塵良苦辛却停仙仗醉紅塵青鸞一去無消息只被麻姑誤殺人閒仙先生坐時雲滿裳先生卧時雲滿床白雲終日自來去若比先生雲尚忙棊仙壺中白日何曽夜洞裏桃花别是春一局閒棊猶未了坐中老却採樵人夜宴仙二首閶闔宫中夜宴開手揮明月坐瑤臺不教偷藥姮娥到却放投壺玉女來明月宫中夜宴多坐中齊唱白雲歌瑶環玉珮三千女不著人間俗綺羅困仙洞中一覺春風夢落盡桃源萬樹花竈上丹砂尋不見騎鸞誤入阿誰家浴仙玉珮珠襦自辟塵瑶池浴罷卧紅雲指揮莫放香波去留與龍兒并鳯羣詩酒仙二首玉譜天書金版字桂花濃釀碧霞漿無人敢與為詩敵有客時來覔酒嘗間雲淡月為詩態春日春風是酒容玉女爭求新樂府金童時獻碧瑶鐘太平仙誰知我是太平仙歌罷浮雲笑暮煙更倚玉樓吟樂府斷虹消盡月明天贈别仙平日忠言薄萬金此時何惜贈君行好名不是真人事莫向人間留姓名雪仙九重天路忽難通誰與傳書寄閬風鶴馭三千無處覔銀潢萬丈一時空望仙好雲消盡鶴空來一去麻姑更不回紫府路從何處去碧桃花向夢中開無妄仙清風忩外雲初去明月池中鶴自還春色一簾閒睡過瑶花落盡不抽關希夷仙白雲夫子號希夷碧玉忩中下絳帷皓首勒成書萬帙病鸞偷見鶴偷知紅塵舊學今雖廢紫府新書近已齊三十六仙俱不見玉函金鎖印龍泥悟仙昔日聞人說上清如今髙步太元庭有時却憶紅塵事恰似夢回并酒醒惡僞仙本希上聖忘言學傍採南華寓意書去僞即真雖有道未知人意自何如劍仙此劒曽將赤霄倚雲雷欲戰秋風起攜下赤霄磨玉山玉山色變龍蛇寒霜飛浪活河漢清星辰日月分光明天生神物不可犯曽向人間誅不平玉龍不死常在腰一抹血腥猶未消莫教望見延平水待與天地除凶妖水仙四首曽乘秋浪泛銀河撥盡閒雲恣浩歌明月一環來拂面玉龍十萬總隨波天上瑤池為别館海間金闕是離宫徐行按盡烟波國髙步却來雲漢中昨夜曽游洛女家自知此處勝烟霞回鸞更按湘妃曲醉踏煙波弄月華龍馭曽遊絳水霞回來却坐赤鯨車夜深正解雙珠珮莫㸃犀燈照我家節孝集卷二十三
