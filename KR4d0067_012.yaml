body:
  text: 節孝集巻十二宋徐積撰古詩二十二首楊栁枝楊栁楊栁復楊栁舞罷青衫困垂手相如病思最多情沈約才清更酣酒君看好鳥鳴枝間日與春風問安否清明前後峭寒時好把香綿閒抖擻睡二首睡入淨域居夢有殊方樂不須汎海裝去採神仙藥手闢黄金闕足踏巨鼇殻更作西方行真到崑崙脚又人莫嗟勞生睡者吾一樂困來入醉鄉夢去得仙藥瘦脛鶴伸足老背龜側殻日出紙忩明煙霞忽失脚醉題友人詩後可惜兩眼青不見一室白為子吟喉乾使我酒靣赤醉中一夜騎鸞鳯麻姑空敞桃花洞南樓下去北軒中西闗放過東臯夢同門人夜看花示盧魯山罷酒巳半夜重來慰幽花可惜遭風雨大半成泥沙移坐環其叢含香嚼其華五人摘滿手歸來千萬葩謝人惠梅花江南費盡春風力嶺頭驛使無消息有人贈我一枝花滿面春風與春色代簡招魏君詩老今朝頗安否且來同酌一盃酒雖無鼓吹相歡娯自可笑吟相拍手偶題軺車使者良苦辛手持漢節入紅塵青嶂斷時初見日黄沙飛處不逢人妾身安在何足卹紅簾翠幙遮羅裙男兒大抵貴忠義而况委質為人臣不憂死節奉王事但恐偷生為妾身妾嫁即時尚癡騃可惜黄金如土賣誤將玉體與儇兒身卧汙泥佩蘭茝無禮無義將奈何但抱羅衣千萬帶欲令髙節比梁鴻説與墦間仍不改莫嗟逺别離離合良有時所願君自愛養取胸中竒莫恨别離久願君自持守所守義或非得之適為醜君莫愛妾身妾以死奉君一片玉為面百尺布裁裙子亦當何如為國愛其軀一節死不變如妾事吾夫束帯人待行牽衣未能别遺子酒一巵聽我歌三闋其一獻君壽白髮為君偶其二祝康寜玉體和而平其三無累家無令妾咨嗟不患不富貴所患入於邪三月三日作今朝乃是三月三三分春色二分去一分春色能幾多吟翁老病無如何却思翁在秦中時年少愛逰山與溪其時人物如神仙手携酒榼擎花枝人不惜錢似癡騃乞者與之見者買人人都著好衣裳處處紛紛成五采山上山前閙如市人半歸時城欲閉西溪最是栢坡頭人家占却無閒地更有㡬處入城早清明上已踏芳草若無疾病與死亡人家大抵無煩惱鴈從何處來鴈從何處來正望東南飛毛間認白露肚下看殘暉浮雲共煙水日夜為所依衡陽是故山但恐故人稀金沙行闗西不雨凡㡬城孜孜誰獨勞其情鎮潼太守真賢明驅車逺有金沙行春空破碧幢髙旌東風環珮鏘瑶瓊溪翁不釣童不耕隆隆千里謳歌聲從容禱罷殘霞横蓮花頂上㣲雲生雲兮雲兮雲莫停霈然一洒塵埃清夢李白烏紗巾紫綺裘夢中太白從吾逰陶陶爛醉江山秋半夜起來覔不見頭背長安淚如霰好笑南郭翁并序南郭翁病且老矣而最好栁菊所居之室適有巨栁二株夾户翛然與常栁不類亦江淮間所難有者也名之曰老栁其居在學舍之西廊故無東籬即於西籬下多種菊花至於十月其花猶有存者名之曰晩菊每飲酒先舉杯向栁熟視然後移杯轉頭向西籬下呼小兒取菊花投之杯中一釂便止蓋其所樂者在乎其内而不在乎其外也南郭翁常自比於陶潛而栁數不及又其種菊之所東西相反至論其所樂亦無以異也樂乎樂乎其如此而止乎猶未免寓諸物而已也好笑南郭翁白鬢愛楊栁如今十月後猶飲菊花酒楊栁色漬面菊花香漬牙喉嚨溜香汁腸胃浮香葩所飲幾何酒所吟無限詩若言絲與管便是吟哦時心無一事累意與千古期一身成土木兩脚登雲霓但欲比陶潛豈肯為杜㣲公有如此客可不使公知更問公安否且喜公來歸觀草一從有意惜庭蕪㡬日無心到楊栁好色盡歸簾下翁餘光掬與船中叟紺液難從日下乾芳姿易向霜中老纔到春還車馬稀青青勝却朱顔好山前勝入樵兒手亦勝江頭伴烟栁閒中好步陶先生醉裏宜眠鄭雲叟我闢閒堦恨不早草正茸茸花又老人心好惡任不齊但問青紅阿誰好觀草亦有術可使無涯際誰知簾下情或有林間味南郭雖如此東臯亦何異便可棄衣冠閒枕青雲睡繡屏戯呈思權先生卧内花為屏錦堆四面紅雲生珊瑚枕上三四更半醒半醉魂夢驚安得仙葩千萬英不是天台是武陵與熊熊作策冩詩此是熊熊䇿先題呉季詩季自題學書如此憐吾兒季有古人風憐兒心可知莫望草并序莫望草為路公而作也路公行且有日某方抱病伏枕感公之行於枕上為此詩焉時夜漏方半適與孤甥老老同寢竊自感其意即以手撫老老而歌之老老最耽眠至明日猶能記憶是其歌之甚數也既而即欲自書而病不能書然卒亦自書之公且行矣某病未除也某不知恤已之病唯欲公之長無苦也公其强食自愛為國慎疾此乃詩之所不能道者也方某年未四十時歴事尚淺或見人感慨悲歌至於澘然出涕或對之竊笑或意色不恱蓋以為此非壯夫之事廼兒女子之情也其後歴事浸多或得之於所見或得之於所聞或得之於傳記然後知其所以然者是其不可以巳也然後以為非特兒女子之情真出於壯夫烈士之義也蓋士有徇一日之義蹈白刃趨鼎鑊出萬死而不顧者則悲歌涕泣又何足道哉彼壯夫烈士者未必皆合於義雖近於義未必皆合於中道然至比於薄俗小人忘徳背恩者可為之長歎息也夫以悲歌涕泣為不足道則此詩尤為不足道也蓋其所以戀公之意不能少見故少見之於詩也雖然以公之義豈區區之詩所能道邪是亦不可以已也此詩樂府也借喜事小吏歌之不一歌而止可也莫望坡頭日日色催行人莫望河上草草色空連雲雲邉芳草路茫然是何處行人望不見草色自如故書樂陵王百年太子傳酷哉武成枉殺樂陵一歩一杖遶堂土頳投之池中池水盡赤其妃哀號至死不食其指其手拳不可擘九院之後小屍猶在骨碎肉爛緋袍金帶一袍有靴一髻有解哀哉嗚呼此兒何罪賊人之孤負人之託毒如豺狼險如谿壑身自為孽其子受之扼咽䝉頭連頸横屍報應如此其來勿問與其自殺不容尺寸我哀其愚作為此詩永貽厥鑒勿為險欺哭崔刑部前年離長安與公為死訣長安門外長樂坡胸中壯氣渾消磨其時夜宿灞橋上夢中勒馬猶西望江淮之上情愈勞去年曽寄西山髙今年今日春將歸春風不似秋風時山陽數月雨不止泥深窮巷行人稀忽聞公死終南山坐中忽過東西闗黄泉一去㡬萬里吁嗟公兮何時還盂有水兮無食薦烹有茶兮無酒奠魂兮來兮不可知來若飄風去如電報恩之事終有期未必儒生只貧賤哭狗狗東門園上春風微醇醇塜上花成圍醇醇一去不復返食一盂兮酒一巵悲莫悲乎今日傷莫傷乎舊衣思其言而想其貌吁嗟乎天殤吾兒偶述罇中一勺水其味誠淡薄盡日設重席無人與酬酢東鄰有㫖酒金壺而玉爵門前羅軒車陶陶一何樂閔災詞并序春秋大雨大水震電皆書今淮南不幸有此變故故作閔災詞以弔之神地出淵泉商羊向天舞電火燒黒空雷車震金鼓大塊噫風吹黄沙黄沙須臾化為霧此時隂氣一何盛蚓噓雲兮鬼嘯雨雨繩繩兮雲蒸蒸天慘慘兮朝復暮嗟爾長淮之民何生而苦方饉而饑方疫而愈乃有此患普及於汝地湧水泉天降淫雨浩浩之勢包山逾阜汝居無廬汝耕無土汝口嗷嗷其誰安訴吾聞堯水凡九年民雖昏墊不失所願我君王發徳音一變悲號作歌舞節孝集巻十二
