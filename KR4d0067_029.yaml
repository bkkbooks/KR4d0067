body:
  text: 節考集卷二十九宋徐積撰雜文苟子辯荀子曰人之性惡其善者偽也古者聖人以人之性惡以為偏險而不正悖亂而不治是以為之起禮義制法度以矯飾人之情性而正之以擾化人之情性而道之也使皆出於理合於道也辯曰荀子非也且人之性既惡矣又惡知惡之可矯而善之可為也矯性之矯如矯木之矯則是把柳為桮棬之類也何異於告子哉弗思而巳矣余以為禮義者所以充其未足之善法制者矯其巳習之惡荀子曰凡性者天之就也不可學不可事辯曰荀子過矣若如此論則是上之教可廢而下之學可棄也又烏用禮義為哉余以為天能命人之性而不能就人之性惟人能就其性如此則與孔子之意合孔子曰成性存存道義之門荀子曰今人之性目可以見耳可以聽何以見之明不離目何以聽之聰不離耳目明而耳聰不可學明矣辯曰荀子過矣夫奚物而不可學也赤子之性也不匍匐矣既匍匐也不能行必須左右扶持猶曰姑徐徐云耳然而卒能之楚之秦之天下者其故何哉盖曰學而巳也至於耳目則何獨不然其始也目不能視矣耳不能聽矣然而明可以察秋毫之末聰可以辯五聲之和卒能如此者其故何哉亦曰學而巳也夫奚物而不可學耶荀子曰今人之性飢而欲飽寒而欲暖勞而欲休人之情性也今人飢見長者而不敢先食者將有所讓也勞而不敢求息者將有所代也夫子之讓乎父弟之讓乎兄子之代乎父弟之代乎兄為此行者皆反於性而悖於情也故順情性則不辭讓矣辭讓則悖於情性矣用此觀之人之性惡明矣其善偽也辯曰荀子謬矣夫飢而欲飽寒而欲暖勞而欲休此人情之常也雖聖人亦不免矣至於子之讓乎父弟之讓乎兄子之代父弟之代兄此二行皆出於其性也何反於性而悖於情哉有是性即有是行也無是性即無是行也烏有性惡而能為孝弟哉弗思而巳矣荀子曰凡禮義者是生於聖人之偽非故生於人之性也故陶人合土而生瓦然則瓦生於陶人之偽非故生於人之性工人斵木而生器然則器生於工人之偽非故生於人之性也辯曰荀子謬矣夫欲行其實者必先正其名名正則教行矣禮義之偽與作偽之偽有以異乎其無以異乎在人者必皆謂之偽則何事而不可言偽言性惡者將以貴禮義也今乃以禮義而加之偽名則是欲貴之而反賤之也奚不曰陶人因土而生瓦工人因木而生器聖人因人而生禮義也何必曰偽荀子曰薄願美狹願廣貧願富賤願貴苟無之中者必求於外故富而不願財貴而不願勢苟有之中者不及於外用此觀之人之欲為善者為性惡也辯曰荀子過甚矣何不顧孟子之意也孟子以仁義禮智謂之四端夫端亦微矣其謂仁者豈遂足用為仁哉其謂義者豈遂足用為義哉是在其養而大之也此所謂薄願美狹願廣貧願富賤願貴以其不足於中而必求於外也安得曰富而不願財貴而不願勢苟有中而不求於外耶故人之欲為善以其善之未足也而有可充之資可為之質也何必待性惡而後為善哉性惡而為善譬如搏水上山善而為善如水之流而就濕也火之始然而燥也豈不順也噫荀子過矣荀子曰性善則去聖王息禮義性惡則興聖王貴禮義辯曰一隂一陽天地之常道也男有室女有歸人倫之常道也君必有民民必有君所以為天下也不然何以為天下聖王之興豈為性惡而巳哉故性善得聖王則愈治得禮義則愈興安得曰去聖王息禮義性善而得禮義如物萌而得膏雨也勃然矣有何不可哉荀子過矣荀子曰凡人之性堯舜之與桀跖一也君子之與小人其性一也辯曰天下之性惡而已堯舜盗跖亦惡而已是自生民以來未嘗有一人性善也未嘗有一人性善其禮義曷從而有哉其所謂聖人者曷從而為聖人哉荀子曰堯問於舜人情何如舜對人情甚不美妻子具而孝衰於親嗜欲得而信衰於友爵禄盈而忠衰於君辯曰荀子載堯舜之言則吾不知也至於妻子具而孝衰於親則是妻子未具而嘗有孝矣嗜欲得而信衰於友則是嗜欲未得而嘗有信矣爵禄盈而忠衰於君則是爵禄未盈而嘗有忠矣則是天下之性未嘗無孝未嘗無信未嘗無忠而人之性果善矣其所以不善者外物害之也豈性之罪哉學荀子者以吾言為如何四維辯四維者何謂也一曰禮二曰義三曰廉四曰恥禮不踰節義不苟進廉不蔽惡恥不從枉為其説者為誰管仲也非其説者為誰子厚也以為廉不苟得恥不從枉又以為廉恥二者不得與禮義相抗列為四維蒙以為大不然二氏之論俱失之矣夫禮者何謂也禮也者履也履之象曰上天下澤履君子以辯上下定民志君君臣臣父父子子夫夫婦婦由閨門而逹朝廷由朝廷而逹天下得之則正失之則邪得之則治失之則亂禮之義大矣哉義也者何謂也義也者宜也行得其宜之謂也天道之有隂陽地道之有柔剛人道之有仁義義之義大矣哉廉也者何謂也可取而取之可取而不取者有之矣可有而有之可有而不有之者有之矣可進而進之可進而不進者有之矣可居而居之可居而不居者有之矣善莫大於是惡莫大於非是天子行之可以化天下諸侯行之可以化一國卿大夫行之可以化其家士庶人如是何憂乎邪侈淫僻何憂乎争奪犯分何憂乎亂臣賊子何憂乎徳義之不興何憂乎刑罰之不措廉之義大矣哉恥也者何謂也不仁則恥之不義則恥之無禮則恥之不智則恥之不信則恥之恥不仁則將為仁矣恥不義則將為義矣恥無禮則將為禮矣恥不智則將為智矣恥不信則將為信矣彼能是我不能是恥也彼不為是而我為是恥也彼致其君如是澤其民如是我不如是恥也彼功烈如是我不如是恥也恥之義大矣哉辯習性善乎曰善也以善性而習有善惡者何也物誘於外而欲攻於内也好惡之不正而邪情奸於其間也養之弗充則性之弗固也况未嘗一日而養之乎能自養者盖鮮矣於是有君師之教禮義之化也所以養其性長其善而正其習也習不正則惡矣惡不巳則其性汨而謂性之不善是何異於害其苗而謂苗之不長也人亦知夫苗乎物之有苗也苟無外物之害則苗無不長矣苗之槁者外物害之也是故善養苗者必去其害苗者去莠惡其害苗也善養性者必去其害性者去惡惡其害性也見善則勉見不善則懼此所以去惡者苗之外物也然則性者善也習有善與惡也習久不變然後善惡定也卒而為君子卒而為小人皆所以取之道也是故習不可不慎也善習者雖瞽鯀為父亦捨父而習他矣不善習者雖父堯子舜亦捨父子而習他矣性則善也習有善與惡也是故習不可不慎也侯生辯侯生薦朱亥卒成其事亦足報信陵矣又自殺軀以謝公子於事何益故死生無輕重惟義之所在苟義有可死則生若鴻毛之輕苟義不可死則生若太山之重若侯生者烏得謂之義是不義也無乃將有激於後世乎亦已過矣論兵朝奉大夫胡公赴濟州太守過於山陽至於南郭即學官而見之且有問焉既卒其説遂及西戎答曰四夷者中國之外患也而西戎冣甚其故何邪以其所備者多故也闗中之五路河東之四路皆所備也即一路弗之備邪賊兵之所出者必其所弗備也其備如此則我師之勢常分賊兵之勢常合以其所合攻其所分此兵法之所忌也公曰然其方畧如何答曰在問辨審問而明辨之繼之以精講則方畧出矣以韓信之竒以累勝之師以敗軍之將猶且敬而問之此其所以無敵也盖多多益辦者才也戰勝而好問者智也此信之所以竒乎公曰將有五徳智為之首信乎孫子之知言也盖以其書攷之圓深微妙諸子弗逮也此兵之難乎荅曰兵為最難其形有常而其變無常其甚者如猝風如猛雨如雷奔雲騰如逸羣鷙鳥從空而下如伏獸如攫豹怒虎忽起乎前忽起乎後或出乎左或出乎右於此之時意氣自若神色不動如坐乎戸牖之間簟席之上顧視裕然方且左右前後而應之也如此庶乎能制其勝矣以曹操之英而畏孫權以孫權而畏司馬懿以其用兵之變化有如鬼神也及至與武侯相持二百餘日懿終不敢决戰戰則必敗也盖兵之難也如此公曰信乎兵之難也我且去矣子亦有以遺我者乎於是乎述兵之難也䇿問兵術之所恃者將也將之難乎其人久矣盖勝有所不可必而才有所不全以司馬宣王之能不足以當武侯是勝有所不可必也以郭汾陽之寛厚李光弼之威畧兩人皆有所短是才有所不全也然而厯代名將如此之衆才全而必勝者豈無一人乎哉以傳考之其人為誰古之學者能言之類據經辨道不牽於世儒期合於聖人而止其發為文辭敦嚴渾厚壁立掘起温潤優㳺金光玉潔綽約者其指有餘辨博者不煩而肆如此輩其氣之所養心之所自得不蹈不襲是之謂有本去古浸逺其風下衰學者既卑而親業與夫長而從事皆誦當代之文諸家之集此李唐諸公所以慨然發憤思有以革而變之也方今所患何以異此如將復古之學貴乎有本使之自養而自得之也其道何繇輔之以問辨終之以篤行善之善者也夫學而弗行猶弗學也行其所學者聖人之徒歟天子之所與共天下者其人皆出乎士也士之所以致業乎君致功乎民其道皆出乎其所學也如此則上之取士不得不重重故有法士之所學不得不重故亦有法上之所取者重有法故可與共天下士之所學者自重有法故不負人之天下此所以治而至於大治也夫五代之亂其法不足言自隋唐而上至於炎漢其法可考有無得失究而言之以觀所好方今之患旱乾水溢亢陽之變屬在西北而饑饉荐臻闗中為甚加之以師旅有司之臣日夜計議方在用度不足至於救荒奈饑民之所待而全活者為之賑何嗷嗷赤子匍匐道路未知所之朝廷閔憂側身西顧將欲援而出之溝中也而其術未獲盖聖王學問至於芻蕘即一日詔問諸生所宜之䇿二三子何以待問世雖甚盛不可不講者兵也兵者國之大命也食者兵之大命也故雖趙充國之能而制勝方畧先議邉糴魏晉而下敵國聲勢皆以所積虛實為兵之强弱史氏所載可得而考也諸公亦常講之乎夫師行十萬日費千金故雖積粟藏鏹所在盈溢以漢武用之文景豊富掃地盡矣則李唐用度不足以制方鎮之亂者何足怪哉善戰不如安邉戰而後勝不如伐人之謀能取諸彼者不如保此之所有此名將所以無功也古之人能如是其人為誰乎不如是不足為將之善者也經者聖人之所以盡心也謹其始亦謹其終然其始易知其終難知是何也盖書天子之事也終於文侯之命可也秦費二誓何以與焉春秋魯史也是諸侯之事也而書西狩獲麟詩之有頌所以明盛德而告成功雖有文王之業武王之功微成王周公則不作矣是太平之事也而繼之魯頌又附之商頌何謂也易之為書也未嘗不戒故以未濟終焉而説者以為既濟豈聖人之意乎至於二禮所載終始不聞二三子考之各以詳對古之所謂學者非浮文之謂也其所以蓄積而養之者凡皆為道也是非特為巳也將以致之於吾君又將以措之於吾民也吾君從之耶是為無過之君也吾民從之耶是為無罪之民也有是道者必有是心古之君子皆然後之學者其孰能與於斯乎盖史氏所載世有其人其詳可得聞乎如令董仲舒之得君黄憲之居官任使斯亦斯人之徒歟論者謂任昉過董生沈麟之比黄憲則二子亦其人也諸生以為如何古之善為兵者各以其書名家而三家者最著司馬穰苴兵之正者也孫武兵之有術吳起兵之應變者也三人者可謂能言不可謂之巳試矣然其畧亦有巳試能取勝者乎晚有鼂錯者其學雖不主於兵而善言兵事故其大指盖若涉乎管子矣管子者可謂知兵也其亦可謂必勝之將乎鬻海為鹽其利最溥負海而居者世從其事其輕於犯法私置牢盆業巳成俗而不軌逐利之人構成黨與數十百千自為一輩挾兵持杖白晝公行緩則為商急則為變此大盗之本也聖朝患之故為之損上痛裁其價率以甚賤而制三嵗之入所省大半矣縣官用度勢有不給議者以為非便然一嵗之獄與夫吿賞之費所省若干以夫若干所省補其所亡大半亦足以相當矣若夫國之經費冝有方畧以佐當今之給諸生從事於學術久矣其亦有説乎宋有天下神䂓聖畧以唐為監精兵悍卒萃於京師郡縣之勢矯於方鎮根本固矣本末大小形勢甚順然行之百有餘年所矯巳過至於武偹不講壁壘不修池隍不浚郡縣之勢太弱守令之權太輕自笞罪巳上謹視其法有司所據議論堅定雖情有可矜惡有巳甚而罪不應者一切以律從事不當讞而讞之猶且不敢而况行法外之刑乎故威武不足以禦侮刑罰不足以沮姦非所以戒不虞思患而豫防之也盖聖人制法不能無弊唐虞三代其弊皆然亦在所救而巳也然則為之柰何古者建侯啟國内自王畿外至於逺服各以其國大小相維列為蔽扞所以内嚴京師示天下以形勢也其盛則述職修貢四面而至玉帛充庭受天子約束將命而歸於境内是為惠澤其衰則霸者用事設為五禁尊王至而庇生民雖有强國畏威而服義故夏商用又享國永年姬周卜世實過其厯此封建之利也而諸儒論議所見不同究而評之孰得孰失命説命者何曰貴賤曰夭夀貴賤以徳夭夀亦以德然而德貴焉非獨命也故大徳者必得其夀故自堯舜至於孔子無不得其夀者獨顔氏者不得其夀耳自四凶至於盗跖無得其死者獨盗跖一人幸而免耳斯皆可謂之命也盖有幸與不幸焉爾夫天之生物也必因其材而篤焉故惡者天必厚其毒故盗跖雖夀不若速死之愈也故萬世之下言惡者曰盗跖而巳顔氏雖夭顧其人見於後世如何是以萬世之下言徳行者曰顔氏而巳故顔氏雖死至今猶在夫得夀者孰大於是節孝集巻二十九
