body:
  text: 節孝集巻十宋徐積撰古詩三十四首謝李自明并序弗徳其徳施於其所不報者也其人謂誰謂自明也邵武李自明愛其人以及乎親乃一日持酒具即其所像伏謁頓首酌而饋奠之其容色有孚其恭中禮退而視其貌温温裕如也其不肖子既拜之矣顧不可無述焉於是言而為詩蓋恩之所施有大小輕重顧其所用心者何如耳論其人量其勢度其能報與弗能者是世俗也徳其徳者也夫徳其徳者雖大而小雖重而輕君子則不然因吾之性行吾之禮設吾之義也世俗之論吾所弗論也世俗之所量吾弗量也則所謂報者固君子之弗道也是何也是其所養者充所積者久故其中裕然其為之不勞其見於外者不可得而掩者也如此則鳥獸可感草木可動而况於人乎故見者恱之聞者至於歎息而况其人之身親獲而受之者乎此所謂弗徳其徳也夫弗徳其徳者雖小而大雖㣲而著然自明之於予何以知其弗徳其徳也夫以六十之年病其兩耳賤且死矣固不足以報人之徳也知其不能報然且施之真所謂弗徳其徳者也養以其久真以其積維積維久是以爲徳徳而徳之或表而失徳而弗徳然後能造孰爲斯施孰爲斯報徳其徳者伐幹以斧弗徳其徳培以根土徳乎缺乎其孰禦乎贈胡大夫兵有三難一曰難知二曰難處三曰難言𦕈忽精微偉哉胡公講辨必精以兵爲難是爲知兵是爲力學是爲老成惜乎老矣未見設施其誰知公胷中之竒弗施於兵施於有政所在所居斯民之幸送吕清叔寒水如烟霜似雪半夜踈牕透明月此時有客正不眠淮上吟聲無斷絶昨夜月初圓今宵月初缺月圓月缺本無情惟有文通恨難說惨惨黄昏天欲雪蕭蕭淮浦人聲絶風擊寒雲鴈正鳴客眠孤棹燈殘滅贈王觀文并序盖古之君子以好賢愛士尊徳樂義而爲之始亦所以爲之終故大有其才大有其徳大有其位大有其功大有其名五者皆大而持之以謙道巳行於天下澤已加於萬物法可傳於後世可謂美矣盛矣盖缺然自視猶以爲不足也故於能賢有道致恭盡禮將之以誠而加之愛心勢若不敢與之鈞敵惟恐不得有所聞不得有所見也是以善其始而光其終何獨古之人耶一有好之者是亦古人也好之能之行之盡之古人之盛徳也居今之世而爲古人之事者王公其人乎某也不肖竊伏淮濵越在草莽非有左右之介一日之素也食頃之間使者相望叩其所舎即不肖而問焉如待故人舊物也適以野處無良紙筆以報公命因畧爲詩歌見於私寫繕藁未及即不意其傳也既不汙公几席公既受而弗却且置之齒牙間謂之爲可也公之徳量既恕如此二藁之畧率然之罪顧無辭以謝是以復爲西征篇焉大江之心波濤浩然旌幢蔽空鼓吹合作歌酒半酣借壯夫勇士歌之雖不足以娱王公之聴而動王公之容至於麾下驍俊必將慷慨氣作奮思忠烈如班超傅介子之比也其辭曰一自西征登將壇探其窟穴除其殘鄰羌餘喘雖粗安匈奴右臂殊不完聞公姓字摧膽肝穹廬部落匿可汗何當飲馬朔海乾雄丈髙勒燕然山古來從事多壯夫凱歌得意更豪麤共公談笑觀投壺醉筆揮成露布書歸來却佐神聖王愛賢樂道不敢忘徳功甚盛謙尊光始終一節郭汾陽答張文剛張子問著書使我長嗟吁有意在黄絹無能任白駒筋力如老驥頥頷生霜鬚二子少且壯努力相雕枯答劉子静風蘭不復採風樹何由静一日復一日大龍自馳騁無限好花開何異秋風景洒淚報君詩正是鶴孤警荅頴叔大使莫憂淮上叟萬事付之詩與酒若問我家何所營爲比陶潜少三栁和張文潛晚春六首春在亦飲酒春去亦飲酒若問此間時便是無何有又昨日枝頭紅鮮鮮染人指今朝尋不見已在汙泥底又麥穎未黄乾桑實半紅濕恰得一犂雨田事正火急又人事無如何多於道傍草但問酒有無莫管老不老又人生少娱樂閒日亦有數藥草正肥時好望雲山去又風暖燕窠牢雲晴鳥翅健物生自有樂亦各適其願示諸生子莫爲文學纎麗湏是渾渾有古氣本源要在養諸中不然恐汝爲時軰謝張尉魚葅乃以玉版名可將苦酒試光明張華陸機勿下筯盤中恐作霹靂聲送秦漕以身送客情㡬何以心送客情最多任意所之無逺近不論山險與風波贈鄭毅夫摩天羽翮森森齊胸中壯氣蟠虹霓區區世俗誰相知青雲岐路看如泥送陳長官赴衡陽楚天摇落霜風早山色依依江𣺌𣺌洞庭水寒帆影孤鴈聲正在衡陽道君不見屈原憔悴賈生天遺恨至今猶未了日晚江頭船住時行人莫望江邉草南山有竒木贈慎彦鄰并序慎彦鄰與予爲故人又與予共學予愛其才卓然有可爲之資因其行作南山有竒木以贈之其欲其充之也人皆患窮餓子獨無寒飢子乃何爲者汲汲售於時漢之公孫𢎞唐之張柬之子豈不知此與世相驅馳南山有竒木犖犖松檜姿此木在深山年代不可知煙雲終日䕃雨露早夜滋一幹可爲棟一枝可爲榱耽耽廊廟中小大皆可施子豈不知此汲汲將何爲子其自努力發憤而忘疲孔孟非異域行者皆可㡬退之雖絶足大歩亦可追嗟子之兄弟與我如四支余言子其聴無使我歔欷答何楚才有客能操耒而捨其良田有客善攻玉而探珠於淵二者之是非子以為何如子乃捨所急若是其渠渠然余有二說可爲不可爲所謂不可者子家無寒飢所謂可爲者奉養之所資余此二說者子當慎擇之余嘗竒子貎亦甞憐子文不能爲子謀嗟㢤空云云還崔秀才唱和詩元白有餘勢孟韓無困辭子美骨格老太白文采竒當時大道久破碎人人文字萎苶而支離天生數子將卓卓鴟鴞正成羣一鶚摩天飛嗟君不與數子共使君逸氣填塞無所施我來雖無知黄金白玉看如泥自從詩巻一入手掣然直上青雲梯十宵不睡亦不困厭賔日日闗柴扉秋風獵獵吹横河蒼天萬里生銀波起來半夜吸一口睡魂酒病都消磨贈慎叔良三首昔日黒頭交今爲白髪叟約是三十年情好於此久且待花開時同把一盞酒君看我門前兼有两株栁又昨日故人來慰此白頷叟两叟忽相見面色如飲酒將此酒色面抵却春風寒飲酒豈易比懽好良所難我已五十八君巳五十七人生勿草草两公湏努力又相逢便吐胷中竒直道而交與世違硯席已逾三載共鸞凰湏約一時飛嗟予從事於今僻似子知音自古稀好去上書言得失買臣猶取虎符歸贈盧魯山二首充囊勿用錢古律長短篇子勉如不已斯文終可傳又一詩將两年不出非空然為子有佳行重爲進徳篇孔孟有常處四通八達路其道甚坦夷行之莫能禦夜思而晝行求至慎勿遽存誠防他岐積微從寸步積之能不已其率可馳騖仁義固其常忠信乃先具正直常與㳺前却慎勿顧所謂氣馬者尤宜審其御孟子言最詳揚雄亦深悟勉之復勉之子無忽吾語凡我今之人皆欲達其所而况鄊閭中待君為處女寄秦少㳺太虚子用心於我知者蔡彦䂓彦䂓今死矣誰能述所爲若說子用心古人如此稀顧我不能報臨老形於詩贈錢思權四首好笑两學官果然作不了子去恐無船我眠幸有草君看野田中閒花亦不少昨日有人來贈我吟詩藁又有客叩茅廬時来見鰥老今朝二十七春風有多少共子樂有餘如何醉不倒坐中忽索馬歸慰親懐抱又有客懐剛義無物能干抱堂有白頭親惟憂甘㫖少其家十五口行計亦草草也湏謀饘粥不可使飢倒又同室與鄉鄰勢與他人異義當同子去豈敢狥於利但恐登舟時無以慰親意沽與玉甕醅豈煩酒官義贈袁評事今年七十嵗嵗嵗増康寕人間有夀鶴天上有夀星更若欲齊椿但看南華經大河上蔣寳文大河者大事我軰安足明野人好狂言夫子知本情念此有官守不可從公行心方愧古人渤海之王生節孝集巻十
